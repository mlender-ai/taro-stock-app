name: Knowledge Distill (Brain K1)

# 에이전트 두뇌 K1 — 매일 흩어진 기억(머지 PR·제약 hit)을 정제 지식으로 적층한다.
#   knowledge/distilled.md (멱등 누적, K2 검색이 읽음) + knowledge/daily/<date>.md (그날 raw).
#   "메모는 쌓이는데 다시 안 본다"를 막는 복리 지식 레이어.
on:
  # [PAUSED 2026-06-13] 에이전트 자율 루프 일시정지 — Phase 트랙 직접 개발 집중. cron 비활성(수동 workflow_dispatch만). 되살리려면 아래 주석 해제.
  #   schedule:
  #     - cron: "30 22 * * *"  # 매일 오전 7:30 KST (진척 리포트 직후)
  workflow_dispatch:
    inputs:
      since:
        description: "머지 PR 수집 시작일 YYYY-MM-DD (비우면 2일 전 — 백필 시 과거 날짜)"
        required: false

concurrency:
  group: knowledge-distill
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  distill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Gather + distill knowledge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          SINCE="${{ github.event.inputs.since }}"
          [ -z "$SINCE" ] && SINCE=$(TZ=Asia/Seoul date -d '2 days ago' '+%Y-%m-%d' 2>/dev/null || TZ=Asia/Seoul date -v-2d '+%Y-%m-%d')

          # 1) 최근 머지 PR (since 이후) → [{number,title}]
          gh pr list --state merged --limit 60 --json number,title,mergedAt \
            --repo "${{ github.repository }}" 2>/dev/null \
            | jq --arg since "$SINCE" '[ .[] | select((.mergedAt|.[0:10]) >= $since) | {number, title} ]' \
            > /tmp/kb_merged.json || echo "[]" > /tmp/kb_merged.json
          [ -s /tmp/kb_merged.json ] || echo "[]" > /tmp/kb_merged.json

          # 2) 오늘 제약 위반 hit ({id:count} → [{id,count}])
          HITF="generated/constraint-hits/${TODAY}.json"
          if [ -f "$HITF" ]; then
            jq 'to_entries | map({id: .key, count: .value})' "$HITF" > /tmp/kb_hits.json 2>/dev/null || echo "[]" > /tmp/kb_hits.json
          else
            echo "[]" > /tmp/kb_hits.json
          fi

          # 3) 결정 자동추출 — 기획문서(plan-doc) 이슈의 "✅ CEO 결정" 섹션 불릿
          echo "[]" > /tmp/kb_decisions.json
          PLAN_NUMS=$(gh issue list --label "plan-doc" --state all --limit 10 \
            --json number --jq '.[].number' --repo "${{ github.repository }}" 2>/dev/null || echo "")
          : > /tmp/kb_dec_all.json
          for N in $PLAN_NUMS; do
            gh issue view "$N" --json body --jq .body --repo "${{ github.repository }}" 2>/dev/null > /tmp/kb_plan_body.md || continue
            npx -y tsx@4.19.2 scripts/knowledge-base.ts decisions /tmp/kb_plan_body.md 2>/dev/null \
              | jq --arg ref "issue#$N" '[ .[] | {text: ., ref: $ref} ]' >> /tmp/kb_dec_all.json || true
          done
          if [ -s /tmp/kb_dec_all.json ]; then
            # build 는 {text, ref}[] 를 받는다 — issue# 출처 보존 (멱등은 ref+text 기준)
            jq -s 'add // []' /tmp/kb_dec_all.json > /tmp/kb_decisions.json 2>/dev/null || echo "[]" > /tmp/kb_decisions.json
          fi
          [ -s /tmp/kb_decisions.json ] || echo "[]" > /tmp/kb_decisions.json

          # 4) 규칙(rule) 자동추출 — Standing Constraints(=CEO 확정 규칙)를 지식 rule 층으로
          if [ -f constraints/active.json ]; then
            jq '.constraints | map({id, rule, createdAt})' constraints/active.json > /tmp/kb_constraints.json 2>/dev/null || echo "[]" > /tmp/kb_constraints.json
          else
            echo "[]" > /tmp/kb_constraints.json
          fi

          mkdir -p knowledge/daily
          [ -f knowledge/distilled.md ] || printf '' > knowledge/distilled.md

          NEW=$(npx -y tsx@4.19.2 scripts/knowledge-base.ts build \
            "$TODAY" /tmp/kb_merged.json /tmp/kb_hits.json /tmp/kb_decisions.json \
            knowledge/distilled.md "knowledge/daily/${TODAY}.md" /tmp/kb_constraints.json 2>/dev/null || echo 0)
          echo "NEW_LESSONS=$NEW" >> "$GITHUB_ENV"
          echo "KDATE=$TODAY" >> "$GITHUB_ENV"
          {
            echo "### 🧠 Knowledge distill ($TODAY) — 신규 교훈 $NEW 건"
            echo '```'; head -30 knowledge/distilled.md; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit knowledge
        run: |
          set -uo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/  # 신규(untracked) 포함 — diff --quiet 는 untracked 미감지라 add 후 staged 로 검사
          if git diff --cached --quiet; then
            echo "지식 변경 없음 — 커밋 생략"; exit 0
          fi
          git commit -m "chore(knowledge): ${KDATE} 지식 적층 (신규 교훈 ${NEW_LESSONS}건)"
          git push origin HEAD:main

      - name: Notify Slack
        if: always() && vars.SLACK_WEBHOOK_URL != ''
        run: |
          URL=$(printf '%s' "${{ vars.SLACK_WEBHOOK_URL }}" | tr -d '[:space:]')
          TEXT="🧠 *지식 적층 (${KDATE})* — 정제 교훈 신규 ${NEW_LESSONS}건. knowledge/distilled.md 누적. (에이전트가 이걸 검색해 재제안·중복을 막습니다)"
          BODY=$(jq -n --arg t "$TEXT" '{text: $t}')
          curl -sS -X POST -H 'Content-type: application/json' --data "$BODY" "$URL" || true
