name: Daily Agent Council

on:
  schedule:
    - cron: "0 22 * * *"  # 매일 오전 7시 KST (UTC 22:00 전날)
  workflow_dispatch:
    inputs:
      agent:
        description: "실행할 에이전트 (all / pm / frontend / backend / designer / qa / cto / marketer / security / prompt_engineer)"
        required: false
        default: "all"

concurrency:
  group: agent-council
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  models: read

# ─────────────────────────────────────────────────────────────
# v3 (2026-05-22) — 산발성 제거, 구조화, 자기 학습
#   - AGENT_NORTH_STAR.md 도입: 모든 에이전트 단일 진실
#   - 각 에이전트별 자기 라벨 history 주입 (자기 반복 금지)
#   - 닫힌 이슈 컨텍스트 추가 (거부 패턴 학습)
#   - 통일된 제안 템플릿: 가설/근거(파일경로 필수)/액션/측정 지표/North Star 정렬
#   - 약한 어휘 금지 규칙 prompt 강제
#   - CEO Brief: 어제 채택 진척 추적 + North Star 정렬도 평가 + 반복 주제 디플래그
# ─────────────────────────────────────────────────────────────

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      feedback: ${{ steps.fetch.outputs.feedback }}
      merged_prs: ${{ steps.fetch.outputs.merged_prs }}
      open_issues: ${{ steps.fetch.outputs.open_issues }}
      closed_issues: ${{ steps.fetch.outputs.closed_issues }}
      north_star: ${{ steps.fetch.outputs.north_star }}
      yesterday_brief: ${{ steps.fetch.outputs.yesterday_brief }}
      today: ${{ steps.fetch.outputs.today }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Context, Feedback, North Star
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          YESTERDAY=$(TZ=Asia/Seoul date -d 'yesterday' '+%Y-%m-%d' 2>/dev/null || TZ=Asia/Seoul date -v-1d '+%Y-%m-%d')
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

          # North Star — 모든 에이전트 단일 진실
          if [ -f AGENT_NORTH_STAR.md ]; then
            NS=$(cat AGENT_NORTH_STAR.md)
          else
            NS="⚠️ AGENT_NORTH_STAR.md 파일이 없습니다. 사용자에게 알리고 일반 제안만 수행하세요."
          fi
          echo "north_star<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$NS" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 어제 CEO Brief — 채택 항목 진척 추적용
          YB=$(gh issue list --label "ceo-brief" --state all --limit 5 \
            --json title,body \
            --repo "${{ github.repository }}" | \
            jq -r ".[] | select(.title | contains(\"$YESTERDAY\")) | .body" 2>/dev/null | head -c 2000)
          if [ -z "$YB" ]; then
            YB="어제 CEO Brief 없음 — 진척 추적 불가, 새 사이클로 시작."
          fi
          echo "yesterday_brief<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$YB" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 머지된 PR 30개
          MERGED=$(gh pr list --state merged --limit 30 \
            --json title,number --repo "${{ github.repository }}" | \
            jq -r '.[] | "- #\(.number) \(.title)"' 2>/dev/null || echo "없음")
          echo "merged_prs<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$MERGED" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 열린 제안 이슈 (제목 + 본문 첫 200자)
          OPEN=$(gh issue list --label "agent-council" --state open --limit 50 \
            --json title,body --repo "${{ github.repository }}" | \
            jq -r '.[] | "제목: \(.title)\n요약: \(.body | .[0:200] | gsub("\n";" "))\n---"' 2>/dev/null || echo "없음")
          echo "open_issues<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$OPEN" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 닫힌 이슈 최근 20개 (거부/완료 패턴 학습)
          CLOSED=$(gh issue list --label "agent-council" --state closed --limit 20 \
            --json title,closedAt --repo "${{ github.repository }}" | \
            jq -r '.[] | "- [\(.closedAt | .[0:10])] \(.title)"' 2>/dev/null || echo "없음")
          echo "closed_issues<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$CLOSED" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 피드백 로그
          FEEDBACK=$(gh issue list --repo "${{ github.repository }}" \
            --label "feedback-log" --state all --limit 7 --json title,body \
            | jq -r '.[] | "---\n## " + .title + "\n" + .body' 2>/dev/null || true)
          if [ -z "$FEEDBACK" ]; then
            FEEDBACK="피드백 이력 없음 — 첫 번째 사이클입니다."
          fi
          echo "feedback<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$FEEDBACK" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────
  # 1. PM
  # ─────────────────────────────────────────────────────────────
  pm:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'pm' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 15
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[PM\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

          HIST=$(gh issue list --label "pm" --state all --limit 5 \
            --json title,body,state --repo "${{ github.repository }}" | \
            jq -r '.[] | "### [\(.state)] \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[PM] 제품 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 타로 증권 앱의 Product Manager입니다.
            사용자 페르소나: MZ세대 개인 투자자, 타로에 관심 있는 주식 입문자.
            KPI: DAU, 크레딧 소비량, 앱스토어 평점, D7/D30 리텐션.

            === 우선순위 ===
            제품의 핵심 가치는 "타로 해석 콘텐츠의 품질"과 "사용자 경험의 매끄러움"이다.
            시각적 효과(애니메이션, 글로우)보다 콘텐츠 깊이(해석 품질, 개인화, 재방문 동기)와 UX(플로우 단순화, 정보 위계, 접근성)를 우선한다.

            === 절대 규칙 ===
            1. 이번 주 North Star 테마 밖의 제안 금지. North Star가 곧 우선순위다.
            2. 금지 어휘: "가능성", "우려됩니다", "수도", "보입니다", "할 것 같습니다". 단정형 + 근거만 사용.
            3. 모든 "현재 문제"는 파일경로/메트릭/사용자 피드백 인용 중 1개 이상 포함. 추측 금지.
            4. 제안은 1주 내 단일 PR로 완료 가능한 범위. 추상 표현 금지.
            5. 자기 직전 이력에서 다룬 영역과 같은 주제 금지.
            6. 콘텐츠 품질 관련 제안(해석 프롬프트 개선, 카드 서사 확장, 재방문 유도 콘텐츠)에 가점을 둔다.
          prompt: |
            ## 🌟 North Star (이번 주 단일 진실)
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📜 PM 에이전트 자기 직전 5개 제안 (같은 영역 재제안 금지)
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR (이미 구현됨 — 재제안 금지)
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 현재 열린 다른 에이전트 제안 (중복 금지)
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 최근 닫힌 이슈 (거부됨 또는 완료됨 — 같은 주제 금지)
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            위 컨텍스트와 North Star를 모두 준수하여 PM 관점에서 제안 1개를 작성하세요.
            North Star "이번 주 테마"와 명확히 연결되는 것만. 연결 안 되면 제안을 만들지 마세요.

            ## 🎯 PM 제안: [한 줄 제목]

            ### 가설 (1문장)
            (사용자 행동/감정/지표가 어떻게 바뀐다는 가설인가)

            ### 근거 (필수)
            - 파일 경로 또는 메트릭 또는 사용자 피드백 인용 1개 이상:
            -

            ### 액션 (단일 PR 범위)
            - 수정할 화면/컴포넌트:
            - 구체 구현 단계 2-4개:

            ### 측정 지표
            - 어떤 숫자가 얼마나 변하면 성공인가:

            ### North Star 정렬 (1문장)
            (이 제안이 이번 주 테마와 어떻게 직결되는가)

            ### 위험/대안
            (실패 시 또는 다른 접근법)
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[PM] $TODAY 제품 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,pm" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 2. Frontend
  # ─────────────────────────────────────────────────────────────
  frontend:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'frontend' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 30
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Frontend\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          HIST=$(gh issue list --label "frontend" --state all --limit 5 \
            --json title,body,state --repo "${{ github.repository }}" | \
            jq -r '.[] | "### [\(.state)] \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Frontend] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 타로 증권 앱의 프런트엔드 개발자입니다.
            스택: React Native + Expo SDK 54, expo-router, zustand, StyleSheet.
            제약: Expo Go — `react-native-reanimated` 사용 불가. `Animated` API만 허용.

            === 우선순위 ===
            콘텐츠 품질 > 사용자 경험(UX) > 시각적 폴리싱. 콘텐츠와 UX가 먼저, 애니메이션은 나중.

            === 절대 규칙 ===
            1. North Star 테마 밖 제안 금지.
            2. 금지 어휘: "가능성", "우려됩니다", "수도", "보입니다". 단정형 + 근거.
            3. 현재 문제는 파일 경로(예: apps/mobile/src/screens/...) + 줄 번호 또는 구체 컴포넌트명 명시.
            4. 단일 PR 범위. 라이브러리 새로 도입은 정당화 필요.
            5. 자기 직전 이력과 다른 화면/컴포넌트 선택. 같은 영역(예: 카드 애니메이션) 반복 금지.
            6. 빛, 소리, 햅틱 같은 감각 효과는 기본 디자인(피그마)이 확정된 화면에만 제안 가능. 디자인 미확정 화면에 폴리싱 효과를 제안하는 것은 시기상조이므로 금지.
            7. 화면 전환 애니메이션이나 글로우/파티클 같은 장식적 효과보다, 정보 전달 효율(텍스트 가독성, 정보 위계, 터치 영역 크기)과 사용자 플로우 개선을 우선한다.
            8. 카드 뽑기/뒤집기 등 핵심 인터랙션 애니메이션은 제안 가능하나, 결과 화면의 장식적 애니메이션은 금지.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📜 Frontend 자기 직전 5개 제안 (같은 영역 재제안 금지)
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 현재 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 최근 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            North Star 테마에 직결되는 프런트엔드 제안 1개. 자기 이력과 다른 각도여야 함.

            ## 📱 Frontend 제안: [한 줄 제목]

            ### 가설 (1문장)

            ### 근거 (필수 — 파일 경로 또는 컴포넌트명)
            -

            ### 액션 (단일 PR 범위)
            - 수정 파일:
            - 추가/변경 컴포넌트:
            - 구체 구현 단계 2-4개:

            ### 측정 지표
            (체류 시간, fps, 클릭률, 번들 크기 등 수치)

            ### North Star 정렬 (1문장)

            ### 위험/대안
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Frontend] $TODAY 모바일 UX 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,frontend,mobile" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 3. Backend
  # ─────────────────────────────────────────────────────────────
  backend:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'backend' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 45
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Backend\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          HIST=$(gh issue list --label "backend" --state all --limit 5 \
            --json title,body,state --repo "${{ github.repository }}" | \
            jq -r '.[] | "### [\(.state)] \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Backend] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 타로 증권 앱의 백엔드 개발자입니다.
            스택: Next.js 14 API Routes, PostgreSQL + Prisma ORM, Railway/Supabase.
            중요: DB는 `prisma db push`로 운영 — "마이그레이션 미배포"는 잘못된 가정.
            이미 구현됨: API 4-tier 캐싱, JWT HttpOnly, IAP 서버 검증, HMAC nonce, 7일 스트릭.

            === 절대 규칙 ===
            1. North Star 테마와 직결되는 제안만 (예: 의식 경험 흐름의 백엔드 지원).
            2. 금지 어휘 사용 시 거부.
            3. 현재 문제는 API 경로(예: /api/tarot/...) + Prisma 모델명 명시.
            4. 새 인프라(Redis 등) 도입은 North Star Out of Scope이므로 금지.
            5. 자기 직전 이력과 다른 영역/API 선택.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📜 Backend 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            ## ⚙️ Backend 제안: [한 줄 제목]

            ### 가설 (1문장)

            ### 근거 (API 경로 / Prisma 모델 / 쿼리 패턴)
            -

            ### 액션 (단일 PR 범위)
            - API/모델:
            - 구현 단계 2-4개:

            ### 측정 지표
            (레이턴시 ms, p95, 처리량 등 수치)

            ### North Star 정렬 (1문장)

            ### 마이그레이션 위험도
            (없음 / 낮음 / 중간 / 높음 — `db push` 기준)
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
