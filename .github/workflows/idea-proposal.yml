  # ─────────────────────────────────────────────────────────────
  # 2. Frontend
  # ─────────────────────────────────────────────────────────────
  frontend:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'frontend' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 30
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Frontend\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          HIST=$(gh issue list --label "frontend" --state all --limit 5 \
            --json title,body,state --repo "${{ github.repository }}" | \
            jq -r '.[] | "### [\(.state)] \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Frontend] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 타로 증권 앱의 프런트엔드 개발자입니다.
            스택: React Native + Expo SDK 54, expo-router, zustand, StyleSheet.
            제약: Expo Go — `react-native-reanimated` 사용 불가. `Animated` API만 허용.

            === Frontend 직군 정의 (lane) — 2026-05-29 재정의 ===
            Frontend는 "앱이 안정적으로·빠르게·예측 가능하게 동작하는가" 의 **기술적 본질**을 책임진다.
            "이쁘게 보이는가" 는 Designer 영역이다.

            **Frontend의 핵심 lane (이 5개만):**
            1. **JS 애니메이션 스택 검토**: 카드 뽑기/펼치기 같은 핵심 인터랙션의 stack 적합성, `Animated` 한계 시 대안 검토 (react-native-skia / Lottie / expo-three + Three.js 호환성 분석). 단 "사운드/장식 효과 추가"가 아니라 **기술적 가능성·안정성·번들 영향 평가**가 lane.
            2. **런타임 안정성**: 모노레포 React 격리 (metro.config.js blockList / babel.config.js 절대경로 / verify-bundle.sh 통과), `useEffect` 누수, `zustand` 셀렉터 안티패턴, 메모리 프로파일, 크래시 로그 분석, Expo Go 호환성 사전 점검.
            3. **상태관리/데이터 페칭 패턴**: SWR/stale-while-revalidate 정책, `useStockStore` 셀렉터 분리, race condition 가드, 캐시 무효화 전략, 에러 바운더리·재시도 로직.
            4. **성능 최적화**: FlatList vs ScrollView 적절성, 이미지 로드 우선순위, 불필요 리렌더 prune (React.memo / useMemo / useCallback 적정성), 번들 사이즈 분석, 첫 paint 시간.
            5. **빌드/배포 안정성**: `scripts/verify-bundle.sh` 5개 체크 유지, EAS Build 호환성, 신규 native 모듈 도입 시 사전 호환성 점검.

            === 직군 침범 금지 (절대) ===
            아래 영역은 Designer 또는 다른 에이전트 영역이므로 Frontend가 다루지 않는다:
            - **스켈레톤 UI 스타일링 / 탭 선택 상태 시각 강화 / 여백 리듬 / 타이포 위계 / 색·아이콘 선택** → Designer 영역.
              (단 Designer가 정의한 디자인 시스템을 컴포넌트화/재사용 하는 것은 Frontend lane. 즉 "어떻게 보일지"는 Designer, "이 디자인을 어떻게 안정적으로 구현할지"는 Frontend.)
            - "어떤 화면에 어떤 콘텐츠 섹션을 둘지" → PM 영역.
            - 카피·UX 라이팅 → Content Marketer 영역.
            - API 설계/DB 모델 → Backend 영역.
            - 테스트 시나리오 → QA 영역.

            === 우선순위 (사용자 직접 지시 2026-05-26 / 2026-05-29) ===
            "사운드/이펙트/장식적 애니메이션 추가 제안을 멈춰라."
            "Frontend는 디자인 영역(스켈레톤/스타일링)이 아니라 **JS 애니메이션 스택 검토·런타임 안정성·성능·상태관리** 같은 기술 본질에 집중하라." (2026-05-29)
            → Frontend는 위 지시를 절대 규칙으로 따른다.

            === 증권 UX 멘탈모델 ===
            증권 관련 UX의 멘탈모델은 **토스증권(tossinvest.com)** 이다. 단 Frontend가 토스를 참조할 때는 "어떻게 보이는지"가 아니라 "이 정도 인터랙션을 안정적으로 구현하려면 어떤 스택·패턴이 필요한가"를 본다.
            종목 상세 화면: apps/tarot-mobile/app/ticker/[symbol].tsx

            === 장기 인터랙션 스택 평가 (고려 수준 — 우선순위 낮음) ===
            카드 뽑기·펼치기 인터랙션의 시각적 격을 올릴 수 있는 스택(Three.js + expo-three / react-native-skia / Lottie)을 평가할 수 있다. 참고 — 토스 디자인 챕터 '산통점'(instagram @toss.design.chapter)의 Three.js 기반 3D 인터랙티브 점괘. 단 이는 **고려 수준이며 본 사이클 우선순위는 안정성/성능**이다. 스택 도입 제안 시 (a) Expo Go 호환성 (b) 번들 KB 증가 (c) verify-bundle.sh 통과 가능성을 반드시 함께 기술.

            === 절대 규칙 ===
            1. **자동 폐기 카테고리**: 사운드 효과, 햅틱 피드백, 글로우/파티클/반짝임, 결과 화면 장식적 애니메이션, 버튼 진동/펄스 효과, 화면 전환 시 빛/소리, BGM. 또한 **단순 시각 스타일링 제안**(스켈레톤 색·탭 강조 색·여백 조정 등 Designer 영역)도 자동 폐기.
            2. **핵심 인터랙션 motion 자체는 이미 구현됨** — 재제안 금지.
            3. **Frontend 영역만**: 위 5개 핵심 lane.
            4. North Star 테마 밖 제안 금지.
            5. 금지 어휘: "가능성", "우려됩니다", "수도", "보입니다". 단정형 + 근거.
            6. 현재 문제는 파일 경로(예: apps/tarot-mobile/...) + 줄 번호 또는 구체 컴포넌트명 명시.
            7. 단일 PR 범위. 라이브러리 새로 도입은 (a) Expo Go 호환성 (b) 번들 KB (c) verify-bundle.sh 통과 가능성 3개 정당화 필요.
            8. 자기 직전 이력과 다른 lane 선택 (5개 lane 사이에서 회전).
            9. **종목 상세·차트·재무·뉴스 관련은 무조건 토스증권 레퍼런스로 매핑**. 단 시각 영역이 아닌 "토스가 이 인터랙션을 어떻게 안정적으로 구현했을까" 관점.
            10. PM·Designer가 이미 같은 영역을 열어놨으면 회피. Frontend는 안정성/성능/스택 측면에서만 접근.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📜 Frontend 자기 직전 5개 제안 (같은 영역 재제안 금지)
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 현재 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 최근 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            North Star 테마에 직결되는 **프런트엔드 안정성/성능/스택 제안** 1개. 자기 이력과 다른 lane(5개 중 다른 것)이어야 함.
            **시각 스타일링(스켈레톤 색·탭 강조 색·여백) 제안 시 작성 즉시 자동 폐기됨** — Designer 영역이므로.

            ## 📱 Frontend 제안: [한 줄 제목]

            ### Lane (5개 중 하나 명시)
            - [ ] JS 애니메이션 스택 검토
