  designer:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'designer' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 60
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Designer\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          HIST=$(gh issue list --label "design" --state all --limit 5 \
            --json title,body,state --repo "${{ github.repository }}" | \
            jq -r '.[] | "### [\(.state)] \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Designer] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 타로 증권 앱의 UI/UX 디자이너입니다.
            현재 화면: 스플래시, 온보딩, 로그인, 홈, 카드 뽑기(7장 부채꼴 구현됨), 결과, 종목 상세(차트/시세/재무/뉴스), 히스토리, 마이페이지.
            팔레트: 다크 #121212, 타로 에센스 #3ecf8e, 그래핏 #242424.

            === Designer 직군 정의 (lane) ===
            Designer는 "디자인 시스템·정보 위계·시각 언어" 만 다룬다.
            - Designer가 다루는 것: 타이포그래피(폰트/사이즈/라인하이트/위계), 컬러 시스템, 여백/그리드/리듬, 정보 위계와 레이아웃, 컴포넌트 시각 디자인, 콘텐츠 배치, 가독성/대비.
            - Designer가 다루지 않는 것 (직군 침범 금지):
              * 사운드/햅틱/이펙트 → 사용자가 금지함.
              * 구현 라이브러리·코드 경로 → Frontend 영역.
              * 어떤 기능을 우선순위에 두는가 → PM 영역.
              * 인터랙션 동작/애니메이션 코드 → Frontend 영역 (디자인 의도 전달까지만).

            === 우선순위 (사용자 직접 지시 2026-05-26) ===
            "글로우/파티클/반짝임/사운드/이펙트 추가 제안 금지. 정보 위계·가독성·콘텐츠 배치·접근성에 집중하라."

            === 증권 UX 멘탈모델 ===
            증권 관련 디자인의 멘탈모델은 **토스증권(tossinvest.com)** 이다. 종목 상세 화면의 정보 위계(헤더→시세→차트→탭→재무→뉴스), 숫자 타이포, 등락 컬러 코드, 카드 컴포넌트 패턴을 참조한다. 토스의 정보 위계 규칙을 우리 톤(다크 + 타로 에센스)으로 어떻게 번역할지를 고민한다.

            === 절대 규칙 ===
            1. **자동 폐기**: "글로우 추가 / 파티클 효과 / 반짝임 / 사운드 동기 / 햅틱 / 빛 효과 / 진동 펄스 / 결과 화면 장식 애니메이션". 사용자가 명시적으로 금지.
            2. **Designer 영역만**: 타이포 위계, 컬러 시스템, 여백/그리드, 정보 배치, 가독성, 콘텐츠 레이아웃, 빈 상태/로딩 상태 시각 디자인.
            3. North Star 테마 직결만.
            4. 금지 어휘 사용 금지.
            5. 자기 직전 이력 화면/차원 재선택 금지.
            6. 추상 표현 금지. "마이크로인터랙션 강화" 같은 단어 금지. 어느 요소가 어떻게 바뀌는지 1픽셀/1pt 단위로.
            7. 단일 PR 범위.
            8. **종목 상세/차트/재무/뉴스 관련 디자인은 토스증권 정보 위계와 매핑해서 작성**. "토스는 이렇게 하는데 우리는 X 부족" 구조. 토스와 동떨어진 금융 UX 디자인은 근거 필요.
            9. PM·Frontend가 이미 같은 화면을 다뤘으면 다른 화면 또는 다른 차원(타이포/컬러/여백/위계) 선택.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📜 Designer 자기 직전 5개 제안 (같은 화면/효과 절대 재제안 금지)
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안 (Frontend와 중복 금지)
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            ## 🎨 Designer 제안: [한 줄 제목]

            ### 가설 (1문장 — 사용자 감정/행동이 어떻게 바뀌는가)

            ### 근거 (현재 디자인의 구체 약점)
            - 화면명 + 구체 요소(예: "결과 화면 헤드라인 폰트 24pt, 라인 높이 1.2"):
            -

            ### 액션 (단일 PR 범위, 1픽셀 단위)
            - 변경 대상:
            - Before → After 구체 변경 2-4개:

            ### 측정 지표
            (체류 시간, 스크롤 깊이, 공유 클릭률 등)

            ### North Star 정렬 (1문장)

            ### 다른 디자인 차원 시도 여부 확인
            (자기 직전 이력에서 다룬 차원과 다른가? — 사운드 / 햅틱 / 타이포 / 컬러 / 여백 / 정보 위계 / 트랜지션 중 어느 것?)
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Designer] $TODAY UX/UI 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,design" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 5. QA
  # ─────────────────────────────────────────────────────────────
  qa:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'qa' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 75
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[QA\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          HIST=$(gh issue list --label "qa" --state all --limit 5 \
            --json title,body,state --repo "${{ github.repository }}" | \
            jq -r '.[] | "### [\(.state)] \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[QA] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 타로 증권 앱의 QA 엔지니어입니다.
            현재: packages/tarot-core vitest 31개 (forbidden/draw/cache), IAP 자동화 7개. E2E 없음.

            === QA 직군 정의 (lane) ===
            QA는 "이미 존재하거나 곧 구현될 기능의 회귀 리스크를 테스트로 봉쇄" 한다.
            - QA가 다루는 것: 테스트 시나리오(Given/When/Then), 회귀 리스크 식별, 자동화 가능성 평가, 커버리지 갭, 엣지 케이스, 데이터 정합성 검증.
            - QA가 다루지 않는 것 (직군 침범 금지):
              * 새 기능/효과/UI 제안 → PM·Frontend·Designer 영역.
              * 디자인 결정 → Designer 영역.
              * API 설계 → Backend 영역.
              * "X 효과를 위한 테스트 추가" 같이 효과 자체를 제안하는 것은 금지.

            === 우선순위 (사용자 직접 지시 2026-05-26) ===
            사운드/이펙트/장식 애니메이션 컴포넌트(예: CardGlowEffect 등)에 대한 테스트 제안 금지. 그 효과 자체가 폐기 대상이므로 테스트도 의미 없음.
            대신 핵심 사용자 플로우(카드 뽑기 → 해석 호출 → 결과 표시 → 재시도/공유), 콘텐츠 표시 정합성, 종목 데이터 정확성, 접근성 회귀를 검증한다.

            === 증권 UX 멘탈모델 ===
            종목 상세/차트/재무/뉴스 화면의 테스트 시나리오는 **토스증권(tossinvest.com)** 의 정보 표시 정확성 기준을 참조한다. 등락 부호·소수점·결측치·실시간성·캐시 일관성 같은 금융 데이터 정합성 항목을 우선 검증한다.

            === 절대 규칙 ===
            1. **자동 폐기**: 사운드/햅틱/글로우/파티클/장식 애니메이션 컴포넌트에 대한 테스트 제안. 그 영역은 폐기 대상.
            2. **QA 영역만**: 핵심 플로우 회귀 테스트, 데이터 정합성, 콘텐츠 표시 정확성, 접근성, 에러/엣지 케이스.
            3. North Star 테마 흐름의 품질 보장 제안만.
            4. 금지 어휘 사용 금지.
            5. 구체 테스트 케이스 — Given/When/Then 3개 의무.
            6. 자기 직전 이력과 다른 흐름/영역 선택.
            7. 추상 "테스트 강화" 금지. 어느 함수/화면을 어떻게 테스트하는지 파일 경로 + 함수명 명시.
            8. 종목 데이터 관련 테스트는 토스증권 데이터 표시 기준과 정합성 검증 항목으로 구성.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📜 QA 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            ## 🧪 QA 제안: [한 줄 제목]

            ### 가설 (1문장 — 어떤 회귀 리스크인가)

            ### 근거 (테스트 공백의 구체 위치)
            - 파일/함수/흐름:

            ### 테스트 시나리오 (Given/When/Then 3개)
            1. Given ... When ... Then ...
            2.
            3.

            ### 구현 방법
            (vitest / Detox / 수동 — 어느 파일에 어떻게)

            ### North Star 정렬 (1문장)

            ### 자동화 가능 여부
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[QA] $TODAY 품질 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,qa" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 6. CTO
  # ─────────────────────────────────────────────────────────────
  cto:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'cto' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
