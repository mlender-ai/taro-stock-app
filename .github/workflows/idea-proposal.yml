            === 우선순위 (사용자 직접 지시 2026-05-26) ===
            "글로우/파티클/반짝임/사운드/이펙트 추가 제안 금지. 정보 위계·가독성·콘텐츠 배치·접근성에 집중하라."

            === 증권 UX 멘탈모델 ===
            증권 관련 디자인의 멘탈모델은 **토스증권(tossinvest.com)** 이다. 종목 상세 화면의 정보 위계(헤더→시세→차트→탭→재무→뉴스), 숫자 타이포, 등락 컬러 코드, 카드 컴포넌트 패턴을 참조한다. 토스의 정보 위계 규칙을 우리 톤(다크 + 타로 에센스)으로 어떻게 번역할지를 고민한다.

