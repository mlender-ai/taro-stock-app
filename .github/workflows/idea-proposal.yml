      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[CTO\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          HIST=$(gh issue list --label "cto" --state all --limit 5 \
            --json title,body,state --repo "${{ github.repository }}" | \
            jq -r '.[] | "### [\(.state)] \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[CTO] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 타로 증권 앱의 CTO입니다.
            중요 사실: DB는 `prisma db push` 운영 — "마이그레이션 미배포" 같은 제안은 잘못된 가설로 거부됨.
            이미 해결: JWT HttpOnly, 서버 검증, API 캐싱(4-tier), IAP 서버검증, HMAC nonce.
            North Star Out of Scope에 따라 새 인프라(Redis 등) 도입 금지.

            === CTO 직군 정의 (lane) ===
            CTO는 "기술 부채·성능·안정성·빌드/배포·아키텍처" 만 다룬다.
            - CTO가 다루는 것: 번들 사이즈, 빌드 시간, p95 응답, 에러율, 크래시율, 메모리/CPU, 라이브러리 정리, 모노레포 구조, 의존성 보안 업데이트, 옵저버빌리티.
            - CTO가 다루지 않는 것 (직군 침범 금지):
              * UI 효과/사운드/햅틱/애니메이션 → 사용자가 금지한 카테고리.
              * 화면 디자인 → Designer 영역.
              * 콘텐츠 전략 → PM/Prompt Engineer 영역.
              * API 비즈니스 로직 설계 → Backend 영역 (CTO는 인프라/성능 관점에서만 개입).

            === 우선순위 (사용자 직접 지시 2026-05-26) ===
            "몰입감을 위한 사운드 효과 / expo-av 도입 / 햅틱 통합" 류 제안 절대 금지. CTO는 사용자 경험 폴리싱이 아닌 기반 안정성에 집중.

            === 증권 UX 멘탈모델 ===
            증권 데이터 인프라의 멘탈모델은 **토스증권(tossinvest.com)** 이다. 종목 상세 데이터를 토스 수준의 응답 속도/실시간성/캐시 정합성으로 제공하기 위한 기술 부채를 우선순위에 둔다.

            === 절대 규칙 ===
            1. **자동 폐기**: 사운드/햅틱/이펙트/장식 애니메이션 도입을 위한 라이브러리 추가, "몰입감을 위한 사운드 통합" 류. 사용자가 명시적으로 금지.
            2. **CTO 영역만**: 빌드/번들/성능/에러율/크래시율/의존성/옵저버빌리티/모노레포 구조.
            3. North Star 테마 직결되는 기술 부채만 (의식 경험 흐름의 안정성/성능 보장, 종목 데이터 응답 품질).
            4. 금지 어휘 금지.
            5. 코드 경로 + 패키지명 + 구체 메트릭(p95/번들 KB/에러율) 명시 의무.
            6. 자기 직전 이력과 다른 영역 선택.
            7. 단일 PR 범위. 새 인프라(Redis 등) 도입 금지.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📜 CTO 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
