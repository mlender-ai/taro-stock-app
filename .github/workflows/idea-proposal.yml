name: Daily Agent Council

on:
  schedule:
    - cron: "0 22 * * *"  # 매일 오전 7시 KST (UTC 22:00 전날)
  workflow_dispatch:
    inputs:
      agent:
        description: "실행할 에이전트 (all / pm / frontend / backend / designer / qa / cto / marketer / security / prompt_engineer)"
        required: false
        default: "all"

concurrency:
  group: agent-council
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  models: read

# ─────────────────────────────────────────────────────────────
# 공통 컨텍스트 (모든 에이전트 공유)
# 앱: 주식 시장 지표를 AI가 분석 → 타로 카드 형식으로 해석 제공 (네이티브 앱)
# 스택: React Native + Expo SDK 54, Next.js 14, PostgreSQL + Prisma, Claude/OpenAI AI
# 현재: 카드 뽑기(1장/3장), Apple/Google 로그인, 크레딧(IAP+광고), 히스토리/분석, 즐겨찾기, 어드민
# ─────────────────────────────────────────────────────────────

jobs:

  # ── 0. Prepare — 최근 피드백 로그 수집 (모든 에이전트 공유) ────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      feedback: ${{ steps.fetch.outputs.feedback }}
    steps:
      - name: Fetch Recent Feedback Logs
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FEEDBACK=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "feedback-log" \
            --state all \
            --limit 7 \
            --json title,body \
            | jq -r '.[] | "---\n## " + .title + "\n" + .body' 2>/dev/null || true)

          if [ -z "$FEEDBACK" ]; then
            FEEDBACK="피드백 이력 없음 — 첫 번째 사이클입니다. 기본 판단으로 제안하세요."
          fi

          echo "feedback<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$FEEDBACK" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

  # ── 1. PM — 제품 전략 / 사용자 니즈 ──────────────────────────
  pm:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'pm' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[PM] 제품 방향 및 기능 우선순위 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 타로 증권 앱의 Product Manager입니다.
            사용자 페르소나: MZ세대 개인 투자자, 타로에 관심 있는 주식 입문자.
            KPI: DAU, 크레딧 소비량, 앱스토어 평점, D7/D30 리텐션.
            당신의 시각: 사용자 문제 → 측정 가능한 임팩트 순으로 사고한다.
          prompt: |
            ## 📚 이전 사이클 사용자 피드백 (자기 개선 컨텍스트)
            아래 피드백을 읽고, 사용자가 good으로 평가한 방향으로 제안하고 bad로 평가한 유형은 피하세요.

            ${{ needs.prepare.outputs.feedback }}

            ---

            오늘의 제품 개선 우선순위를 분석하고 가장 임팩트 높은 아이디어 1개를 제안하세요.

            ## 🎯 PM 제안

            ## 사용자 문제
            (구체적인 페인 포인트 또는 놓치고 있는 기회)

            ## 기능 아이디어
            (솔루션 설명 — 사용자 관점에서)

            ## 성공 지표
            (측정 가능한 KPI, 목표 수치 포함)

            ## 우선순위 근거
            (왜 지금 이것이 중요한가)

            ## 난이도 및 예상 소요
            (S=1일 / M=1주 / L=2주+)
      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[PM] $(date '+%Y-%m-%d') 제품 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,pm" \
            --repo "${{ github.repository }}"

  # ── 2. Frontend — React Native / Expo / 모바일 UX ────────────
  frontend:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'frontend' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 15
      - name: "[Frontend] 모바일 UX / 성능 / 컴포넌트 개선 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 타로 증권 앱의 프런트엔드 개발자입니다.
            스택: React Native + Expo SDK 54, expo-router, zustand, StyleSheet.
            현재 화면: 홈(종목 검색), 카드 뽑기, 결과, 히스토리/분석, 마이페이지, 즐겨찾기, 컬렉션.
            당신의 시각: 컴포넌트 재사용성, 번들 크기, 60fps 애니메이션, 접근성.
          prompt: |
            ## 📚 이전 사이클 사용자 피드백 (자기 개선 컨텍스트)
            ${{ needs.prepare.outputs.feedback }}

            ---

            모바일 프런트엔드 관점에서 개선할 아이디어 1개를 제안하세요.

            ## 📱 Frontend 제안

            ## 현재 문제
            (UX 마찰, 성능 병목, 코드 중복, 접근성 미비 등)

            ## 개선 방안
            (구체적 구현: 컴포넌트명, 파일 경로, 라이브러리)

            ## 영향받는 화면/파일
            (수정 대상 목록)

            ## 예상 효과
            (성능 지표, 사용자 경험, 번들 크기 등)

            ## 구현 복잡도
            (S/M/L + 이유)
      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Frontend] $(date '+%Y-%m-%d') 모바일 UX 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,frontend,mobile" \
            --repo "${{ github.repository }}"

  # ── 3. Backend — API / DB / 인프라 ───────────────────────────
  backend:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'backend' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 30
      - name: "[Backend] API / DB / 인프라 개선 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 타로 증권 앱의 백엔드 개발자입니다.
            스택: Next.js 14 API Routes, PostgreSQL + Prisma ORM, Railway/Supabase 배포.
            핵심 API: /api/tarot/draw, /api/tarot/analytics, /api/tarot/credits, /api/admin/*.
            당신의 시각: API 성능, DB 쿼리 최적화, 캐싱, 확장성, 데이터 정합성.
          prompt: |
            ## 📚 이전 사이클 사용자 피드백 (자기 개선 컨텍스트)
            ${{ needs.prepare.outputs.feedback }}

            ---

            백엔드/인프라 관점에서 개선할 아이디어 1개를 제안하세요.

            ## ⚙️ Backend 제안

            ## 현재 문제
            (성능 병목, 쿼리 비효율, 캐싱 부재, 확장성 리스크 등)

            ## 개선 방안
            (API 설계, DB 인덱스, 캐싱 전략, 인프라 변경 등)

            ## 영향받는 파일/API
            (경로 포함)

            ## 예상 효과
            (레이턴시 감소, 비용 절감, 처리량 증가 등 수치 포함)

            ## 마이그레이션 위험도
            (없음 / 낮음 / 중간 / 높음)
      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Backend] $(date '+%Y-%m-%d') API/인프라 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,backend" \
            --repo "${{ github.repository }}"

  # ── 4. Designer — UX / UI / 비주얼 ──────────────────────────
  designer:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'designer' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 45
      - name: "[Designer] UX/UI/비주얼 디자인 개선 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 타로 증권 앱의 UI/UX 디자이너입니다.
            현재 디자인 시스템: 다크 테마(#121212), 타로 에센스 컬러(#3ecf8e), 그래핏 베이스(#242424).
            현재 화면: 스플래시, 온보딩, 로그인, 홈, 카드 뽑기, 결과, 히스토리, 마이페이지.
            당신의 시각: 감성적 몰입감, 시각적 계층구조, 마이크로인터랙션, 접근성, 일관된 디자인 언어.
          prompt: |
            ## 📚 이전 사이클 사용자 피드백 (자기 개선 컨텍스트)
            ${{ needs.prepare.outputs.feedback }}

            ---

            UX/UI 디자인 관점에서 개선할 아이디어 1개를 제안하세요.

            ## 🎨 Designer 제안

            ## 현재 디자인 문제
            (시각적 불일치, UX 마찰, 감성 연결 부족, 접근성 미비 등)

            ## 디자인 개선 방향
            (레이아웃, 컬러, 타이포그래피, 애니메이션, 마이크로인터랙션)

            ## 영향받는 화면
            (화면명 목록)

            ## 레퍼런스 패턴
            (벤치마크할 앱이나 디자인 패턴)

            ## 구현 복잡도
            (디자이너 관점: 낮음/중간/높음 + 개발자 관점)
      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Designer] $(date '+%Y-%m-%d') UX/UI 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,design" \
            --repo "${{ github.repository }}"

  # ── 5. QA — 품질 / 테스트 / 버그 예방 ───────────────────────
  qa:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'qa' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 60
      - name: "[QA] 품질 개선 / 테스트 커버리지 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 타로 증권 앱의 QA 엔지니어입니다.
            현재 테스트: packages/tarot-core vitest 31개 (forbidden/draw/cache). E2E 없음.
            당신의 시각: 회귀 버그 예방, 엣지 케이스 발굴, 자동화 가능한 테스트 시나리오.
          prompt: |
            ## 📚 이전 사이클 사용자 피드백 (자기 개선 컨텍스트)
            ${{ needs.prepare.outputs.feedback }}

            ---

            품질 보증 관점에서 개선할 아이디어 1개를 제안하세요.

            ## 🧪 QA 제안

            ## 현재 품질 리스크
            (버그 가능성이 높은 영역, 테스트 공백 지점)

            ## 개선 방안
            (테스트 케이스, 자동화 시나리오, 수동 체크리스트)

            ## 구체적 테스트 시나리오 3개
            1. (Given/When/Then 형식)
            2.
            3.

            ## 영향 범위
            (어떤 기능/흐름이 커버되는가)

            ## 구현 방법
            (vitest / Detox E2E / Playwright / 수동 QA)
      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[QA] $(date '+%Y-%m-%d') 품질 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,qa" \
            --repo "${{ github.repository }}"

  # ── 6. CTO — 기술 부채 / 아키텍처 / 확장성 ──────────────────
  cto:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'cto' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 75
      - name: "[CTO] 기술 부채 / 아키텍처 개선 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 타로 증권 앱의 CTO입니다.
            알려진 기술 부채: AdMob 프로덕션 ID 미입력, 트래킹 console.log 수준, 서버 사이드 검증 미비.
            당신의 시각: 장기적 확장성, 모노레포 건강도, 의존성 관리, 기술 선택의 미래 호환성.
          prompt: |
            ## 📚 이전 사이클 사용자 피드백 (자기 개선 컨텍스트)
            ${{ needs.prepare.outputs.feedback }}

            ---

            기술 부채 또는 아키텍처 관점에서 개선할 아이디어 1개를 제안하세요.

            ## 🏗️ CTO 제안

            ## 기술 부채 항목
            (구체적인 코드/아키텍처 문제)

            ## 방치 시 리스크
            (확장성 저하, 보안 취약, 개발 속도 저하 등)

            ## 개선 방향
            (리팩토링 전략, 마이그레이션 경로, 새 패턴 도입)

            ## 영향받는 파일/패키지
            (모노레포 기준 경로)

            ## 예상 ROI
            (투자 대비 효과 — 개발 속도, 비용, 안정성)
      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[CTO] $(date '+%Y-%m-%d') 기술 부채 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,cto,tech-debt" \
            --repo "${{ github.repository }}"

  # ── 7. Marketer — 성장 / 바이럴 / 리텐션 ────────────────────
  marketer:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'marketer' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 90
      - name: "[Marketer] 성장 / 바이럴 / 리텐션 개선 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 타로 증권 앱의 그로스 마케터입니다.
            채널: App Store(앱스토어 ASO), 소셜(인스타/틱톡), 바이럴 루프.
            현재 수익화: 크레딧 IAP(유료) + AdMob 리워드 광고(무료).
            당신의 시각: 신규 유입, 바이럴 계수(K-factor), 크레딧 소비 증대, D7/D30 리텐션.
          prompt: |
            ## 📚 이전 사이클 사용자 피드백 (자기 개선 컨텍스트)
            ${{ needs.prepare.outputs.feedback }}

            ---

            성장/마케팅 관점에서 개선할 아이디어 1개를 제안하세요.

            ## 📣 Marketer 제안

            ## 성장 기회
            (신규 유입, 리텐션, 바이럴 중 어디를 공략하는가)

            ## 전략 아이디어
            (구체적 기능 또는 캠페인)

            ## 실행 방법
            (앱 내 기능, ASO, 소셜 콘텐츠, 이벤트 등)

            ## 예상 지표 개선
            (설치 수, DAU, 크레딧 매출, 바이럴 계수 등 수치로)

            ## 비용/리소스
            (개발 工數, 마케팅 예산 필요 여부)
      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Marketer] $(date '+%Y-%m-%d') 성장 전략 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,marketing" \
            --repo "${{ github.repository }}"

  # ── 8. Security — 보안 / 규제 준수 ──────────────────────────
  security:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'security' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 105
      - name: "[Security] 보안/컴플라이언스 점검 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 타로 증권 앱의 보안 및 규정 준수 담당자입니다.
            앱: 금융 AI 해석 서비스. Apple/Google 로그인, IAP, 크레딧 시스템, 시장 데이터 포함.
            주요 위험: JWT 관리, IAP 영수증 서버 검증, 개인정보 처리, 금융광고 규제(자본시장법).
          prompt: |
            ## 📚 이전 사이클 사용자 피드백 (자기 개선 컨텍스트)
            ${{ needs.prepare.outputs.feedback }}

            ---

            현재 앱에서 점검하거나 강화해야 할 보안/컴플라이언스 항목 1개를 제안하세요.

            ## 🔒 Security 제안

            ## 위험 항목
            (구체적 취약점 또는 규제 미준수 사항)

            ## 현재 상태
            (어떤 코드/설정에서 이슈가 발생하는가)

            ## 개선 방안
            (코드/설정/프로세스 레벨 구체적 수정 방법)

            ## 우선순위
            (Critical/High/Medium/Low + 이유)

            ## 관련 규제/기준
            (OWASP, 자본시장법, Apple/Google 정책 등)
      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Security] $(date '+%Y-%m-%d') 보안 점검 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,security" \
            --repo "${{ github.repository }}"

  # ── 9. Prompt Engineer — AI 해석 품질 ───────────────────────
  prompt_engineer:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'prompt_engineer' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 120
      - name: "[Prompt Engineer] AI 해석 품질 개선 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 타로 증권 앱의 AI 해석 품질 담당 프롬프트 엔지니어입니다.
            현재: packages/tarot-core/src/prompts/interpret-v1.1.0.ts (한국어 최적화, SINGLE/THREE_CARD 분기).
            구조: 3단 폴백(LLM→캐시→프리빌트). 출력: {headline, summary, detail}.
            금칙어: 매수/매도/수익보장 등 금융 권유 표현 차단.
          prompt: |
            ## 📚 이전 사이클 사용자 피드백 (자기 개선 컨텍스트)
            ${{ needs.prepare.outputs.feedback }}

            ---

            현재 타로 카드 해석 프롬프트를 개선하거나 새 기능을 추가할 아이디어를 제안하세요.

            ## ✨ Prompt Engineer 제안

            ## 현재 문제 또는 기회
            (해석 품질, 사용자 반응, 폴백률, 안전 필터 충돌 등)

            ## 개선 방향
            (구체적 프롬프트 전략, 파라미터, 새 출력 필드)

            ## 샘플 비교
            개선 전: (짧게)
            개선 후: (짧게)

            ## 검증 방법
            (A/B 테스트, 폴백률 측정, 사용자 별점 비교)

            ## 토큰 비용 영향
            (증가 / 감소 / 동일)
      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Prompt Engineer] $(date '+%Y-%m-%d') AI 해석 품질 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,prompt" \
            --repo "${{ github.repository }}"

  # ── 10. CEO Brief — 모든 에이전트 종합 + 교차 검증 ──────────
  ceo_brief:
    needs: [prepare, pm, frontend, backend, designer, qa, cto, marketer, security, prompt_engineer]
    if: always() && (github.event.inputs.agent == 'all' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "[CEO] 에이전트 브리핑 종합 + 아이디어 교차 검증"
        uses: actions/ai-inference@v1
        id: brief
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 타로 증권 앱 CEO의 수석 비서 AI입니다.
            매일 아침 9개 팀 에이전트의 제안을 읽고 CEO가 5분 안에 판단할 수 있는 브리핑을 작성합니다.
            CEO 관심사: 사용자 성장, 수익화, 스토어 평점, 기술 부채, 팀 정렬.
            당신의 역할: 에이전트 간 시너지 발굴, 충돌 지점 명확화, 실행 우선순위 정렬.

            ## 🔴 현재 최우선 지시사항 (해제 전까지 절대 우선)
            **타로앱 사용자 경험 몰입감 완성이 유일한 우선순위다.**
            - 애니메이션 강화, 인터랙티브 UX, 의식(ritual) 느낌 구현 관련 제안은 반드시 실행 지시로 채택한다.
            - "이게 몰입감을 높이는가?"가 모든 우선순위 판단의 첫 번째 기준이다.
            - UX 몰입감 관련 항목(애니메이션, 카드 인터랙션, 의식感, 결과 화면 경험)은 절대 킬리스트에 넣지 않는다.
            - 카카오톡 공유, 사주팔자, 어드민 UI는 이 지시가 해제될 때까지 킬리스트 대상이다.
            - 이 지시는 사용자가 직접 "됐다"고 해제하기 전까지 유효하다. 어떤 OKR이나 보안 이슈보다 우선한다.
          prompt: |
            아래 9개 에이전트의 오늘 제안을 읽고 CEO 일일 브리핑을 작성하세요.

            ---
            **PM 제안:**
            ${{ needs.pm.outputs.proposal }}

            ---
            **Frontend 제안:**
            ${{ needs.frontend.outputs.proposal }}

            ---
            **Backend 제안:**
            ${{ needs.backend.outputs.proposal }}

            ---
            **Designer 제안:**
            ${{ needs.designer.outputs.proposal }}

            ---
            **QA 제안:**
            ${{ needs.qa.outputs.proposal }}

            ---
            **CTO 제안:**
            ${{ needs.cto.outputs.proposal }}

            ---
            **Marketer 제안:**
            ${{ needs.marketer.outputs.proposal }}

            ---
            **Security 제안:**
            ${{ needs.security.outputs.proposal }}

            ---
            **Prompt Engineer 제안:**
            ${{ needs.prompt_engineer.outputs.proposal }}

            ---

            ---

            ## 📚 이전 사이클 사용자 피드백 (우선순위 판단 개선 컨텍스트)
            아래 피드백을 반드시 반영하여 브리핑을 작성하세요.
            사용자가 good으로 평가한 방향의 항목을 실행 지시로 선택하고,
            bad로 평가된 유형의 항목은 킬리스트에 포함하세요.

            ${{ needs.prepare.outputs.feedback }}

            ---

            위 9개 제안과 피드백 이력을 종합하여 다음 형식으로 CEO 브리핑을 작성하세요:

            ## 📋 CEO Daily Brief

            ### 🚨 즉시 대응 (스토어 출시 차단 or 보안 리스크)
            (없으면 생략)

            ---

            ### ✅ 이번 주 실행 지시 (최대 2개)
            (피드백 이력에서 good 평가를 받은 방향 우선)

            #### 1️⃣ **[항목명]**
            - **담당 에이전트**:
            - **근거**: (OKR 연결 + 피드백 반영 여부 명시)
            - **예상 소요**:
            - **대상 OKR**:

            ---

            ### 🔍 에이전트 간 충돌 분석
            (의견이 갈리는 트레이드오프 — CEO 판단 포함)

            ---

            ### 💡 CEO 인사이트
            (피드백 이력에서 배운 패턴 + 오늘의 판단 근거)

            ---

            ### ❌ 지금 하지 않을 것 (Kill list)
            (피드백 이력에서 bad 평가를 받은 유형 포함)

            1. **[항목명]** ([에이전트]):
               - **이유**:
               - **재검토 조건**:

            ---

            ### 📊 에이전트별 제안 요약
            | 에이전트 | 대상 OKR | 제안 핵심 | CEO 판정 | 사유 |
            |---|---|---|---|---|

            ---

            ### 📅 내일 체크포인트
            (오늘 실행 지시의 진행 상황 확인 항목)
      - name: Create CEO Brief Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.brief.outputs.response }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "📋 [CEO Brief] $(date '+%Y-%m-%d') 일일 에이전트 브리핑" \
            --body-file /tmp/body.md \
            --label "ceo-brief,agent-council,daily" \
            --repo "${{ github.repository }}"
