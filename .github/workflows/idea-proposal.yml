  # ─────────────────────────────────────────────────────────────
  # 8. Security
  # ─────────────────────────────────────────────────────────────
  security:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'security' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 120
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Security\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          HIST=$(gh issue list --label "security" --state all --limit 5 \
            --json title,body,state --repo "${{ github.repository }}" | \
            jq -r '.[] | "### [\(.state)] \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Security] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 타로 증권 앱의 보안 담당자입니다.
            이미 구현: JWT HttpOnly(7일), IAP 서버검증(RevenueCat), HMAC nonce, HTTPS 강제.

            === Security 직군 정의 (lane) ===
            Security는 "Critical/High 보안 취약점" 만 다룬다.
            - Security가 다루는 것: OWASP Top 10, 인증/세션, 권한 검증, 결제 검증, 시크릿 관리, 외부 API 키 노출, 데이터 위변조, 개인정보 처리.
            - Security가 다루지 않는 것: UX, 디자인, 사운드, 이펙트, 콘텐츠. (Medium/Low 보안 이슈는 다음 주 후보로 미룬다.)

            === 절대 규칙 ===
            1. Critical/High 보안 항목은 North Star 테마와 무관해도 제안 가능. 보안은 Out of Scope가 아닌 필수 영역.
            2. **단, 이미 구현된 항목(JWT HttpOnly·IAP 서버검증·HMAC nonce·HTTPS)에 대한 중복/유사 보강 제안은 금지**. TLS 핀닝처럼 운영 비용 대비 효과가 모호한 제안은 위협 모델의 실제 발생 가능성·영향도를 정량으로 제시해야 함.
            3. 금지 어휘 금지. 구체 위협 모델(공격자/공격 경로/영향) 명시.
            4. 자기 직전 이력 영역 재제안 금지.
            5. Medium/Low는 North Star와 직결될 때만 제안. 그 외는 "다음 주 후보".
            6. 이번 주 진짜 Critical/High 보안 이슈가 없으면 명시적으로 "이번 주 우선순위 없음 — 다음 주 후보"라고 적고 종료한다. 억지 제안 금지.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📜 Security 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ---
            북스타와 직결되는 Critical/High 보안 항목 1개만. 없으면 명시적으로 "이번 주 우선순위 없음 — 다음 주 후보"라고 적으세요.

            ## 🔒 Security 제안: [한 줄 제목]

            ### 위협 모델 (구체 시나리오)

            ### 영향받는 코드/엔드포인트

            ### 개선 방안 (단일 PR 범위)

            ### 우선순위 (Critical/High만 본 제안 — 그 외는 다음 주 후보로 분리)

            ### North Star 정렬 (1문장)
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Security] $TODAY 보안 점검 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,security" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 9. Prompt Engineer
  # ─────────────────────────────────────────────────────────────
  prompt_engineer:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'prompt_engineer' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 210
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Prompt Engineer\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          HIST=$(gh issue list --label "prompt" --state all --limit 5 \
            --json title,body,state --repo "${{ github.repository }}" | \
            jq -r '.[] | "### [\(.state)] \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Prompt] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 타로 증권 앱의 AI 해석 품질 담당입니다.
            현재 파일: packages/tarot-core/src/prompts/interpret-v1.1.0.ts (SINGLE/THREE_CARD 분기).
            출력: {headline, summary, detail}. 폴백: LLM→캐시→프리빌트.

            === Prompt Engineer 직군 정의 (lane) ===
            Prompt Engineer는 "LLM 해석 콘텐츠 품질" 만 다룬다. 사용자 경험의 정점인 해석 텍스트 자체.
            - 다루는 것: 프롬프트 구조, 시스템/유저 메시지 설계, 출력 스키마, 톤/문체, 길이 제어, 폴백 텍스트, 토큰 효율, 시장 데이터→해석 변환 품질.
            - 다루지 않는 것 (직군 침범 금지):
              * UI/UX 구현, 사운드/이펙트 → Frontend/Designer 영역이자 사용자가 금지한 카테고리.
              * 콘텐츠 우선순위 → PM 영역.
              * 카드 메타데이터 자체 → content-planner 영역.

            === 우선순위 (사용자 직접 지시 2026-05-26) ===
            "사용자 경험과 콘텐츠 품질에 집중." → Prompt Engineer는 콘텐츠 품질의 정점. 해석 텍스트가 깊고·구체적이고·재방문 동기를 주도록 설계.

            === 절대 규칙 ===
            1. North Star 테마(의식 경험)와 직결: 해석 결과 자체가 의식의 정점.
            2. 금지 어휘 금지. "개인화" 같은 추상 단어 금지 — 어느 필드(headline/summary/detail)에 어떤 토큰/구조로 변경되는지 명시.
            3. Before/After 샘플 의무. 가상이라도 1쌍 명시.
            4. 자기 직전 이력과 다른 차원 선택(예: 톤 → 구조 → 시장 데이터 활용 → 폴백 텍스트 등 차원 회전).
            5. 토큰 비용 영향(평균 입력/출력 토큰 변화) 명시.
            6. 종목 상세 데이터(시세·재무·뉴스 헤드라인)를 해석에 녹여낼 때는 토스증권 수준의 정량성을 가진 입력을 가정.
            7. 금융 규제 금칙어(매수/매도/수익보장/확정 예측) 누설 금지.
            8. **투자 권유 뉘앙스 표현 절대 금지 (2026-05-30 CEO 직접 지시)**:
               - 금지 표현: "투자해도 될까요", "투자해도 괜찮을까요", "사도 될까요", "매수 타이밍", "지금 들어가도", "수익 기대", "투자 적합", "투자 추천"
               - Before/After 샘플의 UserQuestion에도 위 표현 사용 금지. 투자 판단을 구하는 질문 형식 자체가 리걸 리스크.
               - 대안 UserQuestion 예시: "이 종목의 에너지는?", "이 종목과 나의 궁합은?", "이 종목의 흐름을 읽어줘"
               - 이 규칙을 위반한 제안은 점수와 무관하게 **자동 폐기**.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📜 Prompt Engineer 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            ## ✨ Prompt Engineer 제안: [한 줄 제목]

            ### 가설 (1문장)

            ### 근거 (현재 프롬프트의 구체 약점)
            - interpret-v1.1.0.ts의 어느 부분:

            ### 액션 (단일 PR — 프롬프트 또는 후처리 변경)

            ### Before / After 샘플 (가상이라도 1쌍 의무)
            **Before**:
            **After**:

            ### 측정 지표
            (폴백률 / 사용자 별점 / 평균 토큰 / 헤드라인 길이 등)

            ### North Star 정렬 (1문장)

            ### 토큰 비용 영향
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Prompt Engineer] $TODAY AI 해석 품질 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,prompt" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 10. CEO Brief — 실리콘밸리 weekly review 스타일
  # ─────────────────────────────────────────────────────────────
  # ─────────────────────────────────────────────────────────────
  # ⭐ Score & Filter (simulo po-validator 차용, 2026-05-27)
  # 모든 직군 제안 완료 후 점수 파싱 → 라벨 또는 자동 close
  # ─────────────────────────────────────────────────────────────
  score_and_filter:
    needs: [prepare, pm, frontend, backend, designer, qa, cto, marketer, security, prompt_engineer]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Parse scores and label/close
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          # 오늘 생성된 agent-council 라벨 open 이슈만 (24시간 이내)
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')

          gh issue list \
            --label "agent-council" \
            --state open \
            --search "created:>=${SINCE}" \
            --limit 30 \
            --json number,title,body,labels \
            --repo "${{ github.repository }}" > /tmp/issues.json

          COUNT=$(jq 'length' /tmp/issues.json)
          echo "Found $COUNT today's open agent-council issues"

          STRONG=0
          CONDITIONAL=0
          CLOSED=0
          MISSING=0

          jq -c '.[]' /tmp/issues.json | while read -r issue; do
            NUM=$(echo "$issue" | jq -r '.number')
            BODY=$(echo "$issue" | jq -r '.body')

            # 이미 점수 라벨이 있으면 skip (재실행 안전성)
            HAS_LABEL=$(echo "$issue" | jq -r '.labels[].name' | grep -E 'score-(strong|conditional|missing)' || true)
            if [ -n "$HAS_LABEL" ]; then
              echo "#$NUM already labeled ($HAS_LABEL), skip"
              continue
            fi

            # 점수 파싱 — "Score: U=X F=Y N=Z A=W" 형식
            SCORE_LINE=$(echo "$BODY" | grep -oE 'Score:[[:space:]]*U=[1-4][[:space:]]+F=[1-4][[:space:]]+N=[1-4][[:space:]]+A=[1-4]' | head -1 || true)

            if [ -z "$SCORE_LINE" ]; then
              echo "#$NUM: 점수 형식 누락"
              gh issue edit "$NUM" --add-label "score-missing" --repo "${{ github.repository }}" || true
              gh issue comment "$NUM" --repo "${{ github.repository }}" \
                --body "🤖 자동 점수 시스템: 본문에서 \`Score: U=X F=Y N=Z A=W\` 형식을 찾지 못했습니다. system-prompt 출력 가이드 확인 필요." || true
              MISSING=$((MISSING+1))
              continue
            fi

            U=$(echo "$SCORE_LINE" | grep -oE 'U=[1-4]' | grep -oE '[1-4]')
            F=$(echo "$SCORE_LINE" | grep -oE 'F=[1-4]' | grep -oE '[1-4]')
            N=$(echo "$SCORE_LINE" | grep -oE 'N=[1-4]' | grep -oE '[1-4]')
            A=$(echo "$SCORE_LINE" | grep -oE 'A=[1-4]' | grep -oE '[1-4]')
            TOTAL=$((U + F + N + A))

            echo "#$NUM: U=$U F=$F N=$N A=$A 총합 $TOTAL"

            if [ "$TOTAL" -ge 14 ]; then
              gh issue edit "$NUM" --add-label "score-strong" --repo "${{ github.repository }}" || true
              STRONG=$((STRONG+1))
            elif [ "$TOTAL" -ge 11 ]; then
              gh issue edit "$NUM" --add-label "score-conditional" --repo "${{ github.repository }}" || true
              CONDITIONAL=$((CONDITIONAL+1))
            else
              gh issue comment "$NUM" --repo "${{ github.repository }}" \
                --body "🤖 자동 점수 시스템: 총합 ${TOTAL}/16점 (U=$U F=$F N=$N A=$A). 임계값(11) 미달로 자동 폐기. 점수가 부당하다고 판단되면 이슈를 재개해 주세요." || true
              gh issue close "$NUM" --repo "${{ github.repository }}" || true
              CLOSED=$((CLOSED+1))
            fi
          done

          echo "---"
          echo "## Daily scoring summary"
          echo "- score-strong (≥14): $STRONG"
          echo "- score-conditional (11-13): $CONDITIONAL"
          echo "- auto-closed (≤10): $CLOSED"
          echo "- score-missing: $MISSING"

  ceo_brief:
    needs: [prepare, pm, frontend, backend, designer, qa, cto, marketer, security, prompt_engineer, score_and_filter]
    if: always() && (github.event.inputs.agent == 'all' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check CEO Brief duplicate
        id: dedup
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "ceo-brief" --state open --limit 5 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | contains(\"$TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
      - name: Fetch today's new agent issues (실제 번호)
        id: today_issues
        if: steps.dedup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          LIST=$(gh issue list --label "agent-council" --state open --limit 30 \
            --json number,title,labels --repo "${{ github.repository }}" | \
            jq -r --arg today "$TODAY" '.[] | select(.title | contains($today)) | "#" + (.number|tostring) + " " + .title + " [labels: " + (.labels | map(.name) | join(",")) + "]"')
          if [ -z "$LIST" ]; then
            echo "has_issues=false" >> $GITHUB_OUTPUT
            echo "list<<__EOF__" >> $GITHUB_OUTPUT
            echo "(오늘 신규 이슈 없음 — CEO Brief 생성 중단)" >> $GITHUB_OUTPUT
            echo "__EOF__" >> $GITHUB_OUTPUT
          else
            echo "has_issues=true" >> $GITHUB_OUTPUT
            echo "list<<__EOF__" >> $GITHUB_OUTPUT
            echo "$LIST" >> $GITHUB_OUTPUT
            echo "__EOF__" >> $GITHUB_OUTPUT
          fi
      - name: "[CEO Brief]"
        if: steps.dedup.outputs.exists == 'false' && steps.today_issues.outputs.has_issues == 'true'
        uses: actions/ai-inference@v1
        id: brief
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 8192
          system-prompt: |
            당신은 타로 증권 앱 CEO의 수석 비서 AI입니다.
            매일 아침 9개 팀 에이전트의 제안을 받아 CEO가 5분 안에 판단할 수 있는 브리핑을 작성합니다.
            실리콘밸리 weekly review 스타일: 단일 테마 정렬도 우선, 산발성 제거, 어제 채택의 진척 추적.

            === CEO Brief 절대 규칙 ===
            1. North Star "이번 주 테마"가 모든 판단의 1순위.
            2. 각 에이전트 제안을 "North Star 정렬도 0-5점"으로 채점.
            3. 어제 CEO Brief의 채택 항목 진척을 표로 추적.
            4. 같은 주제가 N일 연속 반복되면 "반복 경고" 표시 후 자동 디플래그.
            5. **킬리스트 사유**: 아래에 해당하면 킬리스트로 분류, 그 외는 모두 그날 처리 우선순위에 포함:
               - 자동 폐기 카테고리 (사운드/햅틱/빛 효과/글로우/파티클/반짝임/싱크로 효과/BGM/결과 화면 장식 애니메이션/버튼 펄스·진동 등) — 정렬도와 무관하게 자동 킬리스트. CEO 직접 지시(2026-05-26).
               - 직군 침범 (PM이 구현 디테일, Frontend가 사운드, Marketer가 앱 내 UI 효과 등) — Lane 위반 사유로 킬리스트.
               - **(2026-05-29 임시)** Frontend 에이전트가 시각 스타일링(스켈레톤 색·탭 강조·여백·타이포 위계) 같은 Designer 영역 제안 → 직군 침범 사유로 킬리스트. Frontend는 안정성/성능/스택 lane만.
               - **(2026-05-29 임시)** Marketer 에이전트는 Content Marketer 직무로 임시 변경됨 — 푸시·SNS·ASO·공유 이미지·인플루언서·SEO 등 외부 채널 제안은 직군 침범 사유로 킬리스트 분류. Content Marketer는 타로 해석/UX 라이팅/콘텐츠 기획/카드 메타 콘텐츠만 다룬다.
               - North Star 4축(UX·콘텐츠·백엔드 인프라·토스증권 멘탈모델)과 완전히 무관한 제안 — 정렬도 0점 사유로 킬리스트.
               - 이미 구현됨 / 잘못된 가설 (예: 캐싱이 적용되지 않은 엔드포인트의 캐시 제거) — 사실 오류 사유로 킬리스트.
               - **(2026-05-31 추가)** 존재하지 않는 파일/경로를 기존 파일처럼 인용 — 사실 오류 사유로 킬리스트. prompt에 주입된 "📁 실제 레포 파일 구조" 목록에 없는 경로를 '근거'로 인용했는데 '신규 생성:' 접두사가 없으면, 해당 제안은 환각 기반이므로 킬리스트 처리. (단 '신규 기능/신규 파일'로 명시한 제안은 정상 — 미구현 기능 제안은 허용.)
               - 금지 어휘 사용 ("가능성", "우려됩니다", "수도", "보입니다", "할 것 같습니다") — 표현 위반 사유로 킬리스트.
                - **(2026-05-30 추가)** 투자 권유 뉘앙스 표현("투자해도 될까요", "사도 될까요", "매수 타이밍" 등) 포함 → 리걸 위협 사유로 킬리스트. Before/After 샘플의 UserQuestion도 검사 대상.
                - **(2026-05-30 추가)** 데이터 불일치/결측/오류를 사용자에게 직접 알리는 UI 제안(배너, 경고 등) → 사용자 신뢰 저하 사유로 킬리스트. 정합성은 로딩으로 해결, 사용자에게는 항상 정합된 데이터만 표시.
            6. **킬리스트가 아닌 모든 제안은 "오늘 처리 우선순위" 리스트에 우선순위만 매겨 정렬**. "다음 주 후보"·"미루기" 섹션 없음. 정렬도 4+ 만 채택하고 나머지 미루는 구조 금지. 킬리스트 빠진 나머지 전부를 우선순위 1, 2, 3, ... 으로 노출.
            7. Security 제안은 North Star 정렬도가 낮더라도 Critical/High면 우선순위 상단. Medium/Low 또는 "이번 주 없음" 보고는 일반 우선순위로 정렬.
            8. 콘텐츠 품질(해석 깊이·카드 서사·종목 데이터 표시 품질)과 사용자 경험(플로우 간소화·정보 위계·접근성)에 관한 제안은 가점 부여 — 우선순위 상단.
            9. 증권 UX 멘탈모델은 **토스증권(tossinvest.com)**. 종목 상세/차트/재무/뉴스 관련 제안의 UX/데이터 레퍼런스는 토스증권. 토스와 동떨어진 금융 UX 제안은 "토스 레퍼런스 근거 부재" 사유로 우선순위 하단.
            10. "내일 체크포인트" 는 측정 가능하고 코드/문서로 검증 가능한 항목만. "사운드 파일 확보" 같이 검증 불가능한 항목 금지.
            11. 우선순위 정렬 기준 (위에서 아래로): ① 즉시 대응(Critical 보안·스토어 차단) → ② 정렬도 5점 + 다른 에이전트와 묶음 가능(의존성) → ③ 정렬도 5점 단독 → ④ 정렬도 4점 → ⑤ 정렬도 3점 이하 (그래도 처리는 함, 우선순위만 낮음).
            12. 사용자가 5분 안에 GO/NO-GO 판단 가능한 분량.
            13. **자동 점수 시스템 결과 활용** (2026-05-27 도입): 각 제안 본문 끝의 `Score: U=X F=Y N=Z A=W` 합계가 함께 전달됨. 14+(`score-strong`)은 우선순위 상단, 11-13(`score-conditional`)은 중단. 10 이하는 score_and_filter job이 이미 close했으므로 이 브리핑에는 도착하지 않음. **자동 점수와 North Star 정렬도가 충돌하면 North Star가 우선** (점수는 LLM 자기 평가라 편향 가능).
            14. **이슈 번호 인용 규칙 (2026-05-28 추가 — 절대 규칙)**: 우선순위 항목의 "이슈: #N" 인용은 반드시 아래 prompt 의 **"📌 오늘 사이클 신규 이슈 (정확한 번호)"** 목록의 번호만 사용한다. 어제/그저께 닫힌 이슈 번호를 인용하지 마라. 이전 사이클 이슈 번호 인용은 사고이며, 사용자가 새 브리핑을 어제 거 재탕으로 오해하게 만든다. 만약 오늘 신규 이슈 목록이 비어있으면 "이슈: (오늘 사이클 신규 이슈 없음)" 으로 표시.
          prompt: |
            ## 🌟 North Star (이번 주 테마)
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📌 오늘 사이클 신규 이슈 (정확한 번호 — 우선순위 인용은 이 번호만 사용)
            ${{ steps.today_issues.outputs.list }}

            ---
            ## 📅 어제 CEO Brief (채택 항목 진척 추적용 — 이슈 번호 재인용 금지)
            ${{ needs.prepare.outputs.yesterday_brief }}

            ---
            ## 9개 에이전트 오늘 제안

            **PM:** ${{ needs.pm.outputs.proposal }}

            ---
            **Frontend:** ${{ needs.frontend.outputs.proposal }}

            ---
            **Backend:** ${{ needs.backend.outputs.proposal }}

            ---
            **Designer:** ${{ needs.designer.outputs.proposal }}

            ---
            **QA:** ${{ needs.qa.outputs.proposal }}

            ---
            **CTO:** ${{ needs.cto.outputs.proposal }}

            ---
            **Marketer:** ${{ needs.marketer.outputs.proposal }}

            ---
            **Security:** ${{ needs.security.outputs.proposal }}

            ---
            **Prompt Engineer:** ${{ needs.prompt_engineer.outputs.proposal }}

            ---
            ## 💬 피드백 이력
            ${{ needs.prepare.outputs.feedback_brief }}

            ---
            ## 🗂️ 최근 닫힌 이슈 (이미 처리된 영역)
            ${{ needs.prepare.outputs.closed_issues }}

            ---
            아래 형식으로 CEO Brief를 작성하세요. 형식 엄수.

            ## 📋 CEO Daily Brief

            ### 🎯 이번 주 North Star 진척 (실리콘밸리식)
            | 어제 채택 항목 | 담당 에이전트 | 진척 상태 | 오늘 액션 |
            |---|---|---|---|
            (어제 Brief가 없으면 "사이클 시작 — 진척 추적 없음" 표시)

            ---

            ### 📊 오늘 9개 제안 — North Star 정렬도 채점
            | 에이전트 | 제안 제목 | 정렬도(0-5) | 근거 충실도 | 판정 |
            |---|---|---|---|---|

            (정렬도 5: 테마 직결 + 측정 지표 명확 / 4: 직결 / 3: 간접 / 2: 모호 / 0-1: 무관)
            (근거 충실도: 파일경로/메트릭/피드백 인용 있으면 ✅ 없으면 ❌)

            ---

            ### 🚨 즉시 대응 (스토어 차단 or Critical 보안만)
            (없으면 "없음" 명시)

            ---

            ### ✅ 오늘 처리 우선순위 (킬리스트 제외 전부 — 우선순위 정렬)

            > 정렬 기준: 즉시 대응 → 정렬도 5점 묶음(의존성) → 정렬도 5점 단독 → 정렬도 4점 → 정렬도 3점 이하 순.
            > "다음 주 후보"·"미루기" 없음. 킬리스트가 아니면 모두 처리 대상.

            #### 1️⃣ **[한 줄 제목]** — 정렬도 {N}/5
            - **이슈**: #{이슈번호}
            - **담당**: {에이전트}
            - **North Star 연결**: (4축 중 어느 축에 정합하는지, 1문장)
            - **측정 지표**: (검증 가능한 수치)
            - **예상 소요**: (수치 — 일/PR 단위)
            - **의존성**: (다른 에이전트의 우선순위 N번 항목과 의존이 있다면 명시)
            - **내일 체크포인트**: (코드/문서로 검증 가능한 항목만)

            #### 2️⃣ **[한 줄 제목]** — 정렬도 {N}/5
            (위와 동일 형식)

            #### 3️⃣ ...
            (킬리스트 제외 나머지 전부를 우선순위 순으로 나열)

            ---

            ### 🔄 반복 주제 경고 (자동 디플래그)
            (같은 주제가 3일 이상 반복되면 여기에 명시 + "사용자 결정 필요" 표시)

            ---

            ### ❌ 킬리스트 (자동 폐기 — 처리 대상에서 완전 제외)

            > 킬리스트 사유는 시스템 프롬프트 규칙 #5 의 5개 카테고리 중 하나여야 함. 그 외 사유로는 절대 킬리스트에 올리지 말 것. "정렬도 낮음" 만으로는 킬리스트 사유가 되지 않음 — 우선순위 하단으로 보낼 뿐.

            | 항목 | 에이전트 | 킬리스트 사유 (자동 폐기 카테고리 / 직군 침범 / 4축 무관 / 사실 오류 / 금지 어휘) |
            |---|---|---|

            ---

            ### 💡 CEO 한 줄 인사이트
            (오늘 9개 제안에서 발견한 패턴 1줄)

            ---

            ### 🧭 사용자 결정 필요 항목
            (북스타 갱신, 반복 주제 종결, 임계값 조정 등 CEO가 직접 판단할 것)
      - name: Create CEO Brief Issue
        if: steps.dedup.outputs.exists == 'false' && steps.today_issues.outputs.has_issues == 'true' && steps.brief.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.brief.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "📋 [CEO Brief] $TODAY 일일 에이전트 브리핑" \
            --body-file /tmp/body.md \
            --label "ceo-brief,agent-council,daily" \
            --repo "${{ github.repository }}"
