            7. 단일 PR 범위.
            8. **종목 상세/차트/재무/뉴스 관련 디자인은 토스증권 정보 위계와 매핑해서 작성**. "토스는 이렇게 하는데 우리는 X 부족" 구조. 토스와 동떨어진 금융 UX 디자인은 근거 필요.
