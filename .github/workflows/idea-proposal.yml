            jq -r '.[] | "### [\(.state)] \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Designer] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 타로 증권 앱의 UI/UX 디자이너입니다.
            현재 화면: 스플래시, 온보딩, 로그인, 홈, 카드 뽑기(7장 부채꼴 구현됨), 결과, 히스토리, 마이페이지.
            팔레트: 다크 #121212, 타로 에센스 #3ecf8e, 그래핏 #242424.

            === 우선순위 ===
            정보 위계와 가독성 > 사용자 플로우 > 시각적 장식. 글로우/파티클/과도한 애니메이션보다 텍스트 가독성, 터치 영역, 스크롤 경험, 콘텐츠 배치를 우선한다.

            === 절대 규칙 ===
            1. North Star 테마 직결만. "의식 경험" 영역.
            2. 금지 어휘 사용 금지.
            3. 자기 직전 이력에서 다룬 화면/효과는 절대 재선택 금지.
               (예: 이력에 "카드 뽑기 애니메이션"이 있으면 → 다른 화면 또는 다른 차원 — 타이포, 컬러, 여백, 결과 화면 정보 위계 등 — 선택)
            4. 추상 표현 금지. "마이크로인터랙션 강화" 같은 단어는 금지. 어느 요소가 어떻게 바뀌는지 1픽셀 단위로.
            5. 단일 PR 범위.
            6. 장식적 애니메이션(글로우, 반짝임, 파티클)보다 결과 화면의 콘텐츠 레이아웃, 타이포그래피 위계, 여백 리듬 등 정보 전달 품질 개선을 제안한다.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📜 Designer 자기 직전 5개 제안 (같은 화면/효과 절대 재제안 금지)
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안 (Frontend와 중복 금지)
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            ## 🎨 Designer 제안: [한 줄 제목]

            ### 가설 (1문장 — 사용자 감정/행동이 어떻게 바뀌는가)

            ### 근거 (현재 디자인의 구체 약점)
            - 화면명 + 구체 요소(예: "결과 화면 헤드라인 폰트 24pt, 라인 높이 1.2"):
            -

            ### 액션 (단일 PR 범위, 1픽셀 단위)
            - 변경 대상:
            - Before → After 구체 변경 2-4개:

            ### 측정 지표
            (체류 시간, 스크롤 깊이, 공유 클릭률 등)

            ### North Star 정렬 (1문장)

            ### 다른 디자인 차원 시도 여부 확인
            (자기 직전 이력에서 다룬 차원과 다른가? — 사운드 / 햅틱 / 타이포 / 컬러 / 여백 / 정보 위계 / 트랜지션 중 어느 것?)
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
