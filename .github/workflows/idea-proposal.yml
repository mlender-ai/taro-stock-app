name: Daily Agent Council

on:
  schedule:
    - cron: "30 20 * * *"  # 05:30 KST (UTC 20:30 전날)
  workflow_dispatch:
    inputs:
      agent:
        description: "실행할 에이전트 (all / pm / frontend / backend / designer / qa / cto / marketer / security / prompt_engineer)"
        required: false
        default: "all"

concurrency:
  group: agent-council
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  models: read

env:
  AI_MODEL: openai/gpt-4o
  AI_API_URL: https://models.inference.ai.azure.com/chat/completions
  AI_MAX_RETRIES: 3
  AI_RETRY_DELAY: 45

jobs:

  # ═══════════════════════════════════════════════════
  # Wave 1 — PM, Frontend, Backend (병렬)
  # ═══════════════════════════════════════════════════

  pm:
    if: >-
      github.event.inputs.agent == 'all' ||
      github.event.inputs.agent == 'pm' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.result.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[PM] 제품 방향 및 기능 우선순위 제안"
        id: result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source .github/scripts/ai-inference.sh
          source .github/scripts/load-context.sh

          SYSTEM="당신은 타로 증권 앱의 Product Manager입니다.
          사용자 페르소나: MZ세대 개인 투자자, 타로에 관심 있는 주식 입문자.
          KPI: DAU, 크레딧 소비량, 앱스토어 평점, D7/D30 리텐션.
          현재 구현: 카드 뽑기(1장/3장), Apple/Google 로그인, 크레딧(IAP+광고), 히스토리/분석, 즐겨찾기, 어드민.

          ${AGENT_CONTEXT}

          중요: 당신의 제안은 반드시 이번 분기 OKR 중 하나에 기여해야 합니다. 어떤 OKR에 기여하는지 명시하세요.
          과거 학습 기록을 참고하여 이전에 거부된 동일한 방향의 제안을 반복하지 마세요."

          PROMPT="오늘의 제품 개선 우선순위를 분석하고 가장 임팩트 높은 아이디어 1개를 제안하세요.

          ## 🎯 PM 제안
          ## 대상 OKR (O1/O2/O3/O4 중 택 1)
          ## 사용자 문제
          ## 기능 아이디어
          ## 성공 지표
          ## 우선순위 근거
          ## 난이도 (S/M/L)"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT")
          { echo "response<<__EOF__"; echo "$RESULT"; echo "__EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.result.outputs.response }}
        run: |
          printenv BODY > /tmp/body.md
          gh issue create \
            --title "[PM] $(TZ=Asia/Seoul date '+%Y-%m-%d') 제품 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,pm"

  frontend:
    if: >-
      github.event.inputs.agent == 'all' ||
      github.event.inputs.agent == 'frontend' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.result.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[Frontend] 모바일 UX / 성능 / 컴포넌트 개선 제안"
        id: result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source .github/scripts/ai-inference.sh
          source .github/scripts/load-context.sh

          SYSTEM="당신은 타로 증권 앱의 프런트엔드 개발자입니다.
          스택: React Native + Expo SDK 54, expo-router, zustand, StyleSheet.
          현재 화면: 홈(종목 검색), 카드 뽑기, 결과, 히스토리/분석, 마이페이지, 즐겨찾기, 컬렉션.
          당신의 시각: 컴포넌트 재사용성, 번들 크기, 60fps 애니메이션, 접근성.

          ${AGENT_CONTEXT}

          중요: 당신의 제안은 반드시 이번 분기 OKR 중 하나에 기여해야 합니다.
          과거 학습 기록을 참고하여 이전에 거부된 동일한 방향의 제안을 반복하지 마세요."

          PROMPT="모바일 프런트엔드 관점에서 개선할 아이디어 1개를 제안하세요.

          ## 📱 Frontend 제안
          ## 대상 OKR (O1/O2/O3/O4 중 택 1)
          ## 현재 문제
          ## 개선 방안
          ## 영향받는 화면/파일
          ## 예상 효과
          ## 구현 복잡도 (S/M/L)"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT")
          { echo "response<<__EOF__"; echo "$RESULT"; echo "__EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.result.outputs.response }}
        run: |
          printenv BODY > /tmp/body.md
          gh issue create \
            --title "[Frontend] $(TZ=Asia/Seoul date '+%Y-%m-%d') 모바일 UX 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,frontend,mobile"

  backend:
    if: >-
      github.event.inputs.agent == 'all' ||
      github.event.inputs.agent == 'backend' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.result.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[Backend] API / DB / 인프라 개선 제안"
        id: result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source .github/scripts/ai-inference.sh
          source .github/scripts/load-context.sh

          SYSTEM="당신은 타로 증권 앱의 백엔드 개발자입니다.
          스택: Next.js 14 API Routes, PostgreSQL + Prisma ORM.
          핵심 API: /api/tarot/draw, /api/tarot/analytics, /api/tarot/credits, /api/admin/*.
          당신의 시각: API 성능, DB 쿼리 최적화, 캐싱, 확장성, 데이터 정합성.

          ${AGENT_CONTEXT}

          중요: 당신의 제안은 반드시 이번 분기 OKR 중 하나에 기여해야 합니다.
          과거 학습 기록을 참고하여 이전에 거부된 동일한 방향의 제안을 반복하지 마세요."

          PROMPT="백엔드/인프라 관점에서 개선할 아이디어 1개를 제안하세요.

          ## ⚙️ Backend 제안
          ## 대상 OKR (O1/O2/O3/O4 중 택 1)
          ## 현재 문제
          ## 개선 방안
          ## 영향받는 파일/API
          ## 예상 효과
          ## 마이그레이션 위험도"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT")
          { echo "response<<__EOF__"; echo "$RESULT"; echo "__EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.result.outputs.response }}
        run: |
          printenv BODY > /tmp/body.md
          gh issue create \
            --title "[Backend] $(TZ=Asia/Seoul date '+%Y-%m-%d') API/인프라 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,backend"

  # ═══════════════════════════════════════════════════
  # Wave 2 — Designer, QA, CTO (병렬, Wave 1 완료 후)
  # ═══════════════════════════════════════════════════

  designer:
    needs: [pm, frontend, backend]
    if: >-
      always() &&
      (github.event.inputs.agent == 'all' ||
       github.event.inputs.agent == 'designer' ||
       github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.result.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[Designer] UX/UI/비주얼 디자인 개선 제안"
        id: result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source .github/scripts/ai-inference.sh
          source .github/scripts/load-context.sh

          SYSTEM="당신은 타로 증권 앱의 UI/UX 디자이너입니다.
          디자인 시스템: 다크 테마(#121212), 타로 에센스(#3ecf8e), 그래핏 베이스(#242424).
          당신의 시각: 감성적 몰입감, 시각적 계층구조, 마이크로인터랙션, 접근성, 일관된 디자인 언어.

          ${AGENT_CONTEXT}

          중요: 당신의 제안은 반드시 이번 분기 OKR 중 하나에 기여해야 합니다.
          과거에 '구현 비용이 높은 제안'으로 거부된 패턴에 주의하세요. 출시 전에는 기본기 완성이 우선입니다."

          PROMPT="UX/UI 디자인 관점에서 개선할 아이디어 1개를 제안하세요.

          ## 🎨 Designer 제안
          ## 대상 OKR (O1/O2/O3/O4 중 택 1)
          ## 현재 디자인 문제
          ## 디자인 개선 방향
          ## 영향받는 화면
          ## 레퍼런스 패턴
          ## 구현 복잡도"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT")
          { echo "response<<__EOF__"; echo "$RESULT"; echo "__EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.result.outputs.response }}
        run: |
          printenv BODY > /tmp/body.md
          gh issue create \
            --title "[Designer] $(TZ=Asia/Seoul date '+%Y-%m-%d') UX/UI 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,design"

  qa:
    needs: [pm, frontend, backend]
    if: >-
      always() &&
      (github.event.inputs.agent == 'all' ||
       github.event.inputs.agent == 'qa' ||
       github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.result.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[QA] 품질 개선 / 테스트 커버리지 제안"
        id: result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source .github/scripts/ai-inference.sh
          source .github/scripts/load-context.sh

          SYSTEM="당신은 타로 증권 앱의 QA 엔지니어입니다.
          현재 테스트: packages/tarot-core vitest 92개+. Playwright E2E 12케이스 (admin + API health).
          당신의 시각: 회귀 버그 예방, 엣지 케이스 발굴, 자동화 가능한 테스트 시나리오.

          ${AGENT_CONTEXT}

          중요: 당신의 제안은 반드시 이번 분기 OKR 중 하나에 기여해야 합니다.
          1인 개발 체제를 고려하여 현실적인 테스트 범위를 제안하세요."

          PROMPT="품질 보증 관점에서 개선할 아이디어 1개를 제안하세요.

          ## 🧪 QA 제안
          ## 대상 OKR (O1/O2/O3/O4 중 택 1)
          ## 현재 품질 리스크
          ## 개선 방안
          ## 구체적 테스트 시나리오 3개
          ## 영향 범위
          ## 구현 방법 (vitest / Playwright / 수동)"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT")
          { echo "response<<__EOF__"; echo "$RESULT"; echo "__EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.result.outputs.response }}
        run: |
          printenv BODY > /tmp/body.md
          gh issue create \
            --title "[QA] $(TZ=Asia/Seoul date '+%Y-%m-%d') 품질 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,qa"

  cto:
    needs: [pm, frontend, backend]
    if: >-
      always() &&
      (github.event.inputs.agent == 'all' ||
       github.event.inputs.agent == 'cto' ||
       github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.result.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[CTO] 기술 부채 / 아키텍처 개선 제안"
        id: result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source .github/scripts/ai-inference.sh
          source .github/scripts/load-context.sh

          SYSTEM="당신은 타로 증권 앱의 CTO입니다.
          알려진 기술 부채: 서버 사이드 IAP 검증 RevenueCat 연동 필요, JWT 보안 강화 (Phase 5 예정).
          완료된 부채: AdMob 환경 분리 (2026-05-19 완료).
          당신의 시각: 장기적 확장성, 모노레포 건강도, 의존성 관리, 기술 선택의 미래 호환성.

          ${AGENT_CONTEXT}

          중요: 기술 부채는 중요하지만, '지금 안 갚으면 나중에 10배 비싸지는 것'과 '나중에 해도 되는 것'을 구분하세요.
          OKR O4(지속 가능한 개발 체계)와 O1(앱스토어 출시)에 집중하세요."

          PROMPT="기술 부채 또는 아키텍처 관점에서 개선할 아이디어 1개를 제안하세요.

          ## 🏗️ CTO 제안
          ## 대상 OKR (O1/O2/O3/O4 중 택 1)
          ## 기술 부채 항목
          ## 방치 시 리스크
          ## 개선 방향
          ## 영향받는 파일/패키지
          ## 예상 ROI"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT")
          { echo "response<<__EOF__"; echo "$RESULT"; echo "__EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.result.outputs.response }}
        run: |
          printenv BODY > /tmp/body.md
          gh issue create \
            --title "[CTO] $(TZ=Asia/Seoul date '+%Y-%m-%d') 기술 부채 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,cto,tech-debt"

  # ═══════════════════════════════════════════════════
  # Wave 3 — Marketer, Security, Prompt Engineer (병렬, Wave 2 완료 후)
  # ═══════════════════════════════════════════════════

  marketer:
    needs: [designer, qa, cto]
    if: >-
      always() &&
      (github.event.inputs.agent == 'all' ||
       github.event.inputs.agent == 'marketer' ||
       github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.result.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[Marketer] 성장 / 바이럴 / 리텐션 개선 제안"
        id: result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source .github/scripts/ai-inference.sh
          source .github/scripts/load-context.sh

          SYSTEM="당신은 타로 증권 앱의 그로스 마케터입니다.
          채널: App Store ASO, 소셜(인스타/틱톡), 바이럴 루프.
          수익화: 크레딧 IAP + AdMob 리워드 광고 + 공유 리워드.
          당신의 시각: 신규 유입, 바이럴 계수(K-factor), 크레딧 소비 증대, D7/D30 리텐션.

          ${AGENT_CONTEXT}

          중요: 앱 미출시 상태에서 대규모 마케팅 캠페인은 의미 없습니다.
          출시 준비(ASO, 스크린샷, 앱 설명)와 바이럴 루프 설계에 집중하세요."

          PROMPT="성장/마케팅 관점에서 개선할 아이디어 1개를 제안하세요.

          ## 📣 Marketer 제안
          ## 대상 OKR (O1/O2/O3/O4 중 택 1)
          ## 성장 기회
          ## 전략 아이디어
          ## 실행 방법
          ## 예상 지표 개선
          ## 비용/리소스"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT")
          { echo "response<<__EOF__"; echo "$RESULT"; echo "__EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.result.outputs.response }}
        run: |
          printenv BODY > /tmp/body.md
          gh issue create \
            --title "[Marketer] $(TZ=Asia/Seoul date '+%Y-%m-%d') 성장 전략 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,marketing"

  security:
    needs: [designer, qa, cto]
    if: >-
      always() &&
      (github.event.inputs.agent == 'all' ||
       github.event.inputs.agent == 'security' ||
       github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.result.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[Security] 보안/컴플라이언스 점검 제안"
        id: result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source .github/scripts/ai-inference.sh
          source .github/scripts/load-context.sh

          SYSTEM="당신은 타로 증권 앱의 보안 및 규정 준수 담당자입니다.
          앱: 금융 AI 해석 서비스. Apple/Google 로그인, IAP, 크레딧 시스템.
          위험: JWT 관리, IAP 영수증 서버 검증, 개인정보 처리, 금융광고 규제(자본시장법).

          ${AGENT_CONTEXT}

          중요: 보안은 중요하지만 '1인 개발에서 실현 가능한' 수준을 제안하세요.
          HashiCorp Vault 같은 엔터프라이즈 솔루션은 현실적이지 않습니다."

          PROMPT="보안/컴플라이언스 항목 1개를 제안하세요.

          ## 🔒 Security 제안
          ## 대상 OKR (O1/O2/O3/O4 중 택 1)
          ## 위험 항목
          ## 현재 상태
          ## 개선 방안
          ## 우선순위 (Critical/High/Medium/Low)
          ## 관련 규제/기준"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT")
          { echo "response<<__EOF__"; echo "$RESULT"; echo "__EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.result.outputs.response }}
        run: |
          printenv BODY > /tmp/body.md
          gh issue create \
            --title "[Security] $(TZ=Asia/Seoul date '+%Y-%m-%d') 보안 점검 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,security"

  prompt_engineer:
    needs: [designer, qa, cto]
    if: >-
      always() &&
      (github.event.inputs.agent == 'all' ||
       github.event.inputs.agent == 'prompt_engineer' ||
       github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.result.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[Prompt Engineer] AI 해석 품질 개선 제안"
        id: result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source .github/scripts/ai-inference.sh
          source .github/scripts/load-context.sh

          SYSTEM="당신은 타로 증권 앱의 AI 해석 품질 담당 프롬프트 엔지니어입니다.
          현재: interpret-v2.1.0.ts (핵심 아키텍처: 기술적 지표를 백엔드에서 감정/심리 언어로 완전 번역 후 LLM에 전달).
          핵심 철학: 숫자·지표명·가격은 LLM에 절대 노출 안 됨 → 투자 조언 오해 원천 차단.
          LLM은 오직 심리 신호만 받아 타로 감정 해석을 생성.
          3단 폴백(LLM→캐시→프리빌트). 출력: {headline, summary, detail}.

          ${AGENT_CONTEXT}

          중요: AI 해석이 투자 조언처럼 들리면 법적 리스크 + 앱스토어 정책 위반.
          해석은 투자자의 심리 상태를 비추는 거울이어야 하며, 행동을 유도하면 안 됩니다.
          토큰 비용과 품질의 균형을 고려하세요."

          PROMPT="AI 해석 품질 개선 아이디어를 제안하세요.
          단, 해석 결과에 가격·숫자·지표명이 노출되거나 투자 행동을 유도하는 방향은 제안하지 마세요.

          ## ✨ Prompt Engineer 제안
          ## 대상 OKR (O1/O2/O3/O4 중 택 1)
          ## 현재 문제 또는 기회
          ## 개선 방향 (심리 언어 품질 향상 관점)
          ## 샘플 비교 (개선 전 / 개선 후)
          ## 법적 안전성 검토
          ## 검증 방법
          ## 토큰 비용 영향"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT")
          { echo "response<<__EOF__"; echo "$RESULT"; echo "__EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.result.outputs.response }}
        run: |
          printenv BODY > /tmp/body.md
          gh issue create \
            --title "[Prompt Engineer] $(TZ=Asia/Seoul date '+%Y-%m-%d') AI 해석 품질 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,prompt"

  # ═══════════════════════════════════════════════════
  # Researcher Agent — 글로벌 시장 리서치 & 트렌드 인사이트
  # ═══════════════════════════════════════════════════

  researcher:
    needs: [marketer]
    if: >-
      always() &&
      (github.event.inputs.agent == 'all' ||
       github.event.inputs.agent == 'researcher' ||
       github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.result.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[Researcher] 글로벌 타로·주식 앱 트렌드 리서치"
        id: result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source .github/scripts/ai-inference.sh
          source .github/scripts/load-context.sh

          RESEARCHER_PERSONA=$(cat .github/agents/RESEARCHER_PERSONA.md)

          SYSTEM="${RESEARCHER_PERSONA}

          ${AGENT_CONTEXT}

          당신은 글로벌 앱스토어 시장 전문 리서처입니다.
          타로·운세 앱, 주식·증권 앱, 게이미피케이션 패턴을 국내외 가리지 않고 탐색하고,
          Trading Taro가 즉시 벤치마킹할 수 있는 인사이트를 제공합니다.
          단순 트렌드 나열이 아니라 '우리 제품에 이렇게 쓴다'는 구체적 제안이 핵심입니다."

          PROMPT="오늘의 시장 리서치 인사이트를 제안하세요.
          지식 컷오프 내에서 알고 있는 앱·트렌드·UX 패턴을 기반으로 작성하세요.

          ## 🔍 Researcher 리서치 리포트
          ## 대상 OKR (O1/O2/O3/O4 중 택 1)

          ## 1. 타로·운세 앱 벤치마크
          관찰한 앱(국내/해외), 핵심 UX 패턴, 우리 제품 적용 가능성 (🟢/🟡/🔴)

          ## 2. 주식·증권 앱 심리 UX 사례
          투자자 감정을 건드리는 UX 패턴 사례, 성공/실패 포함, 우리에게 안전한 적용 방법

          ## 3. 게이미피케이션 트렌드
          금융·운세 앱에서 효과적인 게이미피케이션 패턴, 규제 리스크 있는 패턴은 ⚠️ 표시

          ## 4. 바이럴·공유 메커니즘
          실제로 바이럴된 공유 UX 케이스, 우리 공유 기능에 즉시 적용 가능한 것

          ## 5. 이번 주 최우선 적용 제안 (1개)
          가장 임팩트 높고 구현 빠른 것 단 1개, 적용 난이도와 기대 효과 명시"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT")
          { echo "response<<__EOF__"; echo "$RESULT"; echo "__EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.result.outputs.response }}
        run: |
          printenv BODY > /tmp/body.md
          gh issue create \
            --title "[Researcher] $(TZ=Asia/Seoul date '+%Y-%m-%d') 글로벌 타로·주식 앱 트렌드 리서치" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,research"

  # ═══════════════════════════════════════════════════
  # Content Agent — 타로 콘텐츠 바이럴 & UX 전략
  # ═══════════════════════════════════════════════════

  content:
    needs: [prompt_engineer, researcher]
    if: >-
      always() &&
      (github.event.inputs.agent == 'all' ||
       github.event.inputs.agent == 'content' ||
       github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.result.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[Content] 타로 카드 콘텐츠 바이럴·UX 전략 제안"
        id: result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          RESEARCH_OUT: ${{ needs.researcher.outputs.proposal }}
        run: |
          source .github/scripts/ai-inference.sh
          source .github/scripts/load-context.sh

          SYSTEM="당신은 타로 증권 앱의 콘텐츠 전략가입니다.
          핵심 미션: 투자자의 불안한 심리를 타로로 비춰주는 카드 해석 콘텐츠를 설계합니다.
          현재 문제: headline이 '심판의 에너지가 흐른다'처럼 추상적이고 투자 감정과 단절돼 있습니다.
          목표: SNS에서 캡처하고 싶은 한 줄, 친구에게 보내고 싶어지는 문장을 만드는 것입니다.
          v2.1.0 철학: 기술적 지표는 백엔드에서 심리 언어로 번역되어 LLM에 전달됨.
          해석 결과에 가격·숫자·지표명이 절대 노출되지 않음 → 투자 조언 오해 원천 차단.
          좋은 예: '팔고 싶은 충동이 드는 지금, 카드는 손을 놓지 말라 합니다'
          좋은 예: '모두가 도망칠 때 혼자 남은 당신, 그게 용기인지 확인할 때'
          나쁜 예: '지지선에서 반등 중이니 기회입니다' (투자 조언 + 숫자 노출 — 법적 리스크)

          ${AGENT_CONTEXT}

          이 역할은 O2(핵심 사용자 경험)와 O3(바이럴·공유를 통한 수익화)에 직결됩니다.

          === 오늘 Researcher 에이전트의 시장 리서치 ===
          ${RESEARCH_OUT:-(리서치 결과 없음)}"

          PROMPT="오늘의 타로 카드 콘텐츠 및 UX 개선 제안을 작성하세요.
          위 리서치 인사이트를 반드시 참고하고, 어떤 벤치마크를 반영했는지 명시하세요.

          ## 🎴 Content Agent 제안
          ## 대상 OKR (O1/O2/O3/O4 중 택 1)
          ## 현재 콘텐츠 문제
          ## 바이럴 headline 전략 (구체적 예시 3개 이상)
          ## 카드별 투자 심리 연결 제안 (주요 카드 3장)
          ## 카드 공개 UX 개선 아이디어
          ## 공유 전환율을 높이는 방법
          ## 성공 지표"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT")
          { echo "response<<__EOF__"; echo "$RESULT"; echo "__EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.result.outputs.response }}
        run: |
          printenv BODY > /tmp/body.md
          gh issue create \
            --title "[Content] $(TZ=Asia/Seoul date '+%Y-%m-%d') 타로 콘텐츠 바이럴·UX 전략" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,content"

  # ═══════════════════════════════════════════════════
  # CEO Brief — 전체 에이전트 종합 판단
  # ═══════════════════════════════════════════════════

  ceo_brief:
    needs: [pm, frontend, backend, designer, qa, cto, marketer, security, prompt_engineer, researcher, content]
    if: >-
      always() &&
      (github.event.inputs.agent == 'all' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      brief: ${{ steps.brief.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: "[CEO] 에이전트 브리핑 종합 + 교차 검증"
        id: brief
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          PM_OUT: ${{ needs.pm.outputs.proposal }}
          FE_OUT: ${{ needs.frontend.outputs.proposal }}
          BE_OUT: ${{ needs.backend.outputs.proposal }}
          DESIGN_OUT: ${{ needs.designer.outputs.proposal }}
          QA_OUT: ${{ needs.qa.outputs.proposal }}
          CTO_OUT: ${{ needs.cto.outputs.proposal }}
          MKT_OUT: ${{ needs.marketer.outputs.proposal }}
          SEC_OUT: ${{ needs.security.outputs.proposal }}
          PE_OUT: ${{ needs.prompt_engineer.outputs.proposal }}
          RS_OUT: ${{ needs.researcher.outputs.proposal }}
          CT_OUT: ${{ needs.content.outputs.proposal }}
        run: |
          source .github/scripts/ai-inference.sh

          # CEO 페르소나 + OKR + 메모리 로드
          CEO_PERSONA=$(cat .github/agents/CEO_PERSONA.md)
          OKR=$(cat .github/agents/QUARTERLY_OKR.md)
          MEMORY=$(tail -60 .github/agents/MEMORY.md 2>/dev/null || echo "이전 기록 없음")

          SYSTEM="${CEO_PERSONA}

          === 이번 분기 OKR ===
          ${OKR}

          === 과거 학습 기록 ===
          ${MEMORY}"

          # 에이전트 출력 조합
          {
            echo "아래 11개 에이전트의 오늘 제안을 읽고 CEO 일일 브리핑을 작성하세요."
            echo "단순 요약이 아니라 당신의 판단과 지시가 담겨야 합니다."
            echo "각 제안이 OKR에 부합하는지 검증하고, 부합하지 않는 제안은 왜 그런지 설명하세요."
            echo ""
            echo "---"
            echo "**PM:** ${PM_OUT:-(PM 에이전트 미응답)}"
            echo "---"
            echo "**Frontend:** ${FE_OUT:-(Frontend 에이전트 미응답)}"
            echo "---"
            echo "**Backend:** ${BE_OUT:-(Backend 에이전트 미응답)}"
            echo "---"
            echo "**Designer:** ${DESIGN_OUT:-(Designer 에이전트 미응답)}"
            echo "---"
            echo "**QA:** ${QA_OUT:-(QA 에이전트 미응답)}"
            echo "---"
            echo "**CTO:** ${CTO_OUT:-(CTO 에이전트 미응답)}"
            echo "---"
            echo "**Marketer:** ${MKT_OUT:-(Marketer 에이전트 미응답)}"
            echo "---"
            echo "**Security:** ${SEC_OUT:-(Security 에이전트 미응답)}"
            echo "---"
            echo "**Prompt Engineer:** ${PE_OUT:-(Prompt Engineer 에이전트 미응답)}"
            echo "---"
            echo "**Researcher:** ${RS_OUT:-(Researcher 에이전트 미응답)}"
            echo "---"
            echo "**Content:** ${CT_OUT:-(Content 에이전트 미응답)}"
            echo "---"
            echo ""
            cat << 'FORMAT'
          아래 형식으로 작성하세요. 각 섹션을 충실히 채우세요:

          ## 📋 CEO Daily Brief — YYYY-MM-DD

          ### 🚨 즉시 대응 (스토어 출시 차단 or 보안 리스크)
          - 없으면 "현재 차단 이슈 없음" 명시

          ### ✅ 이번 주 실행 지시 (최대 2개)
          - 왜 이것인지 근거, 담당 에이전트, 예상 소요, 대상 OKR

          ### 🔍 에이전트 간 충돌 분석
          - CEO 판단: 어느 쪽을 택하고 왜인지

          ### 💡 CEO 인사이트
          - 에이전트들이 놓친 관점, 제품 방향성

          ### 📊 에이전트 성과 피드백
          - 각 에이전트의 제안 품질에 대한 CEO 피드백
          - 개선이 필요한 에이전트에게 구체적 코칭 (예: "Backend는 현재 트래픽 규모를 반영하지 않은 제안이 반복됨")
          - 잘한 에이전트는 인정 (예: "CTO는 OKR에 정확히 부합하는 제안")

          ### ❌ 지금 하지 않을 것 (Kill list)
          - 구체적 이유 + 재검토 조건

          ### 📊 에이전트별 제안 요약
          | 에이전트 | 대상 OKR | 제안 핵심 | CEO 판정 | 사유 |
          |---------|---------|----------|---------|------|
          | PM | O? | ... | ✅/⏸️/❌ | ... |
          | (11개 모두) | | | | |

          ### 📅 내일 체크포인트
          FORMAT
          } > /tmp/ceo_prompt.txt

          PROMPT=$(cat /tmp/ceo_prompt.txt)
          RESULT=$(ai_inference "$SYSTEM" "$PROMPT" 4000)
          {
            echo "response<<__CEO_EOF__"
            echo "$RESULT"
            echo "__CEO_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create CEO Brief Issue
        env:
          GH_TOKEN: ${{ github.token }}
          BRIEF: ${{ steps.brief.outputs.response }}
        run: |
          printenv BRIEF > /tmp/ceo_body.md
          gh issue create \
            --title "📋 [CEO Brief] $(TZ=Asia/Seoul date '+%Y-%m-%d') 일일 에이전트 브리핑" \
            --body-file /tmp/ceo_body.md \
            --label "ceo-brief,agent-council,daily"

      - name: Get today date
        id: today
        run: echo "date=$(TZ=Asia/Seoul date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Send CEO Brief Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "📋 [CEO Brief] ${{ steps.today.outputs.date }} 일일 에이전트 브리핑"
          to: ${{ secrets.REPORT_EMAIL }}
          from: "Trading Taro 에이전트 카운슬 <${{ secrets.SMTP_USERNAME }}>"
          convert_markdown: true
          body: ${{ steps.brief.outputs.response }}

  # ═══════════════════════════════════════════════════
  # Verdict — CEO 판정 파싱 + 라벨링 + 에이전트 반론
  # ═══════════════════════════════════════════════════

  process_verdicts:
    needs: [ceo_brief]
    if: >-
      always() && needs.ceo_brief.result == 'success' &&
      (github.event.inputs.agent == 'all' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 1. CEO 브리프에서 판정 JSON 추출 ──────────────────
      - name: Parse verdicts from CEO brief
        id: verdicts
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CEO_BRIEF: ${{ needs.ceo_brief.outputs.brief }}
        run: |
          source .github/scripts/ai-inference.sh

          SYSTEM="당신은 CEO 브리프를 파싱하는 도구입니다. 순수 JSON만 반환하세요. 마크다운이나 설명 없이 JSON만."

          PROMPT="아래 CEO 브리프에서 각 에이전트의 판정을 추출하세요.

          반환 형식 (JSON만, 다른 텍스트 없이):
          {
            \"pm\": {\"verdict\": \"approved|deferred|killed\", \"reason\": \"한줄 사유\"},
            \"frontend\": {\"verdict\": \"...\", \"reason\": \"...\"},
            \"backend\": {\"verdict\": \"...\", \"reason\": \"...\"},
            \"designer\": {\"verdict\": \"...\", \"reason\": \"...\"},
            \"qa\": {\"verdict\": \"...\", \"reason\": \"...\"},
            \"cto\": {\"verdict\": \"...\", \"reason\": \"...\"},
            \"marketer\": {\"verdict\": \"...\", \"reason\": \"...\"},
            \"security\": {\"verdict\": \"...\", \"reason\": \"...\"},
            \"prompt_engineer\": {\"verdict\": \"...\", \"reason\": \"...\"}
          }

          판정 기준: ✅ 채택 → approved / ⏸️ 보류 → deferred / ❌ 거부 → killed

          CEO 브리프:
          ${CEO_BRIEF}"

          RESULT=$(ai_inference "$SYSTEM" "$PROMPT" 1000)
          CLEAN=$(echo "$RESULT" | sed 's/^```json//' | sed 's/^```//' | sed 's/```$//' | tr -d '\n')
          echo "$CLEAN" | jq . > /tmp/verdicts.json 2>/dev/null || echo '{}' > /tmp/verdicts.json

          { echo "json<<__VEOF__"; cat /tmp/verdicts.json; echo "__VEOF__"; } >> "$GITHUB_OUTPUT"

      # ── 2. 라벨 부여 + 반론 대상 식별 ────────────────────
      - name: Label agent issues
        id: labeling
        env:
          GH_TOKEN: ${{ github.token }}
          VERDICTS: ${{ steps.verdicts.outputs.json }}
        run: |
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')

          declare -A AGENT_LABELS=(
            [pm]="agent-council,pm"
            [frontend]="agent-council,frontend"
            [backend]="agent-council,backend"
            [designer]="agent-council,design"
            [qa]="agent-council,qa"
            [cto]="agent-council,cto"
            [marketer]="agent-council,marketing"
            [security]="agent-council,security"
            [prompt_engineer]="agent-council,prompt"
            [researcher]="agent-council,research"
            [content]="agent-council,content"
          )

          > /tmp/killed_issues.env

          for agent in pm frontend backend designer qa cto marketer security prompt_engineer researcher content; do
            verdict=$(echo "$VERDICTS" | jq -r ".${agent}.verdict // \"deferred\"")
            reason=$(echo "$VERDICTS" | jq -r ".${agent}.reason // \"판정 미확인\"")

            ISSUE_NUM=$(gh issue list \
              --label "${AGENT_LABELS[$agent]}" \
              --state open \
              --limit 5 \
              --json number,title \
              --jq "[.[] | select(.title | contains(\"$TODAY\"))] | .[0].number // empty")

            [ -z "$ISSUE_NUM" ] && continue

            case "$verdict" in
              approved)
                gh issue edit "$ISSUE_NUM" --add-label "ceo-approved"
                gh issue comment "$ISSUE_NUM" --body "✅ **CEO 채택**: $reason"
                ;;
              deferred)
                gh issue edit "$ISSUE_NUM" --add-label "ceo-deferred"
                gh issue comment "$ISSUE_NUM" --body "⏸️ **CEO 보류**: $reason"
                ;;
              killed)
                gh issue edit "$ISSUE_NUM" --add-label "ceo-killed"
                gh issue comment "$ISSUE_NUM" --body "❌ **CEO 거부**: $reason

          ---
          > 💬 이 판정에 동의하지 않는 에이전트는 아래에 반론을 제출합니다."
                echo "${agent}=${ISSUE_NUM}" >> /tmp/killed_issues.env
                ;;
            esac
          done

          if [ -s /tmp/killed_issues.env ]; then
            { echo "killed<<__KEOF__"; cat /tmp/killed_issues.env; echo "__KEOF__"; } >> "$GITHUB_OUTPUT"
          else
            echo "killed=" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. 킬된 에이전트 반론 ─────────────────────────────
      - name: Agent rebuttals
        if: steps.labeling.outputs.killed != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          VERDICTS: ${{ steps.verdicts.outputs.json }}
          KILLED_LIST: ${{ steps.labeling.outputs.killed }}
        run: |
          source .github/scripts/ai-inference.sh

          declare -A AGENT_ROLES=(
            [pm]="Product Manager"
            [frontend]="프런트엔드 개발자"
            [backend]="백엔드 개발자"
            [designer]="UI/UX 디자이너"
            [qa]="QA 엔지니어"
            [cto]="CTO"
            [marketer]="그로스 마케터"
            [security]="보안 담당자"
            [prompt_engineer]="프롬프트 엔지니어"
            [researcher]="시장 리서처"
            [content]="콘텐츠 전략가"
          )

          echo "$KILLED_LIST" | while IFS='=' read -r agent issue_num; do
            [ -z "$agent" ] || [ -z "$issue_num" ] && continue

            reason=$(echo "$VERDICTS" | jq -r ".${agent}.reason // \"사유 없음\"")
            role="${AGENT_ROLES[$agent]}"

            SYSTEM="당신은 타로 증권 앱의 ${role}입니다.
          CEO가 당신의 제안을 거부했습니다. 반론할 기회가 있습니다.
          판단 기준(출시 차단 > 법적 리스크 > 기술 부채 임계점 > 핵심 UX > 수익화 > 백로그)을 존중하세요.
          감정적이지 않고 데이터/근거 기반으로 반론하세요.
          CEO가 맞다면 솔직히 수긍하세요. 수긍도 전문가의 판단입니다."

            PROMPT="CEO 거부 사유: ${reason}

          아래 형식으로 반론하세요 (200자 이내):

          ## 🔄 에이전트 반론
          **수긍/반론**: (CEO 판단에 동의 or 반론)
          **근거**: (왜 이것이 지금 필요한지 구체적 데이터나 리스크)
          **절충안**: (있다면, 더 작은 스코프로 이번 주 실행 가능한 방법)"

            REBUTTAL=$(ai_inference "$SYSTEM" "$PROMPT" 500)

            if echo "$REBUTTAL" | grep -qi "수긍\|동의\|CEO.*맞"; then
              gh issue comment "$issue_num" --body "$(printf '%s\n\n---\n🏷️ *에이전트가 CEO 판정을 수긍했습니다.*' "$REBUTTAL")"
            else
              gh issue comment "$issue_num" --body "$REBUTTAL"
              gh issue edit "$issue_num" --add-label "agent-rebuttal"
            fi
          done

      # ── 4. 메모리 업데이트 (학습 누적) ────────────────────
      - name: Update agent memory
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          CEO_BRIEF: ${{ needs.ceo_brief.outputs.brief }}
          VERDICTS: ${{ steps.verdicts.outputs.json }}
        run: |
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')

          # 판정 기록 생성
          {
            echo ""
            echo "### ${TODAY}"
            echo "| 에이전트 | 판정 | 사유 |"
            echo "|---------|------|------|"
            for agent in pm frontend backend designer qa cto marketer security prompt_engineer researcher content; do
              verdict=$(echo "$VERDICTS" | jq -r ".${agent}.verdict // \"unknown\"")
              reason=$(echo "$VERDICTS" | jq -r ".${agent}.reason // \"-\"" | tr -d '\n' | head -c 80)
              icon="❓"
              case "$verdict" in
                approved) icon="✅" ;;
                deferred) icon="⏸️" ;;
                killed) icon="❌" ;;
              esac
              echo "| ${agent} | ${icon} ${verdict} | ${reason} |"
            done
          } >> .github/agents/MEMORY.md

          # 커밋 + 푸시
          git config user.name "Trading Taro Agent Council"
          git config user.email "agent-council@trading-taro.app"
          git add .github/agents/MEMORY.md
          git diff --cached --quiet || {
            git commit -m "chore(agents): ${TODAY} 에이전트 카운슬 학습 기록 업데이트"
            git push
          }
