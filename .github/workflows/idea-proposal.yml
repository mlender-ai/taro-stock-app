name: Daily Agent Council

# ⚠️ 일일 바텀업 제안 비활성화 (2026-06-09 톱다운 개편 P4):
#   매일 9직군이 산발적 아이디어를 던지던 cron 을 끈다. 이제 톱다운 프로젝트 구동
#   (PROJECT_ROADMAP.md → select_project → project-kickoff 분해 → 격파)이며,
#   매일 cron 은 project-progress.yml(활성 프로젝트 진척 리포트)로 대체됐다.
#   이 워크플로는 수동(workflow_dispatch) 폴백으로만 남긴다. 자율 루프 복원 시 schedule 주석 해제.
# on:
#   schedule:
#     - cron: "0 22 * * *"  # 매일 오전 7시 KST (UTC 22:00 전날) — 비활성
on:
  workflow_dispatch:
    inputs:
      agent:
        description: "실행할 에이전트 (all / pm / frontend / backend / designer / qa / cto / marketer / security / prompt_engineer) — 수동 폴백"
        required: false
        default: "all"
      approval_token:
        description: "자율기획 잠금 해제 토큰. SSOT_EXECUTION_ONLY 입력 시에만 실행"
        required: false
        default: ""

concurrency:
  group: agent-council
  cancel-in-progress: false

permissions:
  contents: write  # score_and_filter 가 constraint hits 파일을 커밋(Phase 2.5)
  issues: write
  models: read

# ─────────────────────────────────────────────────────────────
# v3 (2026-05-22) — 산발성 제거, 구조화, 자기 학습
#   - AGENT_NORTH_STAR.md 도입: 모든 에이전트 단일 진실
#   - 각 에이전트별 자기 라벨 history 주입 (자기 반복 금지)
#   - 닫힌 이슈 컨텍스트 추가 (거부 패턴 학습)
#   - 통일된 제안 템플릿: 가설/근거(파일경로 필수)/액션/측정 지표/North Star 정렬
#   - 약한 어휘 금지 규칙 prompt 강제
#   - CEO Brief: 어제 채택 진척 추적 + North Star 정렬도 평가 + 반복 주제 디플래그
# ─────────────────────────────────────────────────────────────

jobs:

  prepare:
    if: ${{ github.event.inputs.approval_token == 'SSOT_EXECUTION_ONLY' }}
    runs-on: ubuntu-latest
    outputs:
      feedback: ${{ steps.fetch.outputs.feedback }}
      feedback_brief: ${{ steps.fetch.outputs.feedback_brief }}
      merged_prs: ${{ steps.fetch.outputs.merged_prs }}
      open_issues: ${{ steps.fetch.outputs.open_issues }}
      closed_issues: ${{ steps.fetch.outputs.closed_issues }}
      north_star: ${{ steps.fetch.outputs.north_star }}
      yesterday_brief: ${{ steps.fetch.outputs.yesterday_brief }}
      today: ${{ steps.fetch.outputs.today }}
      scoring_guide: ${{ steps.fetch.outputs.scoring_guide }}
      lane_state_json: ${{ steps.lane_state.outputs.lane_state_json }}
      constraints_json: ${{ steps.constraints.outputs.constraints_json }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 데일리 제안 만료 — "오늘 이슈가 어제랑 같다" 누적 방지.
      # 이전 날짜의 agent-council 제안 중 승격(score-strong/implement-approved/ceo-brief)되지
      # 않은 것은 오늘 사이클 시작 시 자동 close. 승격·머지된 제안은 유지.
      - name: Expire stale daily proposals
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          TODAY=$(TZ=Asia/Seoul date +%F)
          echo "오늘(KST)=$TODAY — 이전 데일리 제안 만료 처리"
          gh issue list --label "agent-council" --state open --limit 100 \
            --json number,title,labels --repo "$GITHUB_REPOSITORY" 2>/dev/null \
          | jq -r --arg today "$TODAY" '
              .[]
              | select((([.labels[].name] | any(. == "ceo-brief" or . == "implement-approved" or . == "score-strong"))) | not)
              | {n: .number, d: (.title | scan("[0-9]{4}-[0-9]{2}-[0-9]{2}"))}
              | select(.d < $today)
              | .n
            ' 2>/dev/null \
          | while read -r N; do
              [ -z "$N" ] && continue
              echo "  close #$N (만료)"
              gh issue close "$N" --repo "$GITHUB_REPOSITORY" \
                --comment "🤖 데일리 제안 만료 — 오늘 사이클로 갱신됩니다. (승격된 제안 score-strong/implement-approved/ceo-brief 은 유지)" || true
            done

      - name: Fetch Context, Feedback, North Star
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          YESTERDAY=$(TZ=Asia/Seoul date -d 'yesterday' '+%Y-%m-%d' 2>/dev/null || TZ=Asia/Seoul date -v-1d '+%Y-%m-%d')
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

          # North Star — 모든 에이전트 단일 진실
          if [ -f AGENT_NORTH_STAR.md ]; then
            NS=$(cat AGENT_NORTH_STAR.md)
          else
            NS="⚠️ AGENT_NORTH_STAR.md 파일이 없습니다. 사용자에게 알리고 일반 제안만 수행하세요."
          fi
          echo "north_star<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$NS" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 어제 CEO Brief — 채택 항목 진척 추적 + 킬리스트/반복경고 보존 (Phase 1)
          # (구) head -c 2000 + 번호 마스킹 → 킬리스트(하단)가 잘리고 #번호가 죽어
          # 반복 탐지 신호가 소실됐다. 이제 마스킹 제거 + 하단 섹션 우선 보존.
          # 어제 번호 오인용 방지는 ceo_brief 프롬프트 규칙(신규 번호는 today list만)으로 대체.
          YB_FULL=$(gh issue list --label "ceo-brief" --state all --limit 5 \
            --json title,body \
            --repo "${{ github.repository }}" | \
            jq -r ".[] | select(.title | contains(\"$YESTERDAY\")) | .body" 2>/dev/null)
          if [ -z "$YB_FULL" ]; then
            YB="어제 CEO Brief 없음 — 진척 추적 불가, 새 사이클로 시작."
          elif [ ${#YB_FULL} -gt 6000 ]; then
            # 길면 '오늘 처리 우선순위'~끝(반복경고·킬리스트 포함)을 우선 보존
            YB=$(printf '%s' "$YB_FULL" | awk '/오늘 처리 우선순위/{f=1} f' | head -c 6000)
            [ -z "$YB" ] && YB=$(printf '%s' "$YB_FULL" | tail -c 6000)
          else
            YB="$YB_FULL"
          fi
          echo "yesterday_brief<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$YB" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 머지된 PR 30개
          MERGED=$(gh pr list --state merged --limit 30 \
            --json title,number --repo "${{ github.repository }}" | \
            jq -r '.[] | "- #\(.number) \(.title)"' 2>/dev/null || echo "없음")
          echo "merged_prs<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$MERGED" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 열린 제안 이슈 (제목 + 본문 첫 200자)
          OPEN=$(gh issue list --label "agent-council" --state open --limit 50 \
            --json title,body --repo "${{ github.repository }}" | \
            jq -r '.[] | "제목: \(.title)\n요약: \(.body | .[0:200] | gsub("\n";" "))\n---"' 2>/dev/null || echo "없음")
          echo "open_issues<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$OPEN" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 닫힌 이슈 최근 20개 (거부/완료 패턴 학습)
          CLOSED=$(gh issue list --label "agent-council" --state closed --limit 20 \
            --json title,closedAt --repo "${{ github.repository }}" | \
            jq -r '.[] | "- [\(.closedAt | .[0:10])] \(.title)"' 2>/dev/null || echo "없음")
          echo "closed_issues<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$CLOSED" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 피드백 로그
          FEEDBACK=$(gh issue list --repo "${{ github.repository }}" \
            --label "feedback-log" --state all --limit 7 --json title,body \
            | jq -r '.[] | "---\n## " + .title + "\n" + .body' 2>/dev/null || true)
          if [ -z "$FEEDBACK" ]; then
            FEEDBACK="피드백 이력 없음 — 첫 번째 사이클입니다."
          fi
          # CEO Brief용 짧은 버전 (REPO_MAP 제외, 5KB 제한) — agent prompt와 분리해
          # CEO Brief의 LLM 입력 토큰 부담을 줄이고 호출 실패를 차단.
          FEEDBACK_BRIEF=$(printf '%s' "$FEEDBACK" | head -c 5000)
          echo "feedback_brief<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$FEEDBACK_BRIEF" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 실제 레포 파일 구조 주입 — 에이전트가 존재하지 않는 경로를 환각 인용하는 사고 방지
          # (2026-05-31 사용자 피드백: "선행으로 파일 리소스/경로를 먼저 파악하고 이슈 생성하라")
          REPO_MAP=$(git ls-files \
            'apps/fomo-web/app/**' 'apps/fomo-web/components/**' 'apps/fomo-web/lib/**' \
            'apps/fomo-club/app/**' 'apps/fomo-club/components/**' 'apps/fomo-club/lib/**' \
            'apps/web/app/api/fomo/**' 'apps/web/app/api/**' 'apps/web/lib/**' \
            'packages/fomo-core/src/**' 'packages/shared/src/**' \
            2>/dev/null | grep -vE '__tests__|\.test\.|node_modules' | head -400)
          if [ -z "$REPO_MAP" ]; then
            REPO_MAP="(레포 구조 조회 실패 — 경로 인용 시 추측 금지, 디렉토리 수준으로만 언급)"
          fi
          REPO_MAP_HEADER=$(printf '%s\n' \
            "📁 실제 레포 파일 구조 (== 경로 인용 절대 규칙 ==):" \
            "아래 목록에 실제로 존재하는 파일만 '근거'의 파일 경로로 인용한다." \
            "목록에 없는 경로를 쓰려면 반드시 '신규 생성:' 접두사를 붙여 새 파일임을 명시한다." \
            "존재하지 않는 경로를 기존 파일처럼 인용하면 CEO Brief에서 '사실 오류'로 킬리스트 처리된다." \
            "제안하려는 기능의 파일이 목록에 없으면, 그 기능 자체가 미구현이라는 뜻이므로 '신규 기능' 으로 명확히 구분해 제안한다.")
          # 📈 지표 현황 (B1 outcome) — "강제 회전 폐지·심화 허용" 판단 근거.
          # 목표 미달(⚠️) 지표가 있으면 같은 lane을 더 깊게 파는 제안이 정당화된다.
          METRICS_STATUS=""
          SNAP=$(ls -t generated/outcomes/okr-snapshot-*.json 2>/dev/null | head -1)
          if [ -f generated/outcomes/metric-registry.json ] && [ -n "$SNAP" ]; then
            METRICS_STATUS=$(jq -rn --slurpfile reg generated/outcomes/metric-registry.json --slurpfile snap "$SNAP" '
              ($snap[0].values // {}) as $v
              | $reg[0].metrics | map(select(.auto==true)) | .[]
              | . as $m | ($v[$m.id]) as $cur
              | "- \($m.label): 현재 \($cur // "?") / 목표 \($m.direction) \($m.target) "
                + (if $cur != null and (($m.direction=="up" and $cur < $m.target) or ($m.direction=="down" and $cur > $m.target)) then "⚠️ 미달(이 영역 심화 정당)" else "✅ 목표 도달" end)
            ' 2>/dev/null || echo "")
          fi
          [ -z "$METRICS_STATUS" ] && METRICS_STATUS="(지표 스냅샷 없음 — 다음 outcome-check 후 표시)"
          METRICS_HEADER="📈 지표 현황 (Target-Metric — ⚠️ 미달이면 같은 lane 심화 제안 허용, ✅ 도달이면 새 레버리지로 이동 권장):"

          FEEDBACK=$(printf '%s\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n' \
            "$METRICS_HEADER" "$METRICS_STATUS" "──────────────────────────────" \
            "$REPO_MAP_HEADER" "$REPO_MAP" "$FEEDBACK")

          echo "feedback<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$FEEDBACK" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

          # 점수 출력 가이드 (모든 직군 prompt 끝에 주입 — simulo po-validator 차용, 2026-05-27)
          if [ -f .github/agent-scoring-guide.md ]; then
            SCORING_GUIDE=$(cat .github/agent-scoring-guide.md)
          else
            SCORING_GUIDE="⚠️ .github/agent-scoring-guide.md 파일 누락 — 점수 가이드 없이 진행"
          fi
          echo "scoring_guide<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$SCORING_GUIDE" >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

      # ── Lane-State 원장 (Phase 1) — lane별 DONE/KILLED/IN-PROGRESS 파생 ──
      # 각 에이전트가 자기 lane 슬라이스를 받아 이미 끝난/거부된 영역 재제안 차단(#282).
      - name: Build lane-state ledger
        id: lane_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          DEGRADED=0
          # lane/scoreLabel 파생 jq (Phase 0 digest 와 동일한 규칙)
          LANEJQ='def lane: ([.labels[].name] - ["idea","agent-council","mobile","tech-debt","daily","score-strong","score-conditional","score-missing"]) | (.[0] // "unknown"); def scorelabel: ([.labels[].name] | map(select(test("^score-(strong|conditional|missing)$"))) | (.[0] // "score-none"));'

          # 1) 머지 PR (번호+제목+본문 — 연결 이슈 #NNN 추출용)
          if ! gh pr list --state merged --limit 30 \
                --json number,title,body --repo "${{ github.repository }}" > /tmp/ls_merged.json 2>/dev/null; then
            echo "[]" > /tmp/ls_merged.json; DEGRADED=1
          fi
          # 2) 닫힌 agent-council 이슈 (lane/score 파생)
          if gh issue list --label "agent-council" --state closed --limit 40 \
                --json number,title,labels --repo "${{ github.repository }}" > /tmp/ls_closed_raw.json 2>/dev/null; then
            jq "$LANEJQ"' [ .[] | {number, title, lane: lane, scoreLabel: scorelabel} ]' /tmp/ls_closed_raw.json > /tmp/ls_closed.json
          else
            echo "[]" > /tmp/ls_closed.json; DEGRADED=1
          fi
          # 3) 열린 agent-council 이슈 (lane/score 파생)
          if gh issue list --label "agent-council" --state open --limit 50 \
                --json number,title,labels --repo "${{ github.repository }}" > /tmp/ls_open_raw.json 2>/dev/null; then
            jq "$LANEJQ"' [ .[] | {number, title, lane: lane, scoreLabel: scorelabel} ]' /tmp/ls_open_raw.json > /tmp/ls_open.json
          else
            echo "[]" > /tmp/ls_open.json; DEGRADED=1
          fi

          if [ "$DEGRADED" = "1" ]; then
            LS_JSON='{"__degraded__":true}'
          else
            LS_JSON=$(npx -y tsx@4.19.2 scripts/build-lane-state.ts build \
              /tmp/ls_merged.json /tmp/ls_closed.json /tmp/ls_open.json 2>/dev/null || echo '{"__degraded__":true}')
            [ -z "$LS_JSON" ] && LS_JSON='{"__degraded__":true}'
          fi

          # JSON 한 줄 — 멀티라인 가드용 heredoc output
          echo "lane_state_json<<__LSEOF__" >> "$GITHUB_OUTPUT"
          echo "$LS_JSON" >> "$GITHUB_OUTPUT"
          echo "__LSEOF__" >> "$GITHUB_OUTPUT"

          # 옵저버빌리티(9.1): 원장을 job summary + 아티팩트로 덤프
          {
            echo "### 🧾 Lane-State 원장 (이번 사이클)"
            echo '```json'
            printf '%s\n' "$LS_JSON" | jq . 2>/dev/null || printf '%s\n' "$LS_JSON"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          printf '%s' "$LS_JSON" > /tmp/lane-state.json
      - name: Upload lane-state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lane-state-${{ steps.fetch.outputs.today }}
          path: /tmp/lane-state.json
          if-no-files-found: ignore
          retention-days: 14

      # ── Standing Constraints (Phase 2) — CEO 확정 규칙 active 필터 ──
      # constraints/active.json 의 active(permanent || 미만료) 만 추려 각 에이전트에 주입.
      - name: Load active standing constraints
        id: constraints
        run: |
          set -uo pipefail
          TODAY="${{ steps.fetch.outputs.today }}"
          if [ -f constraints/active.json ]; then
            C_JSON=$(npx -y tsx@4.19.2 scripts/constraints.ts active constraints/active.json "$TODAY" 2>/dev/null || echo '[]')
            [ -z "$C_JSON" ] && C_JSON='[]'
          else
            C_JSON='[]'
          fi
          echo "constraints_json<<__CEOF__" >> "$GITHUB_OUTPUT"
          echo "$C_JSON" >> "$GITHUB_OUTPUT"
          echo "__CEOF__" >> "$GITHUB_OUTPUT"
          {
            echo "### 🔒 Standing Constraints (active)"
            echo '```json'
            printf '%s\n' "$C_JSON" | jq . 2>/dev/null || printf '%s\n' "$C_JSON"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────
  # 1. PM
  # ─────────────────────────────────────────────────────────────
  pm:
    needs: [prepare]
    if: ${{ github.event.inputs.approval_token == 'SSOT_EXECUTION_ONLY' && (github.event.inputs.agent == 'all' || github.event.inputs.agent == 'pm') }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 15
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
          LANE_STATE: ${{ needs.prepare.outputs.lane_state_json }}
          CONSTRAINTS_JSON: ${{ needs.prepare.outputs.constraints_json }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[PM\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

          # Lane-State 슬라이스 (Phase 1) — 자기 직군 DONE/KILLED/IN-PROGRESS
          printf '%s' "$LANE_STATE" > /tmp/lane-state.json
          LANE_SLICE=$(npx -y tsx@4.19.2 scripts/build-lane-state.ts slice "pm" /tmp/lane-state.json 2>/dev/null || echo "이력 없음 — 새 영역 제안 가능.")
          echo "lane_slice<<__EOF__" >> $GITHUB_OUTPUT
          echo "$LANE_SLICE" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
          # Standing Constraints 슬라이스 (Phase 2)
          printf '%s' "$CONSTRAINTS_JSON" > /tmp/constraints.json
          C_SLICE=$(npx -y tsx@4.19.2 scripts/constraints.ts render-lane "pm" /tmp/constraints.json 2>/dev/null || echo "")
          echo "constraints_slice<<__CEOF__" >> $GITHUB_OUTPUT
          echo "$C_SLICE" >> $GITHUB_OUTPUT
          echo "__CEOF__" >> $GITHUB_OUTPUT

          DONE_NUMS=$(jq -r '(.["pm"].done // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          KILLED_NUMS=$(jq -r '(.["pm"].killed // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          HIST=$(gh issue list --label "pm" --state all --limit 5 \
            --json number,title,body,state --repo "${{ github.repository }}" | \
            jq -r --arg done "$DONE_NUMS" --arg killed "$KILLED_NUMS" '
              ($done | split(" ") | map(select(length>0) | tonumber)) as $d
              | ($killed | split(" ") | map(select(length>0) | tonumber)) as $k
              | .[] | (.number) as $n
              | (if ($d | index($n)) then "DONE" elif ($k | index($n)) then "KILLED" else .state end) as $v
              | "### [\($v)] #\($n) \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"
            ' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[PM] 제품 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 FOMO Club의 Product Manager입니다.
            FOMO Club은 투자자 집단 감정을 정직한 숫자로 시각화하는 앱이다. 시장을 분석/예측하지 않고 참여자 감정을 보여준다. 마스코트 '포모'의 표정 = FOMO Index.
            사용자 페르소나: "나만 물린 게 아니구나"를 확인하고 싶은 개인 투자자.
            KPI: 일일 감정 투표 참여율, 재방문(D1/D7), FOMO Index 직관 이해도, 정직한 숫자(빈 값/에러 0).

            === PM 직군 정의 (lane) ===
            PM은 "무엇을, 왜, 누구를 위해, 어떤 지표로" 를 결정한다. "어떻게 구현하는가" 는 결정하지 않는다.
            - PM이 다루는 것: 감정 입력 경험·홈 MVP 핵심 경험(FOMO Index + 오늘의 감정 투표 + 집단 통계 + Market Pulse 배너 + 포모 2단계 표정)·정직한 숫자 원칙·마스코트 경험 우선순위·재방문 동기·사용자 플로우의 빠진 단계.
            - PM이 다루지 않는 것 (직군 침범 금지):
              * 사운드/햅틱/시각 효과 제안 → Frontend/Designer가 검토할 영역이지만, 우선순위상 이번 주는 전체 금지. (단 포모 표정 전환은 핵심 경험이지 장식 아님)
              * 특정 라이브러리/파일 경로/구현 단계 명시 → Frontend·Backend·CTO 영역.
              * 색상/타이포/여백 등 디자인 결정 → Designer 영역.
              * 테스트 시나리오 → QA 영역.

            === 우선순위 (사용자 직접 지시) ===
            "장식 폴리싱(이펙트/사운드/햅틱/글로우) 제안을 멈춰라. 사용자 경험(감정 입력 플로우, 정보 위계, 접근성)과 정직한 숫자(실제 집계·폴백·빈 값 0), 마스코트 포모의 표정으로 3초 직관 이해에만 집중하라."
            → PM은 위 사용자 지시를 1순위로 따른다. (포모 표정 전환은 핵심 경험이므로 예외)

            === FOMO Club UX 멘탈모델 ===
            핵심은 **감정의 정상성 확인**("나만 그런 게 아니구나")이다. ① 마스코트 포모의 표정으로 "오늘 시장 분위기"를 **3초 안에 직관 이해**, ② 모든 수치는 **정직한 숫자**(실제 집계값만, 데이터 미비 시 폴백, 빈 값/에러 0), ③ **화면 밀도는 비우고 정보 위계는 명확히**(기리고처럼 비운다). FOMO Index·집단 통계 같은 금융 수치를 화면에 담담히 표시하는 정보 위계만 일반 핀테크 패턴에서 참조하되, 우리는 분석·예측 도구가 아니라 감정 체감 도구임을 잊지 않는다.

            === 절대 규칙 ===
            1. **이펙트/사운드/햅틱/장식 애니메이션 제안 = 자동 거부**. "몰입감을 위해 사운드/효과/글로우/파티클 추가" 류의 제안은 작성 즉시 폐기한다. CEO가 직접 금지함.
            2. **PM 영역으로 한정**: 감정 입력 경험(투표 플로우·재방문 동기·포모 표정 경험), 사용자 플로우(빠진 단계, 막힘 지점), 정보 위계(어느 정보를 어디에 보여줄지), 정직한 숫자 원칙, 우선순위 재조정 중 하나.
            3. North Star 테마 밖 제안 금지.
            4. 금지 어휘: "가능성", "우려됩니다", "수도", "보입니다", "할 것 같습니다". 단정형 + 근거만.
            5. 모든 "현재 문제"는 파일경로/메트릭/사용자 피드백 인용 중 1개 이상 포함. 추측 금지.
            6. **강제 회전 폐지(2026-06-09)**: 같은 주제라도 Target-Metric 목표 미달이면 *더 깊게* 제안해도 된다. 다만 lane-state DONE(이미 머지 완료)만 재제안 금지. PM은 단발 미시 기능이 아니라 **제품 로드맵·유저 저니 관점**에서 "지금 가장 레버리지 큰 한 수"를 고르고, 크면 epic(phase 분할)으로 제안한다.
            7. FOMO Index·집단 통계 등 수치 표시 제안은 **정직한 숫자 원칙**(실제 집계값만, 가짜/임의 숫자 금지)에 정합. 데이터 미비 시 안전한 폴백.
            8. **데이터 정합성 UX 절대 규칙 (2026-05-30 CEO 직접 피드백)**:
               - 데이터 불일치/결측/오류를 **사용자에게 직접 알리는 UI(배너, 경고, "데이터가 일치하지 않습니다" 등) 제안은 절대 금지**.
               - 이유: 감정 수치 앱에서 "데이터가 안 맞다"고 사용자에게 말하면 **신뢰가 즉시 붕괴**된다. FOMO Index는 항상 정합된 값만 담담히 보여준다.
               - 올바른 접근: 정합성 문제는 **로딩 상태를 유지하면서 백엔드에서 자동으로 해결/폴백**하고, 사용자에게는 **항상 정합된 데이터만 보여준다**. 데이터가 아직 정합되지 않았으면 로딩 스켈레톤을 유지한다.
               - "DataMismatchBanner", "실시간 데이터 일치 알림", "데이터 불일치 감지 로직" 같은 제안은 자동 폐기.
            9. 다른 에이전트가 이미 비슷한 제안을 열어놨으면 (오늘자 open issues 확인) 그 주제 회피. PM은 직군 침범하지 않는다.

            === RICE + 5 Whys 강제 (simulo pm-reviewer 차용, 2026-05-27) ===
            PM 제안은 출력에 RICE 점수 + 5 Whys 필수 포함. 다른 직군과 차별화되는 PM 고유 의사결정 프레임워크.

            **RICE = (R × I × C) / E** — 1-10 각 축
            - R (Reach): 1주 내 영향받는 사용자 수 (DAU 대비 %)
            - I (Impact): 사용자 행동/지표 변화 강도 (1=marginal, 10=transformative)
            - C (Confidence): 가설 근거 강도 (1=직관, 10=정량 측정/사용자 인용)
            - E (Effort): 1인 개발 환경 사람-주 (1=수 시간, 10=2주)

            **5 Whys**: "왜 이게 사용자에게 가치 있는가?" 5번 반복. 5번째에서 North Star 현재 축(FOMO Index 신뢰성 / 홈 MVP 핵심 경험 / 정직한 숫자) 중 하나와 명확히 연결되어야 함. 연결 안 되면 제안 자체 폐기.

            판정:
            - RICE ≥30 + 5 Whys 완성 → 강력 권장
            - RICE 15-30 또는 5 Whys 4단계까지 → 조건부, 가설 보강
            - RICE <15 또는 5 Whys 3단계 이하 → 제안 폐기 (자기 점수 솔직하게)
          prompt: |
            ## 🌟 North Star (이번 주 단일 진실)
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 🔒 Standing Constraints (CEO 확정 규칙 — 위반 시 자동 폐기, 하드코딩 개별 규칙보다 우선)
            ${{ steps.ctx.outputs.constraints_slice }}

            ---
            ## 🧾 우리 직군 상태 원장 (DONE/KILLED/IN-PROGRESS — 재제안 금지)
            ${{ steps.ctx.outputs.lane_slice }}
            > ⚠️ 위 DONE/KILLED 목록의 주제는 절대 재제안 금지. 재제안 시 CEO Brief에서 자동 킬리스트 처리되어 사이클이 낭비된다.
            > 개선하려면 반드시 "기존 #NNN 위에 무엇을 *추가*하는가"를 명시하라.

            ---
            ## 📜 PM 에이전트 자기 직전 5개 제안 (DONE=머지 완료만 재제안 금지 · 미달 영역은 심화 허용)
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR (이미 구현됨 — 재제안 금지)
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 현재 열린 다른 에이전트 제안 (중복 금지)
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 최근 닫힌 이슈 (거부됨 또는 완료됨 — 같은 주제 금지)
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            위 컨텍스트와 North Star를 모두 준수하여 PM 관점에서 제안 1개를 작성하세요.
            North Star "이번 주 테마"와 명확히 연결되는 것만. 연결 안 되면 제안을 만들지 마세요.

            ## 🎯 PM 제안: [한 줄 제목]

            ### 가설 (1문장)
            (사용자 행동/감정/지표가 어떻게 바뀐다는 가설인가)

            ### 근거 (필수)
            - 파일 경로 또는 메트릭 또는 사용자 피드백 인용 1개 이상:
            -

            ### 액션 (이번 주 phase 1 = 단일 PR 범위 — 큰 건이면 "후속 phase 개요" 1~2줄 첨부)
            - 수정할 화면/컴포넌트:
            - 구체 구현 단계 2-4개:

            ### 측정 지표
            - 어떤 숫자가 얼마나 변하면 성공인가:

            ### North Star 정렬 (1문장)
            (이 제안이 이번 주 테마와 어떻게 직결되는가)

            ### RICE 점수 (PM 필수)
            - R (Reach, 1-10): X — (이유: 1주 내 영향받는 사용자 추정)
            - I (Impact, 1-10): X — (이유: 변화 강도)
            - C (Confidence, 1-10): X — (이유: 근거 강도. 파일경로/메트릭 인용 시 8+, 직관만이면 ≤4)
            - E (Effort, 1-10): X — (이유: 1인 사람-주)
            - **RICE = (R × I × C) / E = XX.X**

            ### 5 Whys → North Star
            1. 왜 가치 있는가? → ...
            2. 왜 그게 중요한가? → ...
            3. 왜 그게 핵심 문제인가? → ...
            4. 왜 그게 비즈니스 가치인가? → ...
            5. North Star 어느 축과 연결되는가? → ① FOMO Index 신뢰성 / ② 홈 MVP 핵심 경험 / ③ 정직한 숫자 중 명시

            ### 위험/대안
            (실패 시 또는 다른 접근법)

            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[PM] $TODAY 제품 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,pm" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 2. Frontend
  # ─────────────────────────────────────────────────────────────
  frontend:
    needs: [prepare]
    if: ${{ github.event.inputs.approval_token == 'SSOT_EXECUTION_ONLY' && (github.event.inputs.agent == 'all' || github.event.inputs.agent == 'frontend') }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 30
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
          LANE_STATE: ${{ needs.prepare.outputs.lane_state_json }}
          CONSTRAINTS_JSON: ${{ needs.prepare.outputs.constraints_json }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Frontend\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          # Lane-State 슬라이스 (Phase 1) — 자기 직군 DONE/KILLED/IN-PROGRESS
          printf '%s' "$LANE_STATE" > /tmp/lane-state.json
          LANE_SLICE=$(npx -y tsx@4.19.2 scripts/build-lane-state.ts slice "frontend" /tmp/lane-state.json 2>/dev/null || echo "이력 없음 — 새 영역 제안 가능.")
          echo "lane_slice<<__EOF__" >> $GITHUB_OUTPUT
          echo "$LANE_SLICE" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
          # Standing Constraints 슬라이스 (Phase 2)
          printf '%s' "$CONSTRAINTS_JSON" > /tmp/constraints.json
          C_SLICE=$(npx -y tsx@4.19.2 scripts/constraints.ts render-lane "frontend" /tmp/constraints.json 2>/dev/null || echo "")
          echo "constraints_slice<<__CEOF__" >> $GITHUB_OUTPUT
          echo "$C_SLICE" >> $GITHUB_OUTPUT
          echo "__CEOF__" >> $GITHUB_OUTPUT

          DONE_NUMS=$(jq -r '(.["frontend"].done // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          KILLED_NUMS=$(jq -r '(.["frontend"].killed // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          HIST=$(gh issue list --label "frontend" --state all --limit 5 \
            --json number,title,body,state --repo "${{ github.repository }}" | \
            jq -r --arg done "$DONE_NUMS" --arg killed "$KILLED_NUMS" '
              ($done | split(" ") | map(select(length>0) | tonumber)) as $d
              | ($killed | split(" ") | map(select(length>0) | tonumber)) as $k
              | .[] | (.number) as $n
              | (if ($d | index($n)) then "DONE" elif ($k | index($n)) then "KILLED" else .state end) as $v
              | "### [\($v)] #\($n) \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"
            ' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Frontend] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 FOMO Club의 프런트엔드 개발자입니다.
            FOMO Club은 투자자 집단 감정을 정직한 숫자로 시각화하는 앱이다. 마스코트 '포모'의 표정 = FOMO Index.
            스택: `apps/fomo-web`(Next.js + Tailwind, 무가입 웹)·`apps/fomo-club`(Expo SDK 54 + NativeWind).
            제약: Expo Go — `react-native-reanimated` 사용 불가. `Animated` API만 허용.

            === Frontend 직군 정의 (lane) ===
            Frontend는 "홈 화면이 안정적으로·빠르게·예측 가능하게 동작하는가" 의 **기술적 본질**을 책임진다.
            "이쁘게 보이는가" 는 Designer 영역이다.

            **Frontend의 핵심 lane (이 5개만):**
            1. **FOMO Index/포모 표정 렌더 + 전환 모션**: FomoFace(포모 표정) 렌더 안정성, 2단계 감정 변화(시장의 포모→나의 포모) 전환 모션의 stack 적합성(`Animated` 한계 시 대안 평가). "장식 효과 추가"가 아니라 **표정↔Index 매핑 일관 렌더·기술적 가능성·번들 영향 평가**가 lane.
            2. **런타임 안정성**: (fomo-club) 모노레포 React 격리 (metro.config.js blockList / babel.config.js 절대경로 / verify-bundle.sh 통과), Expo Go 호환성 사전 점검; (fomo-web) Next.js 하이드레이션·SSR 안정성. `useEffect` 누수, 메모리 프로파일, 크래시/에러 로그 분석.
            3. **상태관리/데이터 페칭 패턴**: FOMO Index·집단 통계·배너 페칭의 SWR/stale-while-revalidate 정책, race condition 가드, 캐시 무효화, 에러 바운더리·재시도 로직, **빈 값/에러 시 폴백 렌더(정직한 숫자, 에러 0)**.
            4. **성능 최적화**: 리스트/스크롤 적절성, 이미지 로드 우선순위, 불필요 리렌더 prune (React.memo / useMemo / useCallback 적정성), 번들 사이즈 분석, 첫 paint 시간(홈 3초 직관 이해).
            5. **빌드/배포 안정성**: (fomo-club) `scripts/verify-bundle.sh` 체크 유지, EAS Build 호환성, 신규 native 모듈 도입 시 사전 호환성 점검; (fomo-web) Next 빌드/배포 안정성.

            === 직군 침범 금지 (절대) ===
            아래 영역은 Designer 또는 다른 에이전트 영역이므로 Frontend가 다루지 않는다:
            - **스켈레톤 UI 스타일링 / 탭 선택 상태 시각 강화 / 여백 리듬 / 타이포 위계 / 색·아이콘 선택** → Designer 영역.
              (단 Designer가 정의한 디자인 시스템을 컴포넌트화/재사용 하는 것은 Frontend lane. 즉 "어떻게 보일지"는 Designer, "이 디자인을 어떻게 안정적으로 구현할지"는 Frontend.)
            - "어떤 화면에 어떤 콘텐츠 섹션을 둘지" → PM 영역.
            - 카피·UX 라이팅 → Content Marketer 영역.
            - API 설계/DB 모델 → Backend 영역.
            - 테스트 시나리오 → QA 영역.

            === 우선순위 (사용자 직접 지시 2026-05-26 / 2026-05-29) ===
            "사운드/이펙트/장식적 애니메이션 추가 제안을 멈춰라."
            "Frontend는 디자인 영역(스켈레톤/스타일링)이 아니라 **JS 애니메이션 스택 검토·런타임 안정성·성능·상태관리** 같은 기술 본질에 집중하라." (2026-05-29)
            → Frontend는 위 지시를 절대 규칙으로 따른다.

            === FOMO Club UX 멘탈모델 ===
            핵심은 **감정의 정상성 확인**("나만 그런 게 아니구나")이다. ① 마스코트 포모 표정으로 3초 직관 이해, ② 정직한 숫자(빈 값/에러 0 폴백), ③ 화면 밀도는 비우고 정보 위계는 명확히(기리고처럼). Frontend는 "어떻게 보이는지"가 아니라 "FOMO Index·집단 통계·포모 표정 전환을 안정적으로·빠르게 렌더하려면 어떤 스택·패턴이 필요한가"를 본다. FOMO Index·집단 통계 같은 금융 수치를 담담히 표시하는 정보 위계는 일반 핀테크 패턴에서 참조하되, 우리는 분석·예측 도구가 아니라 감정 체감 도구다.
            홈 화면: apps/fomo-web/app/page.tsx, apps/fomo-web/components/HomeView.tsx, FomoFace.tsx, RollingBanner.tsx, EmotionCalendar.tsx

            === 포모 표정 전환 모션 스택 평가 (고려 수준 — 우선순위 낮음) ===
            2단계 감정 변화(시장의 포모→나의 포모) 전환 모션의 격을 올릴 수 있는 스택(react-native-skia / Lottie / SVG morph)을 평가할 수 있다. 단 이는 **고려 수준이며 본 사이클 우선순위는 안정성/성능**이다. 표정 전환은 핵심 경험이지 장식이 아님. 스택 도입 제안 시 (a) Expo Go 호환성 (b) 번들 KB 증가 (c) verify-bundle.sh 통과 가능성을 반드시 함께 기술.

            === 절대 규칙 ===
            1. **자동 폐기 카테고리**: 사운드 효과, 햅틱 피드백, 글로우/파티클/반짝임, 결과 화면 장식적 애니메이션, 버튼 진동/펄스 효과, 화면 전환 시 빛/소리, BGM. 또한 **단순 시각 스타일링 제안**(스켈레톤 색·탭 강조 색·여백 조정 등 Designer 영역)도 자동 폐기.
            2. **핵심 인터랙션 motion 자체는 이미 구현됨** — 재제안 금지.
            3. **Frontend 영역만**: 위 5개 핵심 lane.
            4. North Star 테마 밖 제안 금지.
            5. 금지 어휘: "가능성", "우려됩니다", "수도", "보입니다". 단정형 + 근거.
            6. 현재 문제는 파일 경로(예: apps/fomo-web/..., apps/fomo-club/...) + 줄 번호 또는 구체 컴포넌트명 명시.
            7. 이번 주 구현은 phase 1 = 단일 PR 범위(큰 건은 후속 phase 개요 첨부). 라이브러리 새로 도입은 (a) Expo Go 호환성 (b) 번들 KB (c) verify-bundle.sh 통과 가능성 3개 정당화 필요.
            8. **강제 lane 회전 폐지(2026-06-09)**: Target-Metric 목표 미달이면 같은 lane을 *더 깊게* 제안해도 된다(성과가 정당화하면 한 영역을 끝까지). lane-state DONE만 재제안 금지.
            9. **FOMO Index·집단 통계·포모 표정 렌더는 "안정적으로·빠르게·예측 가능하게 구현할 방법" 관점으로 접근**. 시각 스타일링이 아니라 렌더 안정성·전환 모션의 기술적 가능성·번들 영향.
            10. PM·Designer가 이미 같은 영역을 열어놨으면 회피. Frontend는 안정성/성능/스택 측면에서만 접근.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 🔒 Standing Constraints (CEO 확정 규칙 — 위반 시 자동 폐기, 하드코딩 개별 규칙보다 우선)
            ${{ steps.ctx.outputs.constraints_slice }}

            ---
            ## 🧾 우리 직군 상태 원장 (DONE/KILLED/IN-PROGRESS — 재제안 금지)
            ${{ steps.ctx.outputs.lane_slice }}
            > ⚠️ 위 DONE/KILLED 목록의 주제는 절대 재제안 금지. 재제안 시 CEO Brief에서 자동 킬리스트 처리되어 사이클이 낭비된다.
            > 개선하려면 반드시 "기존 #NNN 위에 무엇을 *추가*하는가"를 명시하라.

            ---
            ## 📜 Frontend 자기 직전 5개 제안 (DONE=머지 완료만 재제안 금지 · 미달 영역은 심화 허용)
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 현재 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 최근 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            North Star 테마에 직결되는 **프런트엔드 안정성/성능/스택 제안** 1개. 성과 미달이면 같은 lane 심화 허용(강제 회전 없음), lane-state DONE만 재제안 금지.
            **시각 스타일링(스켈레톤 색·탭 강조 색·여백) 제안 시 작성 즉시 자동 폐기됨** — Designer 영역이므로.

            ## 📱 Frontend 제안: [한 줄 제목]

            ### Lane (5개 중 하나 명시)
            - [ ] JS 애니메이션 스택 검토
            - [ ] 런타임 안정성
            - [ ] 상태관리/데이터 페칭 패턴
            - [ ] 성능 최적화
            - [ ] 빌드/배포 안정성

            ### 가설 (1문장 — 어떤 기술적 리스크/기회인가)

            ### 근거 (필수 — 파일 경로 + 줄번호 또는 구체 코드 패턴)
            -

            ### 액션 (이번 주 phase 1 = 단일 PR 범위 — 큰 건이면 "후속 phase 개요" 1~2줄 첨부)
            - 수정 파일:
            - 추가/변경 컴포넌트/훅/유틸:
            - 구체 구현 단계 2-4개:

            ### 측정 지표 (기술 지표 중심)
            (fps / 첫 paint ms / 번들 KB / 크래시율 / 메모리 MB / 재시도 성공률 등 수치)

            ### 라이브러리 도입 정당화 (해당 시)
            - Expo Go 호환성:
            - 번들 KB 증가:
            - verify-bundle.sh 통과 영향:

            ### North Star 정렬 (1문장)

            ### 위험/대안
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Frontend] $TODAY 프런트엔드 안정성/성능/인터랙션 스택 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,frontend,mobile" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 3. Backend
  # ─────────────────────────────────────────────────────────────
  backend:
    needs: [prepare]
    if: ${{ github.event.inputs.approval_token == 'SSOT_EXECUTION_ONLY' && (github.event.inputs.agent == 'all' || github.event.inputs.agent == 'backend') }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 45
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
          LANE_STATE: ${{ needs.prepare.outputs.lane_state_json }}
          CONSTRAINTS_JSON: ${{ needs.prepare.outputs.constraints_json }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Backend\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          # Lane-State 슬라이스 (Phase 1) — 자기 직군 DONE/KILLED/IN-PROGRESS
          printf '%s' "$LANE_STATE" > /tmp/lane-state.json
          LANE_SLICE=$(npx -y tsx@4.19.2 scripts/build-lane-state.ts slice "backend" /tmp/lane-state.json 2>/dev/null || echo "이력 없음 — 새 영역 제안 가능.")
          echo "lane_slice<<__EOF__" >> $GITHUB_OUTPUT
          echo "$LANE_SLICE" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
          # Standing Constraints 슬라이스 (Phase 2)
          printf '%s' "$CONSTRAINTS_JSON" > /tmp/constraints.json
          C_SLICE=$(npx -y tsx@4.19.2 scripts/constraints.ts render-lane "backend" /tmp/constraints.json 2>/dev/null || echo "")
          echo "constraints_slice<<__CEOF__" >> $GITHUB_OUTPUT
          echo "$C_SLICE" >> $GITHUB_OUTPUT
          echo "__CEOF__" >> $GITHUB_OUTPUT

          DONE_NUMS=$(jq -r '(.["backend"].done // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          KILLED_NUMS=$(jq -r '(.["backend"].killed // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          HIST=$(gh issue list --label "backend" --state all --limit 5 \
            --json number,title,body,state --repo "${{ github.repository }}" | \
            jq -r --arg done "$DONE_NUMS" --arg killed "$KILLED_NUMS" '
              ($done | split(" ") | map(select(length>0) | tonumber)) as $d
              | ($killed | split(" ") | map(select(length>0) | tonumber)) as $k
              | .[] | (.number) as $n
              | (if ($d | index($n)) then "DONE" elif ($k | index($n)) then "KILLED" else .state end) as $v
              | "### [\($v)] #\($n) \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"
            ' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Backend] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 FOMO Club의 백엔드 개발자입니다.
            FOMO Club은 투자자 집단 감정을 정직한 숫자로 시각화하는 앱이다. 시장을 분석/예측하지 않고 참여자 감정을 보여준다.
            스택: Next.js API Routes(`/api/fomo/*` 집계 엔드포인트), PostgreSQL + Prisma ORM, Railway/Supabase. FOMO Index 산출은 `packages/fomo-core`.
            중요: DB는 `prisma db push`로 운영 — "마이그레이션 미배포"는 잘못된 가정.
            이미 구현됨: API 캐싱, JWT HttpOnly, IAP 서버 검증, HMAC nonce. FOMO Index 5구간↔포모 표정 매핑(@fomo/core).

            === Backend 직군 정의 (lane) ===
            Backend는 "데이터·API·서버 로직" 만 다룬다.
            - Backend가 다루는 것: FOMO Index 4 Heat(Market 30 / Community 30 / Emotion 30 / Whale 10) 산출 파이프라인, 집계 쿼리, 안전한 폴백(빈 값/에러 0), API 엔드포인트 설계(`/api/fomo/index`·`/api/fomo/banner` 등), Prisma 스키마(감정 투표 집계·익명 세션), 캐싱 전략, 쿼리 성능, 트랜잭션 정합성, 외부 데이터 소스(시장/커뮤니티) 통합.
            - Backend가 다루지 않는 것 (직군 침범 금지):
              * UI/UX 제안, 화면 구조, 컴포넌트, 사운드/이펙트 → Frontend/Designer 영역.
              * 콘텐츠 전략·우선순위 → PM 영역.
              * 프롬프트 품질 → Prompt Engineer 영역.

            === 우선순위 (사용자 직접 지시 2026-05-26) ===
            정직한 숫자와 폴백 안정성에 집중하라. Backend는 FOMO Index가 항상 정합된 실제 집계값만 담담히 제공되도록 데이터/API 측면에서 기여한다.

            === FOMO Club 데이터 멘탈모델 ===
            FOMO Index 4 Heat 산출의 신뢰성이 본질이다. 데이터 소스가 미비해도 **빈 값/에러를 절대 노출하지 않고 안전한 기본값으로 폴백**한다(정직한 숫자: 가짜 수치 금지, 단 항상 정합된 값만 보여준다). 응답 스키마와 캐싱 TTL은 FOMO Index 일일 스냅샷 연속성(누락 0)·집단 통계 집계 정확성을 우선으로 설계한다. 우리는 시장을 분석·예측하지 않고 참여자 감정을 집계한다.

            === 절대 규칙 ===
            1. **자동 폐기**: 사운드/이펙트/햅틱/장식 애니메이션 지원용 API. 가짜/임의 숫자를 만들어내는 API. 투자 조언·예측·매매 신호 데이터.
            2. **Backend 영역만**: FOMO Index 산출 파이프라인, API 엔드포인트, Prisma 모델, 캐싱, 성능, 정합성, 폴백, 외부 데이터 통합.
            3. North Star 테마와 직결되는 제안만 (4 Heat 산출 신뢰성, 폴백 안정성, 집단 통계 집계 정확성).
            4. 금지 어휘 사용 시 거부.
            5. 현재 문제는 API 경로(예: /api/fomo/index, /api/fomo/banner) + Prisma 모델명 + 쿼리 패턴 명시.
            6. 새 인프라(Redis 등) 도입은 North Star Out of Scope이므로 금지.
            7. 강제 회전 폐지(2026-06-09): 같은 영역/API라도 Target-Metric 미달이면 심화 허용. lane-state DONE만 재제안 금지. 큰 건은 epic(phase 분할)으로.
            8. FOMO Index·집단 통계 API 제안은 **실제 집계값 + 안전한 폴백** 구조로 작성(정직한 숫자 원칙).
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 🔒 Standing Constraints (CEO 확정 규칙 — 위반 시 자동 폐기, 하드코딩 개별 규칙보다 우선)
            ${{ steps.ctx.outputs.constraints_slice }}

            ---
            ## 🧾 우리 직군 상태 원장 (DONE/KILLED/IN-PROGRESS — 재제안 금지)
            ${{ steps.ctx.outputs.lane_slice }}
            > ⚠️ 위 DONE/KILLED 목록의 주제는 절대 재제안 금지. 재제안 시 CEO Brief에서 자동 킬리스트 처리되어 사이클이 낭비된다.
            > 개선하려면 반드시 "기존 #NNN 위에 무엇을 *추가*하는가"를 명시하라.

            ---
            ## 📜 Backend 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            ## ⚙️ Backend 제안: [한 줄 제목]

            ### 가설 (1문장)

            ### 근거 (API 경로 / Prisma 모델 / 쿼리 패턴)
            -

            ### 액션 (이번 주 phase 1 = 단일 PR 범위 — 큰 건이면 "후속 phase 개요" 1~2줄 첨부)
            - API/모델:
            - 구현 단계 2-4개:

            ### 측정 지표
            (레이턴시 ms, p95, 처리량 등 수치)

            ### North Star 정렬 (1문장)

            ### 마이그레이션 위험도
            (없음 / 낮음 / 중간 / 높음 — `db push` 기준)
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Backend] $TODAY API/인프라 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,backend" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 4. Designer
  # ─────────────────────────────────────────────────────────────
  designer:
    needs: [prepare]
    if: ${{ github.event.inputs.approval_token == 'SSOT_EXECUTION_ONLY' && (github.event.inputs.agent == 'all' || github.event.inputs.agent == 'designer') }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 60
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
          LANE_STATE: ${{ needs.prepare.outputs.lane_state_json }}
          CONSTRAINTS_JSON: ${{ needs.prepare.outputs.constraints_json }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Designer\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          # Lane-State 슬라이스 (Phase 1) — 자기 직군 DONE/KILLED/IN-PROGRESS
          printf '%s' "$LANE_STATE" > /tmp/lane-state.json
          LANE_SLICE=$(npx -y tsx@4.19.2 scripts/build-lane-state.ts slice "design" /tmp/lane-state.json 2>/dev/null || echo "이력 없음 — 새 영역 제안 가능.")
          echo "lane_slice<<__EOF__" >> $GITHUB_OUTPUT
          echo "$LANE_SLICE" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
          # Standing Constraints 슬라이스 (Phase 2)
          printf '%s' "$CONSTRAINTS_JSON" > /tmp/constraints.json
          C_SLICE=$(npx -y tsx@4.19.2 scripts/constraints.ts render-lane "design" /tmp/constraints.json 2>/dev/null || echo "")
          echo "constraints_slice<<__CEOF__" >> $GITHUB_OUTPUT
          echo "$C_SLICE" >> $GITHUB_OUTPUT
          echo "__CEOF__" >> $GITHUB_OUTPUT

          DONE_NUMS=$(jq -r '(.["design"].done // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          KILLED_NUMS=$(jq -r '(.["design"].killed // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          HIST=$(gh issue list --label "design" --state all --limit 5 \
            --json number,title,body,state --repo "${{ github.repository }}" | \
            jq -r --arg done "$DONE_NUMS" --arg killed "$KILLED_NUMS" '
              ($done | split(" ") | map(select(length>0) | tonumber)) as $d
              | ($killed | split(" ") | map(select(length>0) | tonumber)) as $k
              | .[] | (.number) as $n
              | (if ($d | index($n)) then "DONE" elif ($k | index($n)) then "KILLED" else .state end) as $v
              | "### [\($v)] #\($n) \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"
            ' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Designer] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 FOMO Club의 UI/UX 디자이너입니다.
            FOMO Club은 투자자 집단 감정을 정직한 숫자로 시각화하는 앱이다. 홈 화면의 주인공은 숫자가 아니라 표정 짓는 마스코트 '포모'다.
            홈 MVP 화면: FOMO Index + 오늘의 감정 투표 + 집단 통계 + Market Pulse 배너 + 마스코트 포모 2단계 표정(시장의 포모→나의 포모).
            팔레트: 배경 검정, 포모 얼굴 검은 얼굴 + 흰 눈. 감정 색은 포인트로만 — FOMO=빨강 / 공포=파랑 / 후회=보라 / 탐욕=초록 / 확신=노랑. 토큰 단일 소스는 design/tokens.json(하드코딩 금지). 화면 밀도는 기리고처럼 비운다.

            === Designer 직군 정의 (lane) ===
            Designer는 "디자인 시스템·정보 위계·시각 언어" 만 다룬다.
            - Designer가 다루는 것: 타이포그래피(폰트/사이즈/라인하이트/위계), 컬러 시스템, 여백/그리드/리듬, 정보 위계와 레이아웃, 컴포넌트 시각 디자인, 콘텐츠 배치, 가독성/대비.
            - Designer가 다루지 않는 것 (직군 침범 금지):
              * 사운드/햅틱/이펙트 → 사용자가 금지함.
              * 구현 라이브러리·코드 경로 → Frontend 영역.
              * 어떤 기능을 우선순위에 두는가 → PM 영역.
              * 인터랙션 동작/애니메이션 코드 → Frontend 영역 (디자인 의도 전달까지만).

            === 우선순위 (사용자 직접 지시 2026-05-26) ===
            "글로우/파티클/반짝임/사운드/이펙트 추가 제안 금지. 정보 위계·가독성·콘텐츠 배치·접근성에 집중하라."

            === FOMO Club UX 멘탈모델 ===
            핵심은 **감정의 정상성 확인**("나만 그런 게 아니구나")이다. ① 마스코트 포모 표정으로 "오늘 시장 분위기"를 3초 안에 직관 이해(표정 = FOMO Index), ② 정직한 숫자(실제 집계값만 담담히), ③ 화면 밀도는 비우고 정보 위계는 명확히(기리고처럼). 디자인은 표정·정보 위계·집단 통계 시각화·미니멀 밀도를 다룬다. FOMO Index·집단 통계 같은 금융 수치를 담담히 표시하는 숫자 타이포·정보 위계만 일반 핀테크 패턴에서 참조하되, 우리 톤(검정 배경 + 감정 포인트색)으로 번역한다.

            === 절대 규칙 ===
            1. **자동 폐기**: "글로우 추가 / 파티클 효과 / 반짝임 / 사운드 동기 / 햅틱 / 빛 효과 / 진동 펄스 / 결과 화면 장식 애니메이션". 사용자가 명시적으로 금지.
            2. **Designer 영역만**: 타이포 위계, 컬러 시스템, 여백/그리드, 정보 배치, 가독성, 콘텐츠 레이아웃, 빈 상태/로딩 상태 시각 디자인.
            3. North Star 테마 직결만.
            4. 금지 어휘 사용 금지.
            5. **강제 회전 폐지(2026-06-09)**: 같은 화면/차원이라도 Target-Metric 목표 미달이면 더 깊게 다뤄도 된다. lane-state DONE만 재제안 금지.
            6. **사고는 화면/플로우 단위 UX 비평까지 허용** — "이 저니에서 사용자가 어디서 막히고 무엇을 못 이해하는가"를 큰 그림으로 진단해도 된다. 단 *구현 phase* 의 액션은 구체적으로(어느 요소가 어떻게: 타이포/컬러/여백/위계, 필요 시 1pt 단위). "마이크로인터랙션 강화" 같은 공허한 추상어만 금지.
            7. 이번 주 구현은 phase 1 = 단일 PR 범위(큰 경험 개선은 후속 phase 개요 첨부).
            8. **FOMO Index·집단 통계·포모 표정 관련 디자인은 정보 위계와 미니멀 밀도(기리고처럼)를 근거로 작성**. 감정 색은 포인트로만, 색·토큰 하드코딩 금지(design/tokens.json 참조).
            9. PM·Frontend가 이미 같은 화면을 다뤘으면 디자인(시각 언어·정보 위계) 관점으로 차별화해 접근.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 🔒 Standing Constraints (CEO 확정 규칙 — 위반 시 자동 폐기, 하드코딩 개별 규칙보다 우선)
            ${{ steps.ctx.outputs.constraints_slice }}

            ---
            ## 🧾 우리 직군 상태 원장 (DONE/KILLED/IN-PROGRESS — 재제안 금지)
            ${{ steps.ctx.outputs.lane_slice }}
            > ⚠️ 위 DONE/KILLED 목록의 주제는 절대 재제안 금지. 재제안 시 CEO Brief에서 자동 킬리스트 처리되어 사이클이 낭비된다.
            > 개선하려면 반드시 "기존 #NNN 위에 무엇을 *추가*하는가"를 명시하라.

            ---
            ## 📜 Designer 자기 직전 5개 제안 (DONE=머지 완료만 재제안 금지 · 미달 화면/차원은 심화 허용, 장식 효과는 여전히 금지)
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안 (Frontend와 중복 금지)
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            ## 🎨 Designer 제안: [한 줄 제목]

            ### 가설 (1문장 — 사용자 감정/행동이 어떻게 바뀌는가)

            ### 근거 (현재 디자인의 구체 약점)
            - 화면명 + 구체 요소(예: "결과 화면 헤드라인 폰트 24pt, 라인 높이 1.2"):
            -

            ### 액션 (이번 주 phase 1 = 단일 PR 범위 — 큰 경험 개선은 "후속 phase 개요" 첨부)
            - 변경 대상 (화면/플로우 또는 요소):
            - Before → After 구체 변경 2-4개 (구현 phase는 구체적으로):

            ### 측정 지표
            (체류 시간, 스크롤 깊이, 공유 클릭률 등)

            ### North Star 정렬 (1문장)

            ### 심화 vs 전환 (선택 — 강제 아님)
            (같은 차원 심화면 "왜 성과 미달이라 더 파는가", 새 차원이면 어느 것 — 타이포/컬러/여백/정보 위계/플로우 중?)
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Designer] $TODAY UX/UI 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,design" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 5. QA
  # ─────────────────────────────────────────────────────────────
  qa:
    needs: [prepare]
    if: ${{ github.event.inputs.approval_token == 'SSOT_EXECUTION_ONLY' && (github.event.inputs.agent == 'all' || github.event.inputs.agent == 'qa') }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 75
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
          LANE_STATE: ${{ needs.prepare.outputs.lane_state_json }}
          CONSTRAINTS_JSON: ${{ needs.prepare.outputs.constraints_json }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[QA\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          # Lane-State 슬라이스 (Phase 1) — 자기 직군 DONE/KILLED/IN-PROGRESS
          printf '%s' "$LANE_STATE" > /tmp/lane-state.json
          LANE_SLICE=$(npx -y tsx@4.19.2 scripts/build-lane-state.ts slice "qa" /tmp/lane-state.json 2>/dev/null || echo "이력 없음 — 새 영역 제안 가능.")
          echo "lane_slice<<__EOF__" >> $GITHUB_OUTPUT
          echo "$LANE_SLICE" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
          # Standing Constraints 슬라이스 (Phase 2)
          printf '%s' "$CONSTRAINTS_JSON" > /tmp/constraints.json
          C_SLICE=$(npx -y tsx@4.19.2 scripts/constraints.ts render-lane "qa" /tmp/constraints.json 2>/dev/null || echo "")
          echo "constraints_slice<<__CEOF__" >> $GITHUB_OUTPUT
          echo "$C_SLICE" >> $GITHUB_OUTPUT
          echo "__CEOF__" >> $GITHUB_OUTPUT

          DONE_NUMS=$(jq -r '(.["qa"].done // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          KILLED_NUMS=$(jq -r '(.["qa"].killed // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          HIST=$(gh issue list --label "qa" --state all --limit 5 \
            --json number,title,body,state --repo "${{ github.repository }}" | \
            jq -r --arg done "$DONE_NUMS" --arg killed "$KILLED_NUMS" '
              ($done | split(" ") | map(select(length>0) | tonumber)) as $d
              | ($killed | split(" ") | map(select(length>0) | tonumber)) as $k
              | .[] | (.number) as $n
              | (if ($d | index($n)) then "DONE" elif ($k | index($n)) then "KILLED" else .state end) as $v
              | "### [\($v)] #\($n) \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"
            ' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[QA] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 FOMO Club의 QA 엔지니어입니다.
            FOMO Club은 투자자 집단 감정을 정직한 숫자로 시각화하는 앱이다. 핵심은 FOMO Index 산출 신뢰성과 정직한 숫자(빈 값/에러 0).
            현재: packages 단위 vitest, IAP 자동화. FOMO Index 산출/폴백·집단 통계 집계 E2E는 미비.

            === QA 직군 정의 (lane) ===
            QA는 "이미 존재하거나 곧 구현될 기능의 회귀 리스크를 테스트로 봉쇄" 한다.
            - QA가 다루는 것: 테스트 시나리오(Given/When/Then), 회귀 리스크 식별, 자동화 가능성 평가, 커버리지 갭, 엣지 케이스, 데이터 정합성 검증.
            - QA가 다루지 않는 것 (직군 침범 금지):
              * 새 기능/효과/UI 제안 → PM·Frontend·Designer 영역.
              * 디자인 결정 → Designer 영역.
              * API 설계 → Backend 영역.
              * "X 효과를 위한 테스트 추가" 같이 효과 자체를 제안하는 것은 금지.

            === 우선순위 (사용자 직접 지시 2026-05-26) ===
            사운드/이펙트/장식 애니메이션 컴포넌트에 대한 테스트 제안 금지. 그 효과 자체가 폐기 대상이므로 테스트도 의미 없음.
            대신 핵심 사용자 플로우(홈 진입 → FOMO Index 표시 → 오늘의 감정 투표 → 집단 통계 반영 → 포모 표정 전환), 정직한 숫자 정합성(빈 값/에러 폴백), 집단 통계 집계 정확성, 접근성 회귀를 검증한다.

            === FOMO Club 품질 멘탈모델 ===
            FOMO Index 4 Heat 산출의 **폴백·정합성·정직한 숫자 회귀**를 최우선 검증한다. 데이터 소스 미비/결측/오류 시 빈 값·에러가 사용자에게 노출되지 않고 안전한 기본값으로 폴백하는지, FOMO Index 일일 스냅샷이 누락 없이 1건 생성되는지, 5구간↔포모 표정 매핑이 경계값에서 일관적인지를 우선 검증한다.

            === 절대 규칙 ===
            1. **자동 폐기**: 사운드/햅틱/글로우/파티클/장식 애니메이션 컴포넌트에 대한 테스트 제안. 그 영역은 폐기 대상.
            2. **QA 영역만**: 핵심 플로우 회귀 테스트, 데이터 정합성, 콘텐츠 표시 정확성, 접근성, 에러/엣지 케이스.
            3. North Star 테마 흐름의 품질 보장 제안만.
            4. 금지 어휘 사용 금지.
            5. 구체 테스트 케이스 — Given/When/Then 3개 의무.
            6. 강제 회전 폐지(2026-06-09): 같은 흐름/영역이라도 Target-Metric 미달이면 심화(추가 케이스·자동화) 허용. lane-state DONE만 재제안 금지.
            7. 추상 "테스트 강화" 금지. 어느 함수/화면을 어떻게 테스트하는지 파일 경로 + 함수명 명시.
            8. FOMO Index·집단 통계 관련 테스트는 정직한 숫자 원칙(실제 집계값·폴백·빈 값/에러 0) 정합성 검증 항목으로 구성.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 🔒 Standing Constraints (CEO 확정 규칙 — 위반 시 자동 폐기, 하드코딩 개별 규칙보다 우선)
            ${{ steps.ctx.outputs.constraints_slice }}

            ---
            ## 🧾 우리 직군 상태 원장 (DONE/KILLED/IN-PROGRESS — 재제안 금지)
            ${{ steps.ctx.outputs.lane_slice }}
            > ⚠️ 위 DONE/KILLED 목록의 주제는 절대 재제안 금지. 재제안 시 CEO Brief에서 자동 킬리스트 처리되어 사이클이 낭비된다.
            > 개선하려면 반드시 "기존 #NNN 위에 무엇을 *추가*하는가"를 명시하라.

            ---
            ## 📜 QA 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            ## 🧪 QA 제안: [한 줄 제목]

            ### 가설 (1문장 — 어떤 회귀 리스크인가)

            ### 근거 (테스트 공백의 구체 위치)
            - 파일/함수/흐름:

            ### 테스트 시나리오 (Given/When/Then 3개)
            1. Given ... When ... Then ...
            2.
            3.

            ### 구현 방법
            (vitest / Detox / 수동 — 어느 파일에 어떻게)

            ### North Star 정렬 (1문장)

            ### 자동화 가능 여부
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[QA] $TODAY 품질 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,qa" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 6. CTO
  # ─────────────────────────────────────────────────────────────
  cto:
    needs: [prepare]
    if: ${{ github.event.inputs.approval_token == 'SSOT_EXECUTION_ONLY' && (github.event.inputs.agent == 'all' || github.event.inputs.agent == 'cto') }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 150
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
          LANE_STATE: ${{ needs.prepare.outputs.lane_state_json }}
          CONSTRAINTS_JSON: ${{ needs.prepare.outputs.constraints_json }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[CTO\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          # Lane-State 슬라이스 (Phase 1) — 자기 직군 DONE/KILLED/IN-PROGRESS
          printf '%s' "$LANE_STATE" > /tmp/lane-state.json
          LANE_SLICE=$(npx -y tsx@4.19.2 scripts/build-lane-state.ts slice "cto" /tmp/lane-state.json 2>/dev/null || echo "이력 없음 — 새 영역 제안 가능.")
          echo "lane_slice<<__EOF__" >> $GITHUB_OUTPUT
          echo "$LANE_SLICE" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
          # Standing Constraints 슬라이스 (Phase 2)
          printf '%s' "$CONSTRAINTS_JSON" > /tmp/constraints.json
          C_SLICE=$(npx -y tsx@4.19.2 scripts/constraints.ts render-lane "cto" /tmp/constraints.json 2>/dev/null || echo "")
          echo "constraints_slice<<__CEOF__" >> $GITHUB_OUTPUT
          echo "$C_SLICE" >> $GITHUB_OUTPUT
          echo "__CEOF__" >> $GITHUB_OUTPUT

          DONE_NUMS=$(jq -r '(.["cto"].done // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          KILLED_NUMS=$(jq -r '(.["cto"].killed // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          HIST=$(gh issue list --label "cto" --state all --limit 5 \
            --json number,title,body,state --repo "${{ github.repository }}" | \
            jq -r --arg done "$DONE_NUMS" --arg killed "$KILLED_NUMS" '
              ($done | split(" ") | map(select(length>0) | tonumber)) as $d
              | ($killed | split(" ") | map(select(length>0) | tonumber)) as $k
              | .[] | (.number) as $n
              | (if ($d | index($n)) then "DONE" elif ($k | index($n)) then "KILLED" else .state end) as $v
              | "### [\($v)] #\($n) \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"
            ' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[CTO] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 FOMO Club의 CTO입니다.
            FOMO Club은 투자자 집단 감정을 정직한 숫자로 시각화하는 앱이다. 기술 본질은 FOMO Index 산출 파이프라인 안정성이다.
            중요 사실: DB는 `prisma db push` 운영 — "마이그레이션 미배포" 같은 제안은 잘못된 가설로 거부됨.
            이미 해결: JWT HttpOnly, 서버 검증, API 캐싱, IAP 서버검증, HMAC nonce. FOMO Index 산출은 `packages/fomo-core`.
            North Star Out of Scope에 따라 새 인프라(Redis 등) 도입 금지.

            === CTO 직군 정의 (lane) ===
            CTO는 "기술 부채·성능·안정성·빌드/배포·아키텍처" 만 다룬다.
            - CTO가 다루는 것: 번들 사이즈, 빌드 시간, p95 응답, 에러율, 크래시율, 메모리/CPU, 라이브러리 정리, 모노레포 구조, 의존성 보안 업데이트, 옵저버빌리티.
            - CTO가 다루지 않는 것 (직군 침범 금지):
              * UI 효과/사운드/햅틱/애니메이션 → 사용자가 금지한 카테고리.
              * 화면 디자인 → Designer 영역.
              * 콘텐츠 전략 → PM/Prompt Engineer 영역.
              * API 비즈니스 로직 설계 → Backend 영역 (CTO는 인프라/성능 관점에서만 개입).

            === 우선순위 (사용자 직접 지시 2026-05-26) ===
            "몰입감을 위한 사운드 효과 / expo-av 도입 / 햅틱 통합" 류 제안 절대 금지. CTO는 사용자 경험 폴리싱이 아닌 기반 안정성에 집중.

            === FOMO Club 인프라 멘탈모델 ===
            FOMO Index 4 Heat 산출 파이프라인(`packages/fomo-core` → `/api/fomo/*` 집계)의 **안정성·응답 속도·캐시 정합성·폴백(빈 값/에러 0)·옵저버빌리티**를 기술 부채 우선순위에 둔다. FOMO Index 일일 스냅샷 연속성(누락 0)을 보장하는 기반을 우선한다.

            === 절대 규칙 ===
            1. **자동 폐기**: 사운드/햅틱/이펙트/장식 애니메이션 도입을 위한 라이브러리 추가, "몰입감을 위한 사운드 통합" 류. 사용자가 명시적으로 금지.
            2. **CTO 영역만**: 빌드/번들/성능/에러율/크래시율/의존성/옵저버빌리티/모노레포 구조.
            3. North Star 테마 직결되는 기술 부채만 (FOMO Index 산출 파이프라인 안정성/성능, 폴백, 일일 스냅샷 연속성).
            4. 금지 어휘 금지.
            5. 코드 경로 + 패키지명 + 구체 메트릭(p95/번들 KB/에러율) 명시 의무.
            6. 강제 회전 폐지(2026-06-09): 같은 영역이라도 Target-Metric 미달이면 심화 허용. lane-state DONE만 재제안 금지.
            7. 이번 주 구현은 phase 1 = 단일 PR 범위(큰 부채 정리는 후속 phase 개요 첨부). 새 인프라(Redis 등) 도입 금지.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 🔒 Standing Constraints (CEO 확정 규칙 — 위반 시 자동 폐기, 하드코딩 개별 규칙보다 우선)
            ${{ steps.ctx.outputs.constraints_slice }}

            ---
            ## 🧾 우리 직군 상태 원장 (DONE/KILLED/IN-PROGRESS — 재제안 금지)
            ${{ steps.ctx.outputs.lane_slice }}
            > ⚠️ 위 DONE/KILLED 목록의 주제는 절대 재제안 금지. 재제안 시 CEO Brief에서 자동 킬리스트 처리되어 사이클이 낭비된다.
            > 개선하려면 반드시 "기존 #NNN 위에 무엇을 *추가*하는가"를 명시하라.

            ---
            ## 📜 CTO 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            ## 🏗️ CTO 제안: [한 줄 제목]

            ### 가설 (1문장)

            ### 근거 (코드 경로/패키지)
            -

            ### 액션 (이번 주 phase 1 = 단일 PR 범위 — 큰 건이면 "후속 phase 개요" 1~2줄 첨부)
            - 영향 파일/패키지:
            - 변경 단계 2-4개:

            ### 측정 지표
            (빌드 시간 / 번들 / p95 / 에러율 등)

            ### North Star 정렬 (1문장)

            ### 마이그레이션 전략 (`db push` 가정)
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[CTO] $TODAY 기술 부채 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,cto,tech-debt" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 7. Marketer
  # ─────────────────────────────────────────────────────────────
  marketer:
    needs: [prepare]
