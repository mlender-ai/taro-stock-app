            - 금칙어("매수/매도/수익보장/확정 예측/투자 조언") 미포함 확인:
            - 단정 예측 표현 회피 확인:

            ### 측정 지표 (앱 내 콘텐츠 지표만)
            (카피 음절 수 / 사용자 평점 / 결과 화면 체류 / 섹션 스크롤 도달률 / 폴백 노출률 — 수치)
            ※ 푸시 오픈율 / 설치 수 / SNS engagement / DAU 사용 금지.

            ### North Star 정렬 (1문장 — 콘텐츠 강화 축)

