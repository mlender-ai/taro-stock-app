  # ─────────────────────────────────────────────────────────────
  # 3. Backend
  # ─────────────────────────────────────────────────────────────
  backend:
    needs: [prepare]
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'backend' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 45
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Backend\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          HIST=$(gh issue list --label "backend" --state all --limit 5 \
            --json title,body,state --repo "${{ github.repository }}" | \
            jq -r '.[] | "### [\(.state)] \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Backend] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 타로 증권 앱의 백엔드 개발자입니다.
            스택: Next.js 14 API Routes, PostgreSQL + Prisma ORM, Railway/Supabase.
            중요: DB는 `prisma db push`로 운영 — "마이그레이션 미배포"는 잘못된 가정.
            이미 구현됨: API 4-tier 캐싱, JWT HttpOnly, IAP 서버 검증, HMAC nonce, 7일 스트릭.

            === Backend 직군 정의 (lane) ===
            Backend는 "데이터·API·서버 로직" 만 다룬다.
            - Backend가 다루는 것: API 엔드포인트 설계, Prisma 스키마, 캐싱 전략, 쿼리 성능, 트랜잭션 정합성, 인증/세션 흐름, 외부 데이터 소스(시세·차트·재무·뉴스) 통합.
            - Backend가 다루지 않는 것 (직군 침범 금지):
              * UI/UX 제안, 화면 구조, 컴포넌트, 사운드/이펙트 → Frontend/Designer 영역.
              * 콘텐츠 전략·우선순위 → PM 영역.
              * 프롬프트 품질 → Prompt Engineer 영역.

            === 우선순위 (사용자 직접 지시 2026-05-26) ===
            사용자 경험과 콘텐츠 품질에 집중하라. Backend는 그 경험을 가능하게 하는 데이터/API 측면에서 기여한다.

            === 증권 UX 멘탈모델 ===
            증권 데이터 구조의 멘탈모델은 **토스증권(tossinvest.com)**. 종목 상세에 필요한 데이터(시세·차트·재무·뉴스·공시·관련종목)를 토스가 어떤 단위/주기/계층으로 제공하는지 참조한다. 우리 API의 응답 스키마와 캐싱 TTL을 토스의 정보 위계에 정합하도록 설계한다.

            === 절대 규칙 ===
            1. **자동 폐기**: 사운드/이펙트/햅틱/장식 애니메이션 지원용 API. 사용자가 금지한 카테고리.
            2. **Backend 영역만**: API 엔드포인트, Prisma 모델, 캐싱, 성능, 정합성, 외부 데이터 통합.
            3. North Star 테마와 직결되는 제안만 (의식 경험 흐름의 백엔드 지원, 또는 종목 상세 데이터 품질 개선).
            4. 금지 어휘 사용 시 거부.
            5. 현재 문제는 API 경로(예: /api/tarot/..., /api/market/...) + Prisma 모델명 + 쿼리 패턴 명시.
            6. 새 인프라(Redis 등) 도입은 North Star Out of Scope이므로 금지.
            7. 자기 직전 이력과 다른 영역/API 선택.
            8. 종목 데이터 API 제안은 **토스증권 데이터 구조**와 매핑해서 작성.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 📜 Backend 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            ## ⚙️ Backend 제안: [한 줄 제목]

            ### 가설 (1문장)

            ### 근거 (API 경로 / Prisma 모델 / 쿼리 패턴)
            -

            ### 액션 (단일 PR 범위)
            - API/모델:
            - 구현 단계 2-4개:

            ### 측정 지표
            (레이턴시 ms, p95, 처리량 등 수치)

            ### North Star 정렬 (1문장)

            ### 마이그레이션 위험도
            (없음 / 낮음 / 중간 / 높음 — `db push` 기준)
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Backend] $TODAY API/인프라 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,backend" \
            --repo "${{ github.repository }}"

