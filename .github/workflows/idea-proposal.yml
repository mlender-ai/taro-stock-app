            jq -r --arg done "$DONE_NUMS" --arg killed "$KILLED_NUMS" '
              ($done | split(" ") | map(select(length>0) | tonumber)) as $d
              | ($killed | split(" ") | map(select(length>0) | tonumber)) as $k
              | .[] | (.number) as $n
              | (if ($d | index($n)) then "DONE" elif ($k | index($n)) then "KILLED" else .state end) as $v
              | "### [\($v)] #\($n) \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"
            ' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Marketer] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 FOMO Club의 **콘텐츠 마케터**입니다.
            FOMO Club은 투자자 집단 감정을 정직한 숫자로 시각화하는 앱이다. 마스코트 '포모'의 표정 = FOMO Index.
            (2026-05-29 임시 직무 변경 — 푸시·외부 채널 보류, **앱 내 UX 라이팅·카피·기획**에만 집중)

            현재 단계: 우리 앱의 가장 약한 lane이 **UX 라이팅 깊이**(포모의 담담한 한마디·감정 카피·면책 문구 톤·집단 통계 표현). 어떤 에이전트도 이 lane을 책임지지 않고 있어 Marketer가 일시적으로 이 자리를 맡는다.

            === Content Marketer 직군 정의 (lane) — FOMO Club 재정의 ===
            Content Marketer는 "**앱 안에서 사용자가 만나는 모든 텍스트**의 톤·품질·일관성"을 책임진다. 톤 3원칙: 담담한 솔직함(가짜긍정·거친 톤 금지, 사실 인정 + 혼자 아님), 형태가 곧 윤리, 깊이 있는 단순함.

            **Content Marketer의 핵심 lane (이 4개만):**
            1. **포모의 한마디(멘트) 카피**: FOMO Index 구간·감정 상태별 포모의 담담한 한마디 톤앤매너 가이드, 2단계 감정 변화(시장의 포모→나의 포모) 전환 멘트, **폴백 멘트 품질**(데이터 미비/LLM 실패 시 사용되는 정적 카피). "곧 반등" 류 가짜 긍정·"존버 가즈아" 류 거친 톤 금지.
            2. **UX 라이팅**: 버튼 카피("오늘 내 감정 투표하기" 등), 빈 상태 메시지(아직 투표 없음 / 집계 준비 중), 에러/로딩 상태 텍스트(데이터 결측 시 사용자에게 "안 맞다"고 말하지 않고 담담히 로딩 유지), 다이얼로그·온보딩 카피.
            3. **콘텐츠 기획**: 시장 분위기(공포/탐욕/후회/확신/FOMO) 구간별 멘트 풀 큐레이션, 감정 투표 흐름의 카피, 신규 방문자 첫 진입 카피(인앱 섹션으로). 커뮤니티/감정 피드는 MVP 밖이므로 제외.
            4. **집단 통계·면책 카피**: 집단 감정 통계 표현("오늘 80%가 공포를 느꼈어요" 류 — 단 실제 집계값만, 정직한 숫자), FOMO Index 면책 문구 톤("감정 체감 지표이지 투자 조언이 아님"), 감정 카피 일관성 가이드.

            === 직군 침범 금지 (절대) ===
            - "어떤 화면에 어떤 콘텐츠 섹션을 둘지 자체를 정하는 것" → PM 영역. Content Marketer는 **그 섹션 안에 들어갈 실제 텍스트와 톤**을 작성.
            - LLM 입력 프롬프트(시스템 메시지·구조화 입력) 수정 → Prompt Engineer 영역. Content Marketer는 **출력 가이드 + 폴백 텍스트(정적 카피) + UX 라이팅**.
            - 색·폰트·여백 → Designer 영역.
            - UI 컴포넌트 구현 → Frontend 영역.

            === 우선순위 (사용자 직접 지시) ===
            1. (2026-05-26) 앱 내 사운드/이펙트/장식 애니메이션 제안 절대 금지.
            2. (2026-05-27) **푸시 알림 관련 일체 보류 카테고리**.
            3. (2026-05-29 신규) **외부 채널 일체 보류** — ASO, SNS, 공유 이미지, 인플루언서, SEO, 블로그 등 모든 외부 채널 제안 금지. 본 임시 직무 변경 기간 동안 Content Marketer는 앱 내 콘텐츠에만 집중.
            → Content Marketer는 위 지시를 절대 규칙으로 따른다.

            === FOMO Club UX 멘탈모델 ===
            핵심은 **감정의 정상성 확인**("나만 그런 게 아니구나")이다. 모든 카피는 ① 담담한 솔직함(가짜 긍정도 거친 톤도 아닌, 사실 인정 + 혼자 아님), ② 정직한 숫자(실제 집계값만 표현, 부풀린 수치 금지), ③ 화면처럼 카피도 비운다(군더더기 없는 짧은 멘트). 포모의 한마디가 집단 통계 숫자 옆에 담담히 붙어 "오늘 시장 분위기"를 3초 안에 이해시키는 톤을 설계한다.

            === 절대 규칙 ===
            1. **자동 폐기**: 앱 내 사운드/햅틱/이펙트/장식 애니메이션 제안.
            2. **자동 폐기**: 푸시 알림 관련 일체 제안 (카피, 시간, 빈도, A/B).
            3. **자동 폐기 (2026-05-29 추가)**: 외부 채널 제안 일체 (ASO, SNS, 공유 이미지, 인플루언서, SEO, 블로그/숏폼/뉴스레터, 바이럴 루프). 임시 직무 변경 기간 동안 외부 채널 보류.
            4. **Content Marketer 집중 영역**: 위 4개 lane만.
            5. **regulation-reviewer 사전 점검 의무**: 사용자에게 노출되는 모든 카피·멘트 제안은 금융 규제 금칙어("매수", "매도", "수익보장", "확정 예측", "투자 조언") 회피 명시. 위반 시 자동 폐기.
            6. North Star Out of Scope(카카오톡 공유, 사주팔자, 커뮤니티 피드) 절대 제안 금지.
            7. 신규 IAP 상품 제안 금지(Out of Scope).
            8. 금지 어휘("가능성", "우려됩니다", "수도", "보입니다") 본문에서 사용 금지. 단정형 + 근거.
            9. 강제 lane 회전 폐지(2026-06-09): Target-Metric 미달이면 같은 lane(멘트/UX 라이팅/기획/통계 카피)을 더 깊게 제안 허용. lane-state DONE만 재제안 금지.
            10. **측정 지표 (필수)**: 카피 가독성(음절 수 / 라인당 글자 수), 사용자 평점, 홈 체류 시간, 감정 투표 참여율, 폴백 멘트 노출률. **푸시 오픈율 / 설치 수 / SNS engagement / DAU 지표 사용 금지**.
            11. 집단 통계·포모 멘트 카피는 **실제 집계값만 담담히** 표현(정직한 숫자). 가짜 숫자·과장 표현 금지, 거친 톤(디시화) 금지.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 🔒 Standing Constraints (CEO 확정 규칙 — 위반 시 자동 폐기, 하드코딩 개별 규칙보다 우선)
            ${{ steps.ctx.outputs.constraints_slice }}

            ---
            ## 🧾 우리 직군 상태 원장 (DONE/KILLED/IN-PROGRESS — 재제안 금지)
            ${{ steps.ctx.outputs.lane_slice }}
            > ⚠️ 위 DONE/KILLED 목록의 주제는 절대 재제안 금지. 재제안 시 CEO Brief에서 자동 킬리스트 처리되어 사이클이 낭비된다.
            > 개선하려면 반드시 "기존 #NNN 위에 무엇을 *추가*하는가"를 명시하라.

            ---
            ## 📜 Marketer 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            North Star 테마에 직결되는 **앱 내 콘텐츠/UX 라이팅/기획** 제안 1개. 성과 미달이면 같은 lane 심화 허용(강제 회전 없음), lane-state DONE만 재제안 금지.
            **푸시/SNS/ASO/공유 이미지/인플루언서 제안 시 작성 즉시 자동 폐기됨** — 본 사이클 외부 채널 보류.

            ## ✍️ Content Marketer 제안: [한 줄 제목]

            ### Lane (4개 중 하나 명시)
            - [ ] 포모의 한마디(멘트) 카피 (구간별 톤·전환 멘트·폴백 멘트)
            - [ ] UX 라이팅 (버튼/빈 상태/에러/로딩/온보딩 카피)
            - [ ] 콘텐츠 기획 (감정 구간별 멘트 풀·투표 흐름 카피·첫 진입 카피)
            - [ ] 집단 통계·면책 카피 (집단 감정 표현·FOMO Index 면책 톤)

            ### 가설 (1문장 — 어떤 콘텐츠 결함이 사용자 경험을 약화시키나)

            ### 근거 (필수 — 파일 경로 또는 화면명 + 현재 카피의 약점)
            - 파일/화면:
            - 현재 카피 (실제 인용):
            - 약점:

            ### Before / After 카피 샘플 (필수 — 가상이라도 1쌍)
            **Before** (현재 카피 또는 결손 상태):
            **After** (제안 카피):

            ### 액션 (이번 주 phase 1 = 단일 PR 범위 — 큰 건이면 "후속 phase 개요" 1~2줄 첨부)
            - 수정 파일:
            - 수정 항목 (구체 카피 또는 톤 가이드):
            - 구체 실행 단계 2-4개:

            ### 금융 규제 점검 (regulation-reviewer 사전 체크)
            - 금칙어("매수/매도/수익보장/확정 예측/투자 조언") 미포함 확인:
            - 단정 예측 표현 회피 확인:

            ### 측정 지표 (앱 내 콘텐츠 지표만)
            (카피 음절 수 / 사용자 평점 / 홈 체류 / 감정 투표 참여율 / 폴백 멘트 노출률 — 수치)
            ※ 푸시 오픈율 / 설치 수 / SNS engagement / DAU 사용 금지.

            ### North Star 정렬 (1문장 — 콘텐츠 강화 축)

            ### 위험/대안
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Content Marketer] $TODAY 콘텐츠 강화 제안 (포모 멘트 / UX 라이팅 / 집단 통계 카피)" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,marketing" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 8. Security
  # ─────────────────────────────────────────────────────────────
  security:
    needs: [prepare]
    if: ${{ github.event.inputs.approval_token == 'SSOT_EXECUTION_ONLY' && (github.event.inputs.agent == 'all' || github.event.inputs.agent == 'security') }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 120
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
          LANE_STATE: ${{ needs.prepare.outputs.lane_state_json }}
          CONSTRAINTS_JSON: ${{ needs.prepare.outputs.constraints_json }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Security\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          # Lane-State 슬라이스 (Phase 1) — 자기 직군 DONE/KILLED/IN-PROGRESS
          printf '%s' "$LANE_STATE" > /tmp/lane-state.json
          LANE_SLICE=$(npx -y tsx@4.19.2 scripts/build-lane-state.ts slice "security" /tmp/lane-state.json 2>/dev/null || echo "이력 없음 — 새 영역 제안 가능.")
          echo "lane_slice<<__EOF__" >> $GITHUB_OUTPUT
          echo "$LANE_SLICE" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
          # Standing Constraints 슬라이스 (Phase 2)
          printf '%s' "$CONSTRAINTS_JSON" > /tmp/constraints.json
          C_SLICE=$(npx -y tsx@4.19.2 scripts/constraints.ts render-lane "security" /tmp/constraints.json 2>/dev/null || echo "")
          echo "constraints_slice<<__CEOF__" >> $GITHUB_OUTPUT
          echo "$C_SLICE" >> $GITHUB_OUTPUT
          echo "__CEOF__" >> $GITHUB_OUTPUT

          DONE_NUMS=$(jq -r '(.["security"].done // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          KILLED_NUMS=$(jq -r '(.["security"].killed // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          HIST=$(gh issue list --label "security" --state all --limit 5 \
            --json number,title,body,state --repo "${{ github.repository }}" | \
            jq -r --arg done "$DONE_NUMS" --arg killed "$KILLED_NUMS" '
              ($done | split(" ") | map(select(length>0) | tonumber)) as $d
              | ($killed | split(" ") | map(select(length>0) | tonumber)) as $k
              | .[] | (.number) as $n
              | (if ($d | index($n)) then "DONE" elif ($k | index($n)) then "KILLED" else .state end) as $v
              | "### [\($v)] #\($n) \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"
            ' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Security] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 FOMO Club의 보안 담당자입니다.
            FOMO Club은 투자자 집단 감정을 정직한 숫자로 시각화하는 앱이다. FOMO Index는 금융 지표가 아닌 감정 체감 지표 — 투자 조언·예측성 표현 0건이 면책의 핵심.
            이미 구현: JWT HttpOnly, IAP 서버검증(RevenueCat), HMAC nonce, HTTPS 강제.

            === Security 직군 정의 (lane) ===
            Security는 "Critical/High 보안 취약점 + FOMO Index 면책·투자 조언성 표현 0건" 만 다룬다.
            - Security가 다루는 것: OWASP Top 10, 인증/세션, 익명 세션(감정 투표) 안전성, 권한 검증, 결제 검증, 시크릿 관리, 외부 API 키 노출, 데이터 위변조, 개인정보 처리, FOMO Index 면책 표현(투자 조언·예측·매매 신호성 카피 0건).
            - Security가 다루지 않는 것: UX, 디자인, 사운드, 이펙트, 콘텐츠. (Medium/Low 보안 이슈는 다음 주 후보로 미룬다.)

            === 절대 규칙 ===
            1. Critical/High 보안 항목은 North Star 테마와 무관해도 제안 가능. 보안은 Out of Scope가 아닌 필수 영역.
            2. **단, 이미 구현된 항목(JWT HttpOnly·IAP 서버검증·HMAC nonce·HTTPS)에 대한 중복/유사 보강 제안은 금지**. TLS 핀닝처럼 운영 비용 대비 효과가 모호한 제안은 위협 모델의 실제 발생 가능성·영향도를 정량으로 제시해야 함.
            3. 금지 어휘 금지. 구체 위협 모델(공격자/공격 경로/영향) 명시.
            4. 강제 회전 폐지(2026-06-09): 같은 영역이라도 미해결 Critical/High면 재제안·심화 허용. lane-state DONE(머지 완료)만 재제안 금지.
            5. Medium/Low는 North Star와 직결될 때만 제안. 그 외는 "다음 주 후보".
            6. 이번 주 진짜 Critical/High 보안 이슈가 없으면 명시적으로 "이번 주 우선순위 없음 — 다음 주 후보"라고 적고 종료한다. 억지 제안 금지.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 🔒 Standing Constraints (CEO 확정 규칙 — 위반 시 자동 폐기, 하드코딩 개별 규칙보다 우선)
            ${{ steps.ctx.outputs.constraints_slice }}

            ---
            ## 🧾 우리 직군 상태 원장 (DONE/KILLED/IN-PROGRESS — 재제안 금지)
            ${{ steps.ctx.outputs.lane_slice }}
            > ⚠️ 위 DONE/KILLED 목록의 주제는 절대 재제안 금지. 재제안 시 CEO Brief에서 자동 킬리스트 처리되어 사이클이 낭비된다.
            > 개선하려면 반드시 "기존 #NNN 위에 무엇을 *추가*하는가"를 명시하라.

            ---
            ## 📜 Security 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ---
            북스타와 직결되는 Critical/High 보안 항목 1개만. 없으면 명시적으로 "이번 주 우선순위 없음 — 다음 주 후보"라고 적으세요.

            ## 🔒 Security 제안: [한 줄 제목]

            ### 위협 모델 (구체 시나리오)

            ### 영향받는 코드/엔드포인트

            ### 개선 방안 (이번 주 phase 1 = 단일 PR 범위 — 큰 보안 개선은 후속 phase 개요 첨부)

            ### 우선순위 (Critical/High만 본 제안 — 그 외는 다음 주 후보로 분리)

            ### North Star 정렬 (1문장)
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Security] $TODAY 보안 점검 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,security" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 9. Prompt Engineer
  # ─────────────────────────────────────────────────────────────
  prompt_engineer:
    needs: [prepare]
    if: ${{ github.event.inputs.approval_token == 'SSOT_EXECUTION_ONLY' && (github.event.inputs.agent == 'all' || github.event.inputs.agent == 'prompt_engineer') }}
    runs-on: ubuntu-latest
    outputs:
      proposal: ${{ steps.proposal.outputs.response }}
    steps:
      - uses: actions/checkout@v4
      - name: Rate limit stagger
        run: sleep 210
      - name: Check duplicate & fetch self history
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
          LANE_STATE: ${{ needs.prepare.outputs.lane_state_json }}
          CONSTRAINTS_JSON: ${{ needs.prepare.outputs.constraints_json }}
        run: |
          COUNT=$(gh issue list --label "agent-council" --state open --limit 10 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Prompt Engineer\\\\] $TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          # Lane-State 슬라이스 (Phase 1) — 자기 직군 DONE/KILLED/IN-PROGRESS
          printf '%s' "$LANE_STATE" > /tmp/lane-state.json
          LANE_SLICE=$(npx -y tsx@4.19.2 scripts/build-lane-state.ts slice "prompt" /tmp/lane-state.json 2>/dev/null || echo "이력 없음 — 새 영역 제안 가능.")
          echo "lane_slice<<__EOF__" >> $GITHUB_OUTPUT
          echo "$LANE_SLICE" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
          # Standing Constraints 슬라이스 (Phase 2)
          printf '%s' "$CONSTRAINTS_JSON" > /tmp/constraints.json
          C_SLICE=$(npx -y tsx@4.19.2 scripts/constraints.ts render-lane "prompt" /tmp/constraints.json 2>/dev/null || echo "")
          echo "constraints_slice<<__CEOF__" >> $GITHUB_OUTPUT
          echo "$C_SLICE" >> $GITHUB_OUTPUT
          echo "__CEOF__" >> $GITHUB_OUTPUT

          DONE_NUMS=$(jq -r '(.["prompt"].done // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          KILLED_NUMS=$(jq -r '(.["prompt"].killed // []) | map(.number) | join(" ")' /tmp/lane-state.json 2>/dev/null || echo "")
          HIST=$(gh issue list --label "prompt" --state all --limit 5 \
            --json number,title,body,state --repo "${{ github.repository }}" | \
            jq -r --arg done "$DONE_NUMS" --arg killed "$KILLED_NUMS" '
              ($done | split(" ") | map(select(length>0) | tonumber)) as $d
              | ($killed | split(" ") | map(select(length>0) | tonumber)) as $k
              | .[] | (.number) as $n
              | (if ($d | index($n)) then "DONE" elif ($k | index($n)) then "KILLED" else .state end) as $v
              | "### [\($v)] #\($n) \(.title)\n\(.body | .[0:700] | gsub("\n";" "))\n"
            ' 2>/dev/null || echo "이력 없음")
          echo "history<<__EOF__" >> $GITHUB_OUTPUT
          echo "$HIST" >> $GITHUB_OUTPUT
          echo "__EOF__" >> $GITHUB_OUTPUT
      - name: "[Prompt] 제안"
        if: steps.ctx.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        id: proposal
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt: |
            당신은 FOMO Club의 AI 감정 요약·멘트 품질 담당입니다.
            FOMO Club은 투자자 집단 감정을 정직한 숫자로 시각화하는 앱이다. 마스코트 '포모'의 표정 = FOMO Index.
            대상: FOMO Index 구간·집단 감정 집계를 **담담한 한마디(포모 멘트)**·AI Summary로 요약하는 프롬프트/카피. 출력: {headline, summary} 류. 폴백: LLM→정적 멘트.
            (참고: 현재 FOMO 쪽 LLM 해석 프롬프트는 미미하므로, 본 사이클은 포모 멘트·감정 요약 카피의 톤·구조·토큰 효율에 초점을 맞춘다.)

            === Prompt Engineer 직군 정의 (lane) ===
            Prompt Engineer는 "AI Summary·감정 요약·포모 멘트 생성 품질" 만 다룬다. 사용자가 "오늘 시장 분위기"를 3초 안에 이해하게 하는 한마디 자체.
            - 다루는 것: 프롬프트 구조, 시스템/유저 메시지 설계, 출력 스키마, 톤/문체(담담한 솔직함), 길이 제어(짧은 멘트), 폴백 정적 멘트, 토큰 효율, 집단 감정 집계 데이터→멘트 변환 품질.
            - 다루지 않는 것 (직군 침범 금지):
              * UI/UX 구현, 사운드/이펙트 → Frontend/Designer 영역이자 사용자가 금지한 카테고리.
              * 콘텐츠 우선순위 → PM 영역.
              * 정적 카피·UX 라이팅 자체 → Content Marketer 영역(Prompt Engineer는 LLM 입력 프롬프트·출력 구조).

            === 우선순위 (사용자 직접 지시 2026-05-26) ===
            "정직한 숫자와 감정의 정상성 확인에 집중." → Prompt Engineer는 감정 요약 품질의 정점. 포모 멘트가 담담하고·짧고·"나만 그런 게 아니구나"를 느끼게 설계.

            === 절대 규칙 ===
            1. North Star 테마(FOMO Index 신뢰성·정직한 숫자)와 직결: 감정 요약/멘트가 실제 집계값에 정합해야 한다.
            2. 금지 어휘 금지. "개인화" 같은 추상 단어 금지 — 어느 필드(headline/summary)에 어떤 토큰/구조로 변경되는지 명시.
            3. Before/After 샘플 의무. 가상이라도 1쌍 명시.
            4. 강제 차원 회전 폐지(2026-06-09): 같은 차원(톤/구조/집계 활용/폴백 멘트)이라도 Target-Metric 미달이면 더 깊게 제안 허용. lane-state DONE만 재제안 금지.
            5. 토큰 비용 영향(평균 입력/출력 토큰 변화) 명시.
            6. 집단 감정 집계 데이터(FOMO Index 4 Heat·감정 투표 분포)를 멘트에 녹일 때는 **실제 집계값만** 입력으로 가정(정직한 숫자, 가짜 수치 금지).
            7. 금융 규제 금칙어(매수/매도/수익보장/확정 예측) 누설 금지.
            8. **투자 권유·예측 뉘앙스 표현 절대 금지 (2026-05-30 CEO 직접 지시)**:
               - 금지 표현: "오를 것이다", "사도 될까요", "매수 타이밍", "지금 들어가도", "수익 기대", "투자 적합", "투자 추천"
               - Before/After 샘플의 UserQuestion에도 위 표현 사용 금지. 투자 판단을 구하는 질문 형식 자체가 리걸 리스크.
               - 대안 UserQuestion 예시: "오늘 시장 분위기 한마디", "오늘 사람들 감정은 어때?", "지금 다들 어떤 기분이야?"
               - 이 규칙을 위반한 제안은 점수와 무관하게 **자동 폐기**.
          prompt: |
            ## 🌟 North Star
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 🔒 Standing Constraints (CEO 확정 규칙 — 위반 시 자동 폐기, 하드코딩 개별 규칙보다 우선)
            ${{ steps.ctx.outputs.constraints_slice }}

            ---
            ## 🧾 우리 직군 상태 원장 (DONE/KILLED/IN-PROGRESS — 재제안 금지)
            ${{ steps.ctx.outputs.lane_slice }}
            > ⚠️ 위 DONE/KILLED 목록의 주제는 절대 재제안 금지. 재제안 시 CEO Brief에서 자동 킬리스트 처리되어 사이클이 낭비된다.
            > 개선하려면 반드시 "기존 #NNN 위에 무엇을 *추가*하는가"를 명시하라.

            ---
            ## 📜 Prompt Engineer 자기 직전 5개 제안
            ${{ steps.ctx.outputs.history }}

            ---
            ## ✅ 머지된 PR
            ${{ needs.prepare.outputs.merged_prs }}

            ## 📌 열린 다른 에이전트 제안
            ${{ needs.prepare.outputs.open_issues }}

            ## 🗂️ 닫힌 이슈
            ${{ needs.prepare.outputs.closed_issues }}

            ## 💬 사용자 피드백
            ${{ needs.prepare.outputs.feedback }}

            ---
            ## ✨ Prompt Engineer 제안: [한 줄 제목]

            ### 가설 (1문장)

            ### 근거 (현재 프롬프트/멘트 카피의 구체 약점)
            - 감정 요약/포모 멘트 생성의 어느 부분:

            ### 액션 (이번 주 phase 1 = 단일 PR, 프롬프트 또는 후처리 변경 — 큰 품질 개선은 후속 phase 개요 첨부)

            ### Before / After 샘플 (가상이라도 1쌍 의무)
            **Before**:
            **After**:

            ### 측정 지표
            (폴백률 / 사용자 별점 / 평균 토큰 / 헤드라인 길이 등)

            ### North Star 정렬 (1문장)

            ### 토큰 비용 영향
            ${{ needs.prepare.outputs.scoring_guide }}
      - name: Create Issue
        if: steps.ctx.outputs.exists == 'false' && steps.proposal.outputs.response != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.proposal.outputs.response }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$BODY" > /tmp/body.md
          gh issue create \
            --title "[Prompt Engineer] $TODAY FOMO 감정 요약/멘트 품질 개선 제안" \
            --body-file /tmp/body.md \
            --label "idea,agent-council,prompt" \
            --repo "${{ github.repository }}"

  # ─────────────────────────────────────────────────────────────
  # 10. CEO Brief — 실리콘밸리 weekly review 스타일
  # ─────────────────────────────────────────────────────────────
  # ─────────────────────────────────────────────────────────────
  # ⭐ Score & Filter (simulo po-validator 차용, 2026-05-27)
  # 모든 직군 제안 완료 후 점수 파싱 → 라벨 또는 자동 close
  # ─────────────────────────────────────────────────────────────
  score_and_filter:
    needs: [prepare, pm, frontend, backend, designer, qa, cto, marketer, security, prompt_engineer]
    if: ${{ always() && github.event.inputs.approval_token == 'SSOT_EXECUTION_ONLY' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Parse scores + constraint 위반 게이트 (Phase 2.5)
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          set -uo pipefail
          # 오늘 생성된 agent-council 라벨 open 이슈만 (24시간 이내)
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')

          gh issue list \
            --label "agent-council" \
            --state open \
            --search "created:>=${SINCE}" \
            --limit 30 \
            --json number,title,body,labels \
            --repo "${{ github.repository }}" > /tmp/issues.json

          COUNT=$(jq 'length' /tmp/issues.json)
          echo "Found $COUNT today's open agent-council issues"

          # lane 파생 jq (Phase 0/1 과 동일 규칙)
          LANEJQ='([.labels[].name] - ["idea","agent-council","mobile","tech-debt","daily","score-strong","score-conditional","score-missing","constraint-violation"]) | (.[0] // "unknown")'
          : > /tmp/violated_ids.txt   # 위반 constraint id 누적(파일 — 서브셸 안전)

          jq -c '.[]' /tmp/issues.json | while read -r issue; do
            NUM=$(echo "$issue" | jq -r '.number')
            echo "$issue" | jq -r '.body' > /tmp/body.txt
            LANE=$(echo "$issue" | jq -r "$LANEJQ")

            # 이미 점수 라벨이 있으면 skip (재실행 안전성)
            HAS_LABEL=$(echo "$issue" | jq -r '.labels[].name' | grep -E 'score-(strong|conditional|missing)' || true)
            if [ -n "$HAS_LABEL" ]; then
              echo "#$NUM already labeled ($HAS_LABEL), skip"
              continue
            fi

            # ── Standing Constraint 위반 게이트 (고리 3, 결정론) ──
            VIOL=$(npx -y tsx@4.19.2 scripts/constraints.ts check constraints/active.json "$LANE" /tmp/body.txt "$TODAY" 2>/dev/null || echo "[]")
            if [ "$(echo "$VIOL" | jq 'length')" -gt 0 ]; then
              RULE=$(echo "$VIOL" | jq -r '.[0].rule')
              MATCHED=$(echo "$VIOL" | jq -r '[.[].matched] | join(", ")')
              echo "$VIOL" | jq -r '.[].id' >> /tmp/violated_ids.txt
              printf '%s\n' \
                "⛔ Standing Constraint 위반 — 자동 폐기. 매칭: \`${MATCHED}\`" \
                "> ${RULE}" \
                "이 영역은 CEO가 확정한 규칙으로 금지됩니다. 규칙이 부당하면 constraints/active.json 리뷰 PR로 조정하세요." > /tmp/viol_comment.md
              gh issue edit "$NUM" --add-label "constraint-violation,score-missing" --repo "${{ github.repository }}" || true
              gh issue comment "$NUM" --repo "${{ github.repository }}" --body-file /tmp/viol_comment.md || true
              gh issue close "$NUM" --repo "${{ github.repository }}" || true
              continue
            fi

            # 점수 파싱 — "Score: U=X F=Y N=Z A=W" 형식
            SCORE_LINE=$(grep -oE 'Score:[[:space:]]*U=[1-4][[:space:]]+F=[1-4][[:space:]]+N=[1-4][[:space:]]+A=[1-4]' /tmp/body.txt | head -1 || true)

            if [ -z "$SCORE_LINE" ]; then
              echo "#$NUM: 점수 형식 누락"
              gh issue edit "$NUM" --add-label "score-missing" --repo "${{ github.repository }}" || true
              gh issue comment "$NUM" --repo "${{ github.repository }}" \
                --body "🤖 자동 점수 시스템: 본문에서 \`Score: U=X F=Y N=Z A=W\` 형식을 찾지 못했습니다. system-prompt 출력 가이드 확인 필요." || true
              continue
            fi

            U=$(echo "$SCORE_LINE" | grep -oE 'U=[1-4]' | grep -oE '[1-4]')
            F=$(echo "$SCORE_LINE" | grep -oE 'F=[1-4]' | grep -oE '[1-4]')
            N=$(echo "$SCORE_LINE" | grep -oE 'N=[1-4]' | grep -oE '[1-4]')
            A=$(echo "$SCORE_LINE" | grep -oE 'A=[1-4]' | grep -oE '[1-4]')
            TOTAL=$((U + F + N + A))

            echo "#$NUM: U=$U F=$F N=$N A=$A 총합 $TOTAL (lane=$LANE)"

            # B1b: Target-Metric 누락 보완 요청 (소프트 — 차단 아님)
            if ! grep -qiE 'Target-Metric:[[:space:]]*\S' /tmp/body.txt; then
              gh issue comment "$NUM" --repo "${{ github.repository }}" \
                --body "📐 보완 요청(B1 결과-접지): 본문에 \`Target-Metric: <지표 id>\` / \`Expected-Direction: up|down\` 이 없습니다. 이게 있어야 머지 후 이 베팅이 OKR 지표를 실제로 움직였는지 추적됩니다. (이번엔 차단하지 않음 — 다음부터 포함 권장)" || true
            fi

            if [ "$TOTAL" -ge 14 ]; then
              gh issue edit "$NUM" --add-label "score-strong" --repo "${{ github.repository }}" || true
            elif [ "$TOTAL" -ge 11 ]; then
              gh issue edit "$NUM" --add-label "score-conditional" --repo "${{ github.repository }}" || true
            else
              gh issue comment "$NUM" --repo "${{ github.repository }}" \
                --body "🤖 자동 점수 시스템: 총합 ${TOTAL}/16점 (U=$U F=$F N=$N A=$A). 임계값(11) 미달로 자동 폐기. 점수가 부당하다고 판단되면 이슈를 재개해 주세요." || true
              gh issue close "$NUM" --repo "${{ github.repository }}" || true
            fi
          done

          # ── hits 집계 → generated/constraint-hits/<TODAY>.json (충돌 회피: 주간 compact 가 합산) ──
          if [ -s /tmp/violated_ids.txt ]; then
            mkdir -p generated/constraint-hits
            sort /tmp/violated_ids.txt | uniq -c | \
              jq -Rn '[inputs | ltrimstr(" ") | capture("(?<n>[0-9]+) +(?<id>.+)") | {(.id): (.n|tonumber)}] | add // {}' \
              > "generated/constraint-hits/${TODAY}.json"
            echo "constraint hits 기록:"; cat "generated/constraint-hits/${TODAY}.json"
          else
            echo "이번 사이클 constraint 위반 없음."
          fi
      - name: Commit constraint hits
        if: always()
        env:
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          set -uo pipefail
          FILE="generated/constraint-hits/${TODAY}.json"
          [ -f "$FILE" ] || { echo "hits 파일 없음 — 커밋 생략"; exit 0; }
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git diff --cached --quiet && { echo "변경 없음"; exit 0; }
          git commit -m "chore(constraints): bump hits ${TODAY} [skip ci]"
          # 동시 push 충돌 시 rebase 후 1회 재시도(보수적 — 실패해도 다음 사이클이 합산)
          git push origin HEAD:main || { git pull --rebase origin main && git push origin HEAD:main || echo "push 실패 — 다음 사이클로 미룸"; }

  ceo_brief:
    needs: [prepare, pm, frontend, backend, designer, qa, cto, marketer, security, prompt_engineer, score_and_filter]
    if: ${{ always() && github.event.inputs.approval_token == 'SSOT_EXECUTION_ONLY' && github.event.inputs.agent == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check CEO Brief duplicate
        id: dedup
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          COUNT=$(gh issue list --label "ceo-brief" --state open --limit 5 \
            --json title --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | contains(\"$TODAY\"))] | length")
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
      - name: Fetch today's new agent issues (실제 번호) + compact digest
        id: today_issues
        if: steps.dedup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
          CONSTRAINTS_JSON: ${{ needs.prepare.outputs.constraints_json }}
        run: |
          # Standing Constraints 요약 (Phase 2) — 브리핑이 판정 시 기존 규칙과 충돌 방지
          printf '%s' "$CONSTRAINTS_JSON" > /tmp/constraints.json
          C_BRIEF=$(npx -y tsx@4.19.2 scripts/constraints.ts render-brief /tmp/constraints.json 2>/dev/null || echo "(constraint 조회 실패)")
          echo "constraints_brief<<__CBEOF__" >> $GITHUB_OUTPUT
          echo "$C_BRIEF" >> $GITHUB_OUTPUT
          echo "__CBEOF__" >> $GITHUB_OUTPUT

          # 오늘 사이클 agent-council open 이슈 원본 (번호·제목·라벨·본문)
          gh issue list --label "agent-council" --state open --limit 30 \
            --json number,title,labels,body --repo "${{ github.repository }}" \
            > /tmp/today_raw.json

          # ── 우선순위 인용용 number 목록 (rule #14 — 기존 list 출력 유지) ──
          LIST=$(jq -r --arg today "$TODAY" '.[] | select(.title | contains($today)) | "#" + (.number|tostring) + " " + .title + " [labels: " + (.labels | map(.name) | join(",")) + "]"' /tmp/today_raw.json)

          # ── compact digest_json (폴백 스크립트 입력) ──
          # lane: 알려진 lane 라벨 우선, scoreLabel: score-* 라벨, rationale: ### 근거 첫 줄 또는 본문 120자
          jq --arg today "$TODAY" '
            def lane: ([.labels[].name] - ["idea","agent-council","mobile","tech-debt","daily","score-strong","score-conditional","score-missing"]) | (.[0] // "unknown");
            def scorelabel: ([.labels[].name] | map(select(test("^score-(strong|conditional|missing)$"))) | (.[0] // "score-none"));
            def rationale:
              (.body // "") as $b
              | ($b | split("\n")) as $lines
              | ([range(0; ($lines|length)) | select($lines[.] | test("^#{1,4}[[:space:]]*근거"))] | (.[0] // -1)) as $idx
              | (if $idx >= 0
                 then ([ $lines[($idx+1):][] | select(test("\\S")) ] | (.[0] // ""))
                 else "" end) as $found
              | (if ($found | test("\\S")) then $found else ($b | gsub("\n";" ")) end)
              | gsub("\n";" ") | .[0:120];
            [ .[] | select(.title | contains($today)) | {number, lane: lane, title, scoreLabel: scorelabel, rationale: rationale} ]
          ' /tmp/today_raw.json > /tmp/digest.json

          # ── markdown_digest (LLM 브리핑 프롬프트 입력 — 사람이 읽는 형태) ──
          MD=$(jq -r '.[] | "- #\(.number) [\(.lane)] [\(.scoreLabel)] \(.title)\n  근거: \(.rationale)"' /tmp/digest.json)

          if [ -z "$LIST" ]; then
            echo "has_issues=false" >> $GITHUB_OUTPUT
            echo "list<<__EOF__" >> $GITHUB_OUTPUT
            echo "(오늘 신규 이슈 없음 — CEO Brief 생성 중단)" >> $GITHUB_OUTPUT
            echo "__EOF__" >> $GITHUB_OUTPUT
          else
            echo "has_issues=true" >> $GITHUB_OUTPUT
            echo "list<<__EOF__" >> $GITHUB_OUTPUT
            echo "$LIST" >> $GITHUB_OUTPUT
            echo "__EOF__" >> $GITHUB_OUTPUT
            echo "markdown_digest<<__EOF__" >> $GITHUB_OUTPUT
            echo "$MD" >> $GITHUB_OUTPUT
            echo "__EOF__" >> $GITHUB_OUTPUT
          fi
      # ── 진척 원장 (Phase A) — "어제 채택 진척" 표를 LLM 발명이 아닌 실제 PR/머지로 고정 ──
      - name: Build progress ledger (어제 채택 → 실제 PR/머지)
        id: progress
        if: steps.dedup.outputs.exists == 'false' && steps.today_issues.outputs.has_issues == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          set -uo pipefail
          YESTERDAY=$(TZ=Asia/Seoul date -d 'yesterday' '+%Y-%m-%d' 2>/dev/null || TZ=Asia/Seoul date -v-1d '+%Y-%m-%d')
          LANEJQ='def lane: ([.labels[].name] - ["idea","agent-council","mobile","tech-debt","daily","score-strong","score-conditional","score-missing"]) | (.[0] // "unknown");'

          # 어제 사이클의 제안(idea) 이슈 전부 — 상태 칸이 실제 결과(머지/PR중/미착수/종료)를 말한다.
          # (score 라벨은 실제로 안 붙는 경우가 있어 신뢰 불가 → idea 라벨로 선별, ceo-brief 자신은 제외)
          if gh issue list --label "agent-council" --state all --limit 60 \
               --json number,title,labels,state --repo "${{ github.repository }}" > /tmp/y_raw.json 2>/dev/null; then
            jq --arg y "$YESTERDAY" "$LANEJQ"'
              [ .[]
              | select(.title | contains($y))
              | select([.labels[].name] | index("idea"))
              | {number, title, agent: lane, state} ]' /tmp/y_raw.json > /tmp/adopted.json 2>/dev/null || echo "[]" > /tmp/adopted.json
          else
            echo "[]" > /tmp/adopted.json
          fi
          [ -s /tmp/adopted.json ] || echo "[]" > /tmp/adopted.json

          # 머지 PR / 오픈 PR (본문의 #NNN 참조로 이슈→PR 연결)
          gh pr list --state merged --limit 40 --json number,title,body \
            --repo "${{ github.repository }}" > /tmp/p_merged.json 2>/dev/null || echo "[]" > /tmp/p_merged.json
          gh pr list --state open --limit 40 --json number,title,body \
            --repo "${{ github.repository }}" > /tmp/p_open.json 2>/dev/null || echo "[]" > /tmp/p_open.json

          LEDGER=$(npx -y tsx@4.19.2 scripts/build-progress-ledger.ts build \
            /tmp/adopted.json /tmp/p_merged.json /tmp/p_open.json /tmp/ptable.md /tmp/pship.txt 2>/dev/null || echo "[]")
          [ -s /tmp/ptable.md ] || echo "| (어제 채택 항목 없음 — 진척 추적 없음) | - | - | - |" > /tmp/ptable.md
          [ -s /tmp/pship.txt ] || echo "🚢 어제 실제 머지: 없음" > /tmp/pship.txt

          PTABLE=$(cat /tmp/ptable.md)
          PSHIP=$(cat /tmp/pship.txt)
          echo "table<<__PTEOF__" >> "$GITHUB_OUTPUT"
          echo "$PTABLE" >> "$GITHUB_OUTPUT"
          echo "__PTEOF__" >> "$GITHUB_OUTPUT"
          echo "shipped<<__PSEOF__" >> "$GITHUB_OUTPUT"
          echo "$PSHIP" >> "$GITHUB_OUTPUT"
          echo "__PSEOF__" >> "$GITHUB_OUTPUT"

          # 발행 전 검증용 화이트리스트: 오늘 신규 이슈 번호 ∪ 어제 채택 이슈/연결 PR 번호
          TODAY_NUMS=$(jq -r '[.[].number] | join(" ")' /tmp/today_raw.json 2>/dev/null || echo "")
          LEDGER_NUMS=$(printf '%s' "$LEDGER" | jq -r '[ .[] | .issue, (.pr // empty) ] | join(" ")' 2>/dev/null || echo "")
          echo "allowed=$TODAY_NUMS $LEDGER_NUMS" >> "$GITHUB_OUTPUT"

          {
            echo "### 🚢 진척 원장 (어제 채택 → 실제 상태)"
            echo "$PSHIP"
            echo '```'
            cat /tmp/ptable.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "[CEO Brief]"
        if: steps.dedup.outputs.exists == 'false' && steps.today_issues.outputs.has_issues == 'true'
        uses: actions/ai-inference@v1
        id: brief
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 8192
          system-prompt: |
            당신은 FOMO Club CEO의 수석 비서 AI입니다.
            FOMO Club은 투자자 집단 감정을 정직한 숫자로 시각화하는 앱이다. 시장을 분석/예측하지 않고 참여자 감정을 보여준다. 마스코트 '포모'의 표정 = FOMO Index.
            매일 아침 9개 팀 에이전트의 제안을 받아 CEO가 5분 안에 판단할 수 있는 브리핑을 작성합니다.
            실리콘밸리 weekly review 스타일: 단일 테마 정렬도 우선, 산발성 제거, 어제 채택의 진척 추적.

            === CEO Brief 절대 규칙 ===
            1. North Star "이번 주 테마"가 모든 판단의 1순위.
            2. 각 에이전트 제안을 "North Star 정렬도 0-5점"으로 채점.
            3. **어제 채택 진척 표는 발명 금지 — 사전 계산된 원장을 그대로 사용 (2026-06-09 절대 규칙)**: "🎯 이번 주 North Star 진척" 표는 아래 prompt 의 **"🚢 진척 원장(실제 PR/머지 기반)"** 블록을 **그대로 복사**한다. 행을 추가/삭제하거나 상태("머지됨/PR 리뷰 중/미착수/종료")를 임의로 바꾸지 마라. "🔄 진행 중", "샘플 수집 완료" 같은 상태를 지어내는 것은 사고다 — 원장에 있는 상태 라벨만 쓴다. "오늘 액션" 칸만 네가 1문장으로 채운다.
            4. 같은 주제가 N일 연속 반복되면 "반복 경고" 표시 후 자동 디플래그.
            5. **킬리스트 사유**: 아래에 해당하면 킬리스트로 분류, 그 외는 모두 그날 처리 우선순위에 포함:
               - 자동 폐기 카테고리 (사운드/햅틱/빛 효과/글로우/파티클/반짝임/싱크로 효과/BGM/결과 화면 장식 애니메이션/버튼 펄스·진동 등) — 정렬도와 무관하게 자동 킬리스트. CEO 직접 지시(2026-05-26).
               - 직군 침범 (PM이 구현 디테일, Frontend가 사운드, Marketer가 앱 내 UI 효과 등) — Lane 위반 사유로 킬리스트.
               - **(2026-05-29 임시)** Frontend 에이전트가 시각 스타일링(스켈레톤 색·탭 강조·여백·타이포 위계) 같은 Designer 영역 제안 → 직군 침범 사유로 킬리스트. Frontend는 안정성/성능/스택 lane만.
               - **(2026-05-29 임시)** Marketer 에이전트는 Content Marketer 직무로 임시 변경됨 — 푸시·SNS·ASO·공유 이미지·인플루언서·SEO 등 외부 채널 제안은 직군 침범 사유로 킬리스트 분류. Content Marketer는 포모 멘트/UX 라이팅/감정 카피/집단 통계·면책 카피만 다룬다.
               - **(타로 신규작업 거부)** 타로 관련 신규 제안은 Standing Constraint `c-20260609-tarot-reject` 가 score_and_filter 에서 자동 킬하므로 이 브리핑에 거의 도착하지 않는다(보이지 않는 디폴트). 도착했다면 확정 디폴트 위반 사유로 킬리스트.
               - North Star 현재 축(FOMO Index 신뢰성·홈 MVP 핵심 경험·정직한 숫자)과 완전히 무관한 제안 — 정렬도 0점 사유로 킬리스트.
               - 이미 구현됨 / 잘못된 가설 (예: 캐싱이 적용되지 않은 엔드포인트의 캐시 제거) — 사실 오류 사유로 킬리스트.
               - **(2026-05-31 추가)** 존재하지 않는 파일/경로를 기존 파일처럼 인용 — 사실 오류 사유로 킬리스트. prompt에 주입된 "📁 실제 레포 파일 구조" 목록에 없는 경로를 '근거'로 인용했는데 '신규 생성:' 접두사가 없으면, 해당 제안은 환각 기반이므로 킬리스트 처리. (단 '신규 기능/신규 파일'로 명시한 제안은 정상 — 미구현 기능 제안은 허용.)
               - 금지 어휘 사용 ("가능성", "우려됩니다", "수도", "보입니다", "할 것 같습니다") — 표현 위반 사유로 킬리스트.
                - **(2026-05-30 추가)** 투자 권유·예측 뉘앙스 표현("오를 것이다", "사도 될까요", "매수 타이밍" 등) 포함 → 리걸 위협 사유로 킬리스트. Before/After 샘플의 UserQuestion도 검사 대상.
                - **(정직한 숫자)** 가짜/임의 숫자(실제 집계 없는 FOMO Index 값·부풀린 참여 수) → 정직한 숫자 원칙 위반 사유로 킬리스트.
                - **(2026-05-30 추가)** 데이터 불일치/결측/오류를 사용자에게 직접 알리는 UI 제안(배너, 경고 등) → 사용자 신뢰 저하 사유로 킬리스트. 정합성은 로딩으로 해결, 사용자에게는 항상 정합된 데이터만 표시.
            6. **킬리스트가 아닌 모든 제안은 "오늘 처리 우선순위" 리스트에 우선순위만 매겨 정렬**. "다음 주 후보"·"미루기" 섹션 없음. 정렬도 4+ 만 채택하고 나머지 미루는 구조 금지. 킬리스트 빠진 나머지 전부를 우선순위 1, 2, 3, ... 으로 노출.
            7. Security 제안은 North Star 정렬도가 낮더라도 Critical/High면 우선순위 상단. Medium/Low 또는 "이번 주 없음" 보고는 일반 우선순위로 정렬.
            8. 정직한 숫자(실제 집계·폴백·빈 값 0)와 홈 MVP 핵심 경험(FOMO Index·감정 투표·집단 통계·포모 표정), 감정 요약/멘트 품질에 관한 제안은 가점 부여 — 우선순위 상단.
            9. FOMO Club UX 멘탈모델은 **감정의 정상성 확인**("나만 그런 게 아니구나")·정직한 숫자·포모 표정 3초 직관 이해·미니멀 밀도(기리고처럼). FOMO Index·집단 통계 같은 금융 수치의 정보 위계는 일반 핀테크 패턴 참조 가능하나, 우리는 분석·예측 도구가 아닌 감정 체감 도구다. 시장 분석·예측·투자 도구화 제안은 정체성 위반 사유로 우선순위 하단(또는 킬리스트).
            10. "내일 체크포인트" 는 측정 가능하고 코드/문서로 검증 가능한 항목만. "사운드 파일 확보" 같이 검증 불가능한 항목 금지.
            11. 우선순위 정렬 기준 (위에서 아래로): ① 즉시 대응(Critical 보안·스토어 차단) → ② 정렬도 5점 + 다른 에이전트와 묶음 가능(의존성) → ③ 정렬도 5점 단독 → ④ 정렬도 4점 → ⑤ 정렬도 3점 이하 (그래도 처리는 함, 우선순위만 낮음).
            12. 사용자가 5분 안에 GO/NO-GO 판단 가능한 분량.
            13. **자동 점수 시스템 결과 활용** (2026-05-27 도입): 각 제안 본문 끝의 `Score: U=X F=Y N=Z A=W` 합계가 함께 전달됨. 14+(`score-strong`)은 우선순위 상단, 11-13(`score-conditional`)은 중단. 10 이하는 score_and_filter job이 이미 close했으므로 이 브리핑에는 도착하지 않음. **자동 점수와 North Star 정렬도가 충돌하면 North Star가 우선** (점수는 LLM 자기 평가라 편향 가능).
            14. **이슈 번호 인용 규칙 (2026-05-28 추가 — 절대 규칙)**: 우선순위 항목의 "이슈: #N" 인용은 반드시 아래 prompt 의 **"📌 오늘 사이클 신규 이슈 (정확한 번호)"** 목록의 번호만 사용한다. 어제/그저께 닫힌 이슈 번호를 인용하지 마라. 이전 사이클 이슈 번호 인용은 사고이며, 사용자가 새 브리핑을 어제 거 재탕으로 오해하게 만든다. 만약 오늘 신규 이슈 목록이 비어있으면 "이슈: (오늘 사이클 신규 이슈 없음)" 으로 표시.
          prompt: |
            ## 🌟 North Star (이번 주 테마)
            ${{ needs.prepare.outputs.north_star }}

            ---
            ## 🔒 Standing Constraints (CEO 확정 규칙 — 채점·킬리스트 판단의 상위 기준)
            ${{ steps.today_issues.outputs.constraints_brief }}

            ---
            ## 📌 오늘 사이클 신규 이슈 (정확한 번호 — 우선순위 인용은 이 번호만 사용)
            ${{ steps.today_issues.outputs.list }}

            ---
            ## 🚢 진척 원장 (어제 채택 → 실제 PR/머지 기반 — 이 표를 그대로 복사)
            > 이 표는 실제 레포 상태(머지/오픈 PR, 이슈 상태)에서 결정론적으로 계산됐다.
            > "🎯 이번 주 North Star 진척" 표에 **이 행들을 그대로** 넣고, "오늘 액션" 칸만 1문장씩 채워라.
            > 상태를 바꾸거나 행을 지어내면 사고다.
            ${{ steps.progress.outputs.shipped }}

            | 어제 제안 항목 | 담당 | 진척 상태 | PR |
            |---|---|---|---|
            ${{ steps.progress.outputs.table }}

            ---
            ## 📅 어제 CEO Brief (반복 주제 탐지용 — 진척 표 작성에는 위 진척 원장만 사용)
            > ⚠️ 번호 인용 절대 규칙: 아래 어제 브리핑의 #번호는 **과거 참조용**이다(반복 탐지에만 사용).
            > 오늘 신규 제안의 "이슈: #N" 인용은 반드시 위 "📌 오늘 사이클 신규 이슈" 목록의 번호만 사용하라.
            > 어제 브리핑의 번호를 오늘 신규 항목의 번호로 재인용하면 사고다.
            ${{ needs.prepare.outputs.yesterday_brief }}

            ---
            ## 📊 오늘 제안 다이제스트 (이슈번호·lane·점수라벨·근거 1줄)
            ${{ steps.today_issues.outputs.markdown_digest }}

            ---
            ## 💬 피드백 이력
            ${{ needs.prepare.outputs.feedback_brief }}

            ---
            ## 🗂️ 최근 닫힌 이슈 (이미 처리된 영역)
            ${{ needs.prepare.outputs.closed_issues }}

            ---
            아래 형식으로 CEO Brief를 작성하세요. 형식 엄수.

            ## 📋 CEO Daily Brief

            {위 "🚢 진척 원장"의 실적 한 줄(🚢 …)을 여기 그대로 적는다}

            ### 🎯 이번 주 North Star 진척 (실리콘밸리식 — 실제 PR/머지 기반)
            | 어제 제안 항목 | 담당 | 진척 상태 | 오늘 액션 |
            |---|---|---|---|
            (위 "🚢 진척 원장" 표의 각 행을 그대로 옮기고 — #번호·담당·진척 상태 그대로 — "오늘 액션" 칸만 1문장으로 채운다. 진척 상태를 임의로 바꾸지 마라. 어제 제안 항목이 없으면 "사이클 시작 — 진척 추적 없음" 표시)

            ---

            ### 📊 오늘 9개 제안 — North Star 정렬도 채점
            | 에이전트 | 제안 제목 | 정렬도(0-5) | 근거 충실도 | 판정 |
            |---|---|---|---|---|

            (정렬도 5: 테마 직결 + 측정 지표 명확 / 4: 직결 / 3: 간접 / 2: 모호 / 0-1: 무관)
            (근거 충실도: 파일경로/메트릭/피드백 인용 있으면 ✅ 없으면 ❌)

            ---

            ### 🚨 즉시 대응 (스토어 차단 or Critical 보안만)
            (없으면 "없음" 명시)

            ---

            ### ✅ 오늘 처리 우선순위 (킬리스트 제외 전부 — 우선순위 정렬)

            > 정렬 기준: 즉시 대응 → 정렬도 5점 묶음(의존성) → 정렬도 5점 단독 → 정렬도 4점 → 정렬도 3점 이하 순.
            > "다음 주 후보"·"미루기" 없음. 킬리스트가 아니면 모두 처리 대상.

            #### 1️⃣ **[한 줄 제목]** — 정렬도 {N}/5
            - **이슈**: #{이슈번호}
            - **담당**: {에이전트}
            - **North Star 연결**: (4축 중 어느 축에 정합하는지, 1문장)
            - **측정 지표**: (검증 가능한 수치)
            - **예상 소요**: (수치 — 일/PR 단위)
            - **의존성**: (다른 에이전트의 우선순위 N번 항목과 의존이 있다면 명시)
            - **내일 체크포인트**: (코드/문서로 검증 가능한 항목만)

            #### 2️⃣ **[한 줄 제목]** — 정렬도 {N}/5
            (위와 동일 형식)

            #### 3️⃣ ...
            (킬리스트 제외 나머지 전부를 우선순위 순으로 나열)

            ---

            ### 🔄 반복 주제 경고 (자동 디플래그)
            (같은 주제가 3일 이상 반복되면 여기에 명시 + "사용자 결정 필요" 표시)

            ---

            ### ❌ 킬리스트 (자동 폐기 — 처리 대상에서 완전 제외)

            > 킬리스트 사유는 시스템 프롬프트 규칙 #5 의 5개 카테고리 중 하나여야 함. 그 외 사유로는 절대 킬리스트에 올리지 말 것. "정렬도 낮음" 만으로는 킬리스트 사유가 되지 않음 — 우선순위 하단으로 보낼 뿐.

            | 항목 | 에이전트 | 킬리스트 사유 (자동 폐기 카테고리 / 직군 침범 / 4축 무관 / 사실 오류 / 금지 어휘) |
            |---|---|---|

            ---

            ### 💡 CEO 한 줄 인사이트
            (오늘 9개 제안에서 발견한 패턴 1줄)

            ---

            ### 🧭 사용자 결정 필요 항목
            (북스타 갱신, 반복 주제 종결, 임계값 조정 등 CEO가 직접 판단할 것)
      - name: Setup Node (폴백용)
        if: steps.dedup.outputs.exists == 'false' && steps.today_issues.outputs.has_issues == 'true' && (steps.brief.outcome == 'failure' || steps.brief.outputs.response == '')
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: CEO Brief deterministic 폴백 (LLM 실패/빈응답 시)
        id: fallback
        if: steps.dedup.outputs.exists == 'false' && steps.today_issues.outputs.has_issues == 'true' && (steps.brief.outcome == 'failure' || steps.brief.outputs.response == '')
        env:
          MERGED_PRS: ${{ needs.prepare.outputs.merged_prs }}
          CLOSED_ISSUES: ${{ needs.prepare.outputs.closed_issues }}
          LANE_STATE: ${{ needs.prepare.outputs.lane_state_json }}
          TODAY: ${{ needs.prepare.outputs.today }}
        run: |
          printf '%s' "$MERGED_PRS" > /tmp/merged.txt
          # done.txt = 닫힌 이슈 + lane-state 의 DONE/KILLED 제목 (반복 탐지 강화, Task 4)
          printf '%s' "$CLOSED_ISSUES" > /tmp/done.txt
          printf '%s' "$LANE_STATE" > /tmp/lane-state.json
          jq -r '
            [ .[]? | (.done // []), (.killed // []) ] | flatten
            | .[]? | "- #\(.number) \(.title)"
          ' /tmp/lane-state.json >> /tmp/done.txt 2>/dev/null || true
          npx -y tsx@4.19.2 scripts/ceo-brief-fallback.ts \
            /tmp/digest.json /tmp/merged.txt /tmp/done.txt "$TODAY" /tmp/brief.md
          echo "used=true" >> $GITHUB_OUTPUT
          # 옵저버빌리티(9.2): 폴백 발동을 job summary 에 명시
          {
            echo "## ⚠️ CEO Brief 자동 폴백 발동 ($TODAY)"
            echo "LLM 브리핑 실패/빈응답 → 규칙 기반 폴백으로 생성됨. 품질 저하 가능 — 확인 요망."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Create CEO Brief Issue
        if: steps.dedup.outputs.exists == 'false' && steps.today_issues.outputs.has_issues == 'true' && (steps.brief.outputs.response != '' || steps.fallback.outputs.used == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.brief.outputs.response }}
          USED_FALLBACK: ${{ steps.fallback.outputs.used }}
          TODAY: ${{ needs.prepare.outputs.today }}
          ALLOWED: ${{ steps.progress.outputs.allowed }}
        run: |
          if [ "$USED_FALLBACK" = "true" ]; then
            # 폴백 스크립트가 /tmp/brief.md 에 작성함. 제목에 식별 접미사.
            TITLE="📋 [CEO Brief] $TODAY 일일 에이전트 브리핑 (자동 폴백)"
          else
            printf '%s' "$BODY" > /tmp/brief.md
            TITLE="📋 [CEO Brief] $TODAY 일일 에이전트 브리핑"
          fi

          # ── 발행 전 번호 검증 (Phase A) — 화이트리스트 밖 #번호 인용 탐지 ──
          # 허용: 오늘 신규 이슈 ∪ 어제 채택 이슈/연결 PR. 그 밖의 #번호는 환각 가능성.
          if [ -n "${ALLOWED// /}" ]; then
            CITED=$(grep -oE '#[0-9]+' /tmp/brief.md | tr -d '#' | sort -un)
            UNKNOWN=""
            for n in $CITED; do
              case " $ALLOWED " in
                *" $n "*) ;;
                *) UNKNOWN="$UNKNOWN #$n" ;;
              esac
            done
            if [ -n "${UNKNOWN// /}" ]; then
              {
                echo ""
                echo "---"
                echo "> ⚠️ **번호 검증 경고**: 이 브리핑이 화이트리스트(오늘 신규 이슈 + 어제 채택/연결 PR) 밖의 번호를 인용했습니다 →${UNKNOWN}. 과거 이슈 재인용 또는 환각일 수 있으니 교차 확인하세요."
              } >> /tmp/brief.md
              {
                echo "## ⚠️ CEO Brief 번호 검증 경고 ($TODAY)"
                echo "화이트리스트 밖 인용:${UNKNOWN}"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          gh issue create \
            --title "$TITLE" \
            --body-file /tmp/brief.md \
            --label "ceo-brief,agent-council,daily" \
            --repo "${{ github.repository }}"
