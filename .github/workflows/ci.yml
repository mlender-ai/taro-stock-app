name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Auto Implement CEO Brief"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to check"
        required: false

env:
  NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4000
  API_PASSWORD: ci-placeholder
  DASHBOARD_PASSWORD: ci-placeholder
  BOT_PASSWORD: ci-placeholder
  FRONTEND_ORIGIN: http://127.0.0.1:3100
  LOCAL_DEMO_MODE: true
  REPORT_PROVIDER: rule-based
  MARKET_DATA_PROVIDER: demo

jobs:
  resolve-ref:
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.value }}
    steps:
      - name: Determine checkout ref
        id: ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.ref }}" ]; then
            echo "value=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Auto Implement가 완료된 후 → 가장 최근 agent/ceo-brief 브랜치 찾기
            BRANCH=$(gh api repos/${{ github.repository }}/branches --jq '[.[] | select(.name | startswith("agent/ceo-brief-"))] | sort_by(.commit.commit.committer.date) | last | .name' 2>/dev/null || echo "")
            if [ -n "$BRANCH" ] && [ "$BRANCH" != "null" ]; then
              echo "value=$BRANCH" >> "$GITHUB_OUTPUT"
              echo "Found auto-implement branch: $BRANCH"
            else
              echo "value=" >> "$GITHUB_OUTPUT"
              echo "No agent/ceo-brief branch found, using default"
            fi
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

  repo-checks:
    needs: resolve-ref
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --reporter=dot

  build-api:
    runs-on: ubuntu-latest
    needs: [resolve-ref, repo-checks]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build API workspace
        run: npm --workspace @fomo/legacy-paper-api run build

  build-web:
    runs-on: ubuntu-latest
    needs: [resolve-ref, repo-checks]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build web workspace
        run: npm --workspace @fomo/backend run build

  build-fomo-web:
    runs-on: ubuntu-latest
    needs: [resolve-ref, repo-checks]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build FOMO web workspace
        run: npm run build:fomo-web

  # ── Phase 3: CI 성공 시 auto-merge 트리거 ──────────────────────
  # workflow_run 이벤트는 2단계 전파 불가 → 명시적 dispatch
  dispatch-auto-merge:
    needs: [resolve-ref, repo-checks, build-api, build-web, build-fomo-web]
    if: |
      always() &&
      needs.repo-checks.result == 'success' &&
      needs.build-api.result == 'success' &&
      needs.build-web.result == 'success' &&
      needs.build-fomo-web.result == 'success' &&
      needs.resolve-ref.outputs.ref != '' &&
      (startsWith(needs.resolve-ref.outputs.ref, 'agent/ceo-brief-') ||
       startsWith(needs.resolve-ref.outputs.ref, 'agent/task-') ||
       startsWith(needs.resolve-ref.outputs.ref, 'agent/issue-'))
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ needs.resolve-ref.outputs.ref }}
        run: |
          echo "CI 성공 — auto-merge dispatch: $BRANCH"
          gh workflow run auto-merge.yml \
            -f branch="$BRANCH" \
            --repo "${{ github.repository }}"
