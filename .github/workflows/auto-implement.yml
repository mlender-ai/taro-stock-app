name: Auto Implement CEO Brief

on:
  workflow_run:
    workflows: ["Daily Agent Council"]
    types: [completed]
  workflow_dispatch:
    inputs:
      brief_date:
        description: "CEO Brief 날짜 (YYYY-MM-DD, 기본: 오늘)"
        required: false

concurrency:
  group: auto-implement
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read
  id-token: write

jobs:
  implement:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── 1. 오늘 CEO Brief 이슈 가져오기 ───────────────────────
      - name: Fetch CEO Brief
        id: brief
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.inputs.brief_date }}" ]; then
            TODAY="${{ github.event.inputs.brief_date }}"
          else
            TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          fi
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

          BRIEF_JSON=$(gh issue list \
            --label "ceo-brief" \
            --state open \
            --limit 5 \
            --json number,title,body \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | contains(\"$TODAY\"))] | .[0]")

          if [ -z "$BRIEF_JSON" ] || [ "$BRIEF_JSON" = "null" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ $TODAY 날짜의 CEO Brief 이슈를 찾지 못했습니다."
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$BRIEF_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"

          echo "body<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$BRIEF_JSON" | jq -r '.body' >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

      # ── 2. 오늘 이미 Auto PR이 있는지 중복 체크 ───────────────
      - name: Check Duplicate PR
        id: dedup
        if: steps.brief.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ steps.brief.outputs.today }}
        run: |
          COUNT=$(gh pr list \
            --state open \
            --limit 30 \
            --json title \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Auto\\\\].*$TODAY\"))] | length")
          if [ "$COUNT" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "오늘($TODAY) Auto PR이 이미 존재합니다. 건너뜁니다."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. AI로 실행 지시 추출 (GPT-4o 무료) ──────────────────
      - name: Extract Top Execution Instruction
        id: extract
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 CEO Brief를 파싱하여 개발팀에 전달할 실행 지시를 추출하는 파서입니다.
            반드시 JSON만 반환하세요. 마크다운 코드 블록도 없이, 순수 JSON만.
          prompt: |
            아래 CEO Brief에서 "이번 주 실행 지시" 섹션의 첫 번째 항목만 추출하세요.

            중요 규칙:
            - Kill list, 보류, 무시 항목은 절대 선택하지 마세요.
            - 카카오톡 공유, 사주팔자, 어드민 UI는 절대 선택하지 마세요.
            - 타로앱 UX 몰입감과 관련된 항목을 최우선으로 선택하세요.

            응답 형식 (JSON만, 다른 텍스트 없이):
            {
              "title": "기능 이름 (짧게)",
              "agent": "담당 에이전트",
              "description": "구현 내용 요약 (구체적으로, 3-5문장)",
              "rationale": "선택 이유"
            }

            CEO Brief:
            ${{ steps.brief.outputs.body }}

      # ── 4. 프로젝트 구조 스냅샷 생성 (Claude에게 탐색 비용 제거) ──
      - name: Generate project context
        id: context
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        run: |
          {
            echo "=== 디렉토리 구조 ==="
            find apps packages -maxdepth 3 -type f -name '*.ts' -o -name '*.tsx' | head -80
            echo ""
            echo "=== packages/shared 타입 ==="
            for f in packages/shared/types/*.ts; do
              [ -f "$f" ] && echo "--- $f ---" && head -30 "$f"
            done
            echo ""
            echo "=== packages/tarot-core exports ==="
            for f in packages/tarot-core/src/*.ts; do
              [ -f "$f" ] && echo "--- $f ---" && head -20 "$f"
            done
            echo ""
            echo "=== apps/tarot-mobile/constants/theme.ts ==="
            head -50 apps/tarot-mobile/constants/theme.ts 2>/dev/null || echo "(없음)"
          } > /tmp/project-context.txt

          echo "context<<__CTX_EOF__" >> "$GITHUB_OUTPUT"
          head -300 /tmp/project-context.txt >> "$GITHUB_OUTPUT"
          echo "__CTX_EOF__" >> "$GITHUB_OUTPUT"

      # ── 5. GPT-4o로 전체 코드 생성 (무료) ─────────────────────
      - name: Generate code with GPT-4o
        id: codegen
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 Trading Taro 앱의 시니어 풀스택 개발자입니다.
            모노레포 구조: apps/tarot-mobile (React Native + Expo), apps/web (Next.js 14 API), packages/shared (공용 타입), packages/tarot-core (비즈니스 로직)

            중요 규칙:
            - 애니메이션: React Native Animated API만 허용 (react-native-reanimated 사용 금지)
            - Kill list (절대 구현 금지): 카카오톡 공유, 사주팔자, 어드민 UI
            - 모든 코드는 TypeScript
            - 기존 패턴과 컨벤션을 따를 것

            응답 형식 — 반드시 아래 형식만 사용:
            각 파일마다:
            === FILE: {상대경로} ===
            ```typescript
            (파일 전체 내용)
            ```

            기존 파일 수정 시에도 파일 전체 내용을 출력하세요.
            설명 텍스트 없이 파일 블록만 출력하세요.
          prompt: |
            아래 실행 지시를 구현하세요.

            ## 실행 지시
            ${{ steps.extract.outputs.response }}

            ## 현재 프로젝트 구조
            ${{ steps.context.outputs.context }}

      # ── 6a. Claude Code로 코드 적용 + 검증 (Sonnet, 최소 토큰) ──
      - name: Apply and verify with Claude
        id: claude
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 5"
          prompt: |
            아래 코드를 프로젝트에 적용하고 검증하세요. 코드베이스를 탐색하지 마세요.

            ## 적용할 코드
            ${{ steps.codegen.outputs.response }}

            ## 지시사항 (토큰 절약을 위해 최소한의 작업만)
            1. 위 코드의 각 === FILE: {경로} === 블록을 해당 경로에 Write하세요.
            2. `npm run lint && npm run typecheck` 실행하세요.
            3. 에러가 있으면 해당 파일만 수정하세요. 다른 파일은 읽지 마세요.
            4. 에러가 없으면 바로 끝내세요.

            절대 하지 말 것:
            - 코드베이스 탐색 (Read로 다른 파일 읽기)
            - 추가 기능 구현
            - 리팩토링

            ## 커밋/PR
            - 브랜치: agent/ceo-brief-${{ steps.brief.outputs.today }}
            - 커밋 메시지: "[Auto] ${{ steps.brief.outputs.today }} — ${{ steps.extract.outputs.response && fromJSON(steps.extract.outputs.response).title || 'CEO Brief 구현' }}"
            - PR 본문: "CEO Brief #${{ steps.brief.outputs.number }} 자동 구현"

      # ── 6b. Claude 실패 시 GitHub Models 폴백 ──────────────────
      - name: Restore git credentials (fallback)
        if: steps.claude.outcome == 'failure' && steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        run: |
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

      - name: Create Branch and PR (fallback)
        if: steps.claude.outcome == 'failure' && steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          CODEGEN: ${{ steps.codegen.outputs.response }}
          INSTRUCTION: ${{ steps.extract.outputs.response }}
          TODAY: ${{ steps.brief.outputs.today }}
          BRIEF_NUMBER: ${{ steps.brief.outputs.number }}
        run: |
          BRANCH="agent/ceo-brief-${TODAY}"

          git config user.name "taro-agent[bot]"
          git config user.email "taro-agent[bot]@users.noreply.github.com"

          git push origin --delete "$BRANCH" 2>&1 || echo "No existing branch to delete"
          git checkout -b "$BRANCH"

          TITLE=$(echo "$INSTRUCTION" | jq -r '.title // "CEO Brief 구현"' 2>/dev/null || echo "CEO Brief 구현")

          mkdir -p docs/auto-implement
          echo "$CODEGEN" > "docs/auto-implement/${TODAY}-codegen.md"

          git add -A
          git commit -m "[Auto] ${TODAY} — ${TITLE}

          CEO Brief #${BRIEF_NUMBER} 기반 자동 구현 (GitHub Models 폴백)
          " || echo "No changes to commit"

          git push origin "$BRANCH" --force 2>&1

          {
            echo "## CEO Brief #${BRIEF_NUMBER} 자동 구현"
            echo ""
            echo "원본 이슈: #${BRIEF_NUMBER}"
            echo ""
            echo "> ⚠️ Claude Code 크레딧 부족으로 GitHub Models 폴백 사용"
            echo "> 생성된 코드가 \`docs/auto-implement/${TODAY}-codegen.md\`에 있습니다."
          } > /tmp/pr-body.md

          gh pr create \
            --title "[Auto] ${TODAY} — ${TITLE}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH" \
            --repo "${{ github.repository }}" || {
              echo "gh pr create failed with exit code $?"
              exit 1
            }

      # ── 7. PR 생성 코멘트 (CI는 workflow_run으로 자동 트리거) ──
      - name: Comment on CEO Brief
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ steps.brief.outputs.today }}
        run: |
          BRANCH="agent/ceo-brief-${TODAY}"
          PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' --repo "${{ github.repository }}" 2>/dev/null || echo "")

          if [ -n "$PR_NUM" ]; then
            IMPL_MODE="Claude Sonnet (토큰 최적화)"
            if [ "${{ steps.claude.outcome }}" = "failure" ]; then
              IMPL_MODE="GitHub Models (폴백)"
            fi

            gh issue comment "${{ steps.brief.outputs.number }}" \
              --repo "${{ github.repository }}" \
              --body "🤖 구현 PR: #${PR_NUM} — ${IMPL_MODE}로 자동 생성됨. CI가 자동으로 트리거됩니다." || true
          fi

      # ── 8. 실패 시 CEO Brief 이슈에 코멘트 ───────────────────
      - name: Comment on failure
        if: failure() && steps.brief.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ steps.brief.outputs.number }} \
            --repo "${{ github.repository }}" \
            --body "⚠️ Auto-implement 실패. [Actions 로그](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) 확인 필요."
