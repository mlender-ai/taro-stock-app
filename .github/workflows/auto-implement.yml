name: Auto Implement CEO Brief

# ⚠️ 자동 개발 게이트 (2026-06-09 CEO 지시):
#   기존엔 "Daily Agent Council" 성공 시 workflow_run 으로 *자동* 개발(PR 생성)됐다.
#   → CEO가 브리프를 먼저 검토하고 승인할 때만 개발되도록 자동 트리거를 제거한다.
#   개발 시작 경로: ① Slack 봇에 "개발해/구현 시작"(= [[ACTION:implement]] → workflow_dispatch)
#                  ② GitHub Actions 수동 실행(workflow_dispatch).
#   (이전 workflow_run 자동 트리거는 의도적으로 비활성화 — 자율 루프 재개 시 아래 주석 복구.)
# on:
#   workflow_run:
#     workflows: ["Daily Agent Council"]
#     types: [completed]
on:
  workflow_dispatch:
    inputs:
      brief_date:
        description: "CEO Brief 날짜 (YYYY-MM-DD, 기본: 오늘)"
        required: false
      model:
        description: "Claude 모델 (비우면 vars.CLAUDE_MODEL → 기본 claude-opus-4-8)"
        required: false
      effort:
        description: "Effort 레벨 (비우면 vars.CLAUDE_EFFORT → 기본 medium)"
        required: false

concurrency:
  group: auto-implement
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  implement:
    # 승인 기반: 수동/Slack 트리거(workflow_dispatch)에서만 실행. 자동 개발 금지.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── 1. 오늘 CEO Brief 이슈 가져오기 ───────────────────────
      - name: Fetch CEO Brief
        id: brief
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.inputs.brief_date }}" ]; then
            TODAY="${{ github.event.inputs.brief_date }}"
          else
            TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          fi
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

          BRIEF_JSON=$(gh issue list \
            --label "ceo-brief" \
            --state open \
            --limit 5 \
            --json number,title,body \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | contains(\"$TODAY\"))] | .[0]")

          if [ -z "$BRIEF_JSON" ] || [ "$BRIEF_JSON" = "null" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ $TODAY 날짜의 CEO Brief 이슈를 찾지 못했습니다."
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$BRIEF_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"

          echo "body<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$BRIEF_JSON" | jq -r '.body' >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

      # ── 2. 오늘 이미 Auto PR이 있는지 중복 체크 ───────────────
      - name: Check Duplicate PR
        id: dedup
        if: steps.brief.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ steps.brief.outputs.today }}
        run: |
          COUNT=$(gh pr list \
            --state open \
            --limit 30 \
            --json title \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Auto\\\\].*$TODAY\"))] | length")
          if [ "$COUNT" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "오늘($TODAY) Auto PR이 이미 존재합니다. 건너뜁니다."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 2.5. 모델/effort 결정 (우선순위: 입력 > 레포변수 > 기본값) ─
      - name: Resolve model config
        id: model
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        env:
          IN_MODEL: ${{ github.event.inputs.model }}
          IN_EFFORT: ${{ github.event.inputs.effort }}
          VAR_MODEL: ${{ vars.CLAUDE_MODEL }}
          VAR_EFFORT: ${{ vars.CLAUDE_EFFORT }}
        run: |
          MODEL="${IN_MODEL:-${VAR_MODEL:-claude-opus-4-8}}"
          EFFORT="${IN_EFFORT:-${VAR_EFFORT:-medium}}"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "effort=$EFFORT" >> "$GITHUB_OUTPUT"
          echo "🤖 모델=$MODEL / effort=$EFFORT"

      # ── 3. Claude Code로 에이전트 구현 (구독 OAuth) ───────────
      - name: Implement with Claude Code
        id: implement
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--max-turns 60 --model ${{ steps.model.outputs.model }} --effort ${{ steps.model.outputs.effort }} --allowedTools "Read,Edit,Write,Glob,Grep,Bash"'
          prompt: |
            당신은 FOMO Club의 시니어 풀스택 개발자입니다.

            FOMO Club은 “주식시장의 틴더”입니다.
            사용자는 종목 카드를 스와이프하며 내 취향의 종목을 발견하고,
            흩어진 뉴스·커뮤니티·수급·이슈 정보를 한 장으로 응축해 판단합니다.

            아래 CEO Brief를 읽고 "이번 주 실행 지시" 섹션의 **첫 번째 유효 항목 하나**만 골라 실제로 구현하세요.

            ## 작업 전 반드시 확인할 SSOT
            - docs/PRODUCT_VISION.md
            - docs/PRODUCT_TRUTH.md
            - docs/DATA_ENGINE_STRATEGY.md
            - docs/KEYWORD_ENGINE_SPEC.md
            - docs/AGENT_REDESIGN.md
            - AGENTS.md
            - CLAUDE.md

            ## 주 작업 대상
            - apps/fomo-web — FOMO Club 웹, 카드 피드·상세·취향 신호
            - apps/fomo-club — FOMO Club 네이티브 앱(보류 상태면 임의 확장 금지)
            - packages/fomo-core — 키워드·종목 카드, 점수, TA/사실층, 순수 도메인 로직
            - apps/web/app/api/fomo — FOMO API/BFF
            - prisma — 스키마 변경 시에만, prod DDL은 사람 승인 필요

            ## 보존/금지 대상
            - tarot 관련 코드는 신규 작업 금지
            - 기존 tarot/legacy 코드는 지시 없이 삭제하지 않음
            - 새 제품 방향 제안 금지. CEO Brief/SSOT 안의 작업만 실행

            ## 절대 규칙
            1. 투자조언, 매수/매도, 목표가, 급등·반등 예측 표현 금지
            2. “지금 안 사면 늦다”처럼 FOMO를 부추기는 문장 금지
            3. 💎는 수급 선행 사실까지만 표현
            4. 포모 점수와 TA는 발견 카드의 연료이지 독립 랭킹/차트 화면으로 진열하지 않음
            5. 발견 표면은 종목 카드 전용. 테마/매크로/이벤트 카드를 피드에 섞지 않음
            6. UI/스와이프 구조는 명시 지시 없이 임의 변경 금지
            7. 데이터 실패 시 가짜 숫자로 위장하지 말고 fallback/confidence를 정직하게 노출
            8. 강세/약세 균형 유지
            9. 새 환경변수 추가 시 `.env.example` 갱신
            10. 빈 catch {} 금지. 최소 console.warn 또는 구조화된 에러 처리
            11. 모든 코드 TypeScript, 기존 타입/유틸/패턴 우선 재사용
            12. 로그인벽·약관 리스크 있는 소스 스크래핑 금지

            ## 작업 절차 (반드시 이 순서로)
            1. CEO Brief 또는 지정 이슈에서 첫 번째 유효 작업 하나만 선택한다.
            2. 관련 파일을 읽고 최소 범위로 구현한다.
            3. 테스트를 추가하거나 기존 테스트를 갱신한다.
            4. 아래 명령을 실행하고 통과할 때까지 수정한다.
               - npm run lint
               - npm run typecheck
               - npm run test
               - npm run build:web
            5. 선택한 작업의 한 줄 제목을 `/tmp/impl-title.txt` 에 기록한다.
               예: echo "취향 신호 저장 안정화" > /tmp/impl-title.txt
            6. **commit / push / PR 생성은 하지 마세요.** 코드 변경만 작업 트리에 남기면 다음 단계가 처리합니다.

            ## PR 본문에 남길 근거
            다음 단계가 PR을 만들 수 있도록 구현 결과는 변경 파일과 검증 결과가 드러나게 정리하세요.
            - 무엇을 바꿨는가
            - 왜 필요한가
            - 건드린 파일
            - 테스트 결과
            - 투자조언 금칙어 위반 여부
            - SSOT 정합성 체크
            - 광혁 리뷰가 필요한 부분

            ## CEO Brief
            ${{ steps.brief.outputs.body }}

      # ── 4. 브랜치 생성 + PR ────────────────────────────────────
      - name: Create Branch and PR
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ steps.brief.outputs.today }}
          BRIEF_NUMBER: ${{ steps.brief.outputs.number }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "변경사항 없음 — PR 생성 건너뜀"
            exit 0
          fi

          TITLE=$(head -1 /tmp/impl-title.txt 2>/dev/null | xargs)
          [ -z "$TITLE" ] && TITLE="CEO Brief 구현"

          BRANCH="agent/ceo-brief-${TODAY}"
          git config user.name "fomo-agent[bot]"
          git config user.email "fomo-agent[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "[Auto] ${TODAY} — ${TITLE}

          CEO Brief #${BRIEF_NUMBER} 기반 Claude Code 자동 구현"
          git push origin "$BRANCH" --force

          cat > /tmp/pr-body.md << PREOF
          ## CEO Brief #${BRIEF_NUMBER} 자동 구현

          원본 이슈: #${BRIEF_NUMBER}

          ### 구현 방식
          - 에이전트: Claude Code (anthropics/claude-code-action, 구독 인증)
          - lint + typecheck + test + build:web 에이전트가 직접 검증
          - 작업: ${TITLE}

          ### SSOT 정합성 체크
          - [ ] docs/PRODUCT_VISION.md 기준과 충돌 없음
          - [ ] docs/PRODUCT_TRUTH.md 기준과 충돌 없음
          - [ ] docs/DATA_ENGINE_STRATEGY.md / docs/KEYWORD_ENGINE_SPEC.md 기준과 충돌 없음
          - [ ] AGENTS.md / CLAUDE.md 운영 규칙과 충돌 없음

          ### 금칙어·제품 경계 체크
          - [ ] 투자조언/매수/매도/목표가/급등·반등 예측 표현 없음
          - [ ] FOMO 부추김 표현 없음
          - [ ] 타로 신규 작업 없음
          - [ ] 포모 점수/TA 독립 진열 화면 없음
          - [ ] 발견 피드에 비종목 카드 섞지 않음

          ### 광혁 리뷰 필요
          - [ ] 제품/화면/카피 판단 필요
          - [ ] 외부 서비스·비용·개인정보·prod DDL 승인 필요
          PREOF

          gh pr create \
            --title "[Auto] ${TODAY} — ${TITLE}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH" \
            --repo "${{ github.repository }}" || {
              echo "PR 생성 실패 (exit code $?)"
              exit 1
            }

      # ── 5. CEO Brief 이슈에 결과 코멘트 ───────────────────────
      - name: Comment on CEO Brief
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ steps.brief.outputs.today }}
        run: |
          BRANCH="agent/ceo-brief-${TODAY}"
          PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' --repo "${{ github.repository }}" 2>/dev/null || echo "")
          if [ -n "$PR_NUM" ]; then
            gh issue comment "${{ steps.brief.outputs.number }}" \
              --repo "${{ github.repository }}" \
              --body "🤖 구현 PR: #${PR_NUM} — Claude Code(구독)로 자동 구현됨. CI가 자동으로 트리거됩니다." || true
          fi

      # ── 6. 실패 시 CEO Brief 이슈에 코멘트 ────────────────────
      - name: Comment on failure
        if: failure() && steps.brief.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ steps.brief.outputs.number }} \
            --repo "${{ github.repository }}" \
            --body "⚠️ Auto-implement 실패. [Actions 로그](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) 확인 필요."
