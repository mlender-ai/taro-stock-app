name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 1. Vercel ORG_ID + PROJECT_ID 취득 ─────────────────────
      - name: Resolve Vercel project
        id: vsetup
        run: |
          # 개인 계정 ID (= ORG_ID)
          ORG_ID=$(curl -sf "https://api.vercel.com/v2/user" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.user.id')
          echo "VERCEL_ORG_ID=$ORG_ID" >> "$GITHUB_ENV"

          # 기존 프로젝트 조회
          PROJ=$(curl -sf \
            "https://api.vercel.com/v9/projects/taro-stock-web" \
            -H "Authorization: Bearer $VERCEL_TOKEN" 2>/dev/null || echo '{}')
          PROJ_ID=$(echo "$PROJ" | jq -r '.id // empty')

          # 없으면 생성
          if [ -z "$PROJ_ID" ]; then
            PROJ=$(curl -sf "https://api.vercel.com/v9/projects" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"taro-stock-web","framework":"nextjs","rootDirectory":"apps/web"}')
            PROJ_ID=$(echo "$PROJ" | jq -r '.id')
            echo "프로젝트 생성: $PROJ_ID"
          else
            echo "기존 프로젝트: $PROJ_ID"
          fi

          echo "VERCEL_PROJECT_ID=$PROJ_ID" >> "$GITHUB_ENV"

      # ── 2. 프로젝트 설정 다운로드 ──────────────────────────────
      - name: Pull project settings
        run: |
          npx vercel pull --yes \
            --token "$VERCEL_TOKEN" \
            --environment=production 2>&1

      # ── 3. 의존성 설치 (workspace root에서) ────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Vercel 빌드 ─────────────────────────────────────────
      - name: Build
        run: npx vercel build --prod --token "$VERCEL_TOKEN" 2>&1

      # ── 5. 배포 ───────────────────────────────────────────────
      - name: Deploy
        id: deploy
        run: |
          OUTPUT=$(npx vercel deploy --prebuilt --prod \
            --token "$VERCEL_TOKEN" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -E "^https://" | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # ── 6. Vercel 환경변수 동기화 ──────────────────────────────
      - name: Sync env vars to Vercel
        env:
          SLACK_BOT_TOKEN:     ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          GITHUB_PAT_VAL:      ${{ secrets.GH_PAT }}
          AI_API_KEY:          ${{ secrets.AI_API_KEY }}
          JWT_SECRET:          ${{ secrets.JWT_SECRET }}
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
        run: |
          upsert() {
            local key=$1 val=$2
            [ -z "$val" ] && return
            echo "$val" | npx vercel env add "$key" production \
              --token "$VERCEL_TOKEN" --yes 2>/dev/null || \
            echo "$val" | npx vercel env add "$key" production \
              --token "$VERCEL_TOKEN" --yes --force 2>/dev/null || true
          }
          upsert SLACK_BOT_TOKEN      "$SLACK_BOT_TOKEN"
          upsert SLACK_SIGNING_SECRET "$SLACK_SIGNING_SECRET"
          upsert GITHUB_PAT           "$GITHUB_PAT_VAL"
          upsert GITHUB_REPO          "mlender-ai/taro-stock-app"
          upsert AI_API_URL           "https://models.github.ai/inference/chat/completions"
          upsert AI_API_KEY           "$AI_API_KEY"
          upsert AI_MODEL             "openai/gpt-4.1"
          upsert JWT_SECRET           "$JWT_SECRET"
          upsert DATABASE_URL         "$DATABASE_URL"

      # ── 7. Slack 배포 완료 알림 ────────────────────────────────
      - name: Notify Slack
        if: vars.SLACK_WEBHOOK_URL != '' && steps.deploy.outputs.url != ''
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg text "🚀 *Vercel 배포 완료*\n>${DEPLOY_URL}" \
            '{"text": $text}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
