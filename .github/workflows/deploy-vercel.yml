name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 1. 프로젝트 ID 취득 (없으면 생성) ──────────────────────
      #    ID 취득만 필수. 설정 PATCH는 best-effort (원격 빌드는
      #    전체 레포 접근 가능 → stored installCommand 도 정상 동작).
      - name: Resolve Vercel project
        run: |
          set +e

          USER_JSON=$(curl -s --max-time 30 "https://api.vercel.com/v2/user" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          ORG_ID=$(echo "$USER_JSON" | jq -r '.user.id // .id // empty')
          if [ -z "$ORG_ID" ]; then
            echo "::error::Vercel 사용자 조회 실패 (토큰 확인). 응답: $USER_JSON"
            exit 1
          fi
          echo "VERCEL_ORG_ID=$ORG_ID" >> "$GITHUB_ENV"
          echo "ORG_ID=$ORG_ID"

          PROJ_JSON=$(curl -s --max-time 30 \
            "https://api.vercel.com/v9/projects/taro-stock-web" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          PROJ_ID=$(echo "$PROJ_JSON" | jq -r '.id // empty')

          if [ -z "$PROJ_ID" ]; then
            CREATE_JSON=$(curl -s --max-time 30 -X POST \
              "https://api.vercel.com/v10/projects" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"taro-stock-web","framework":"nextjs","rootDirectory":"apps/web"}')
            PROJ_ID=$(echo "$CREATE_JSON" | jq -r '.id // empty')
            echo "프로젝트 생성 시도 → $PROJ_ID"
          else
            echo "기존 프로젝트 → $PROJ_ID"
          fi

          if [ -z "$PROJ_ID" ]; then
            echo "::error::프로젝트 조회/생성 실패. GET: $PROJ_JSON"
            exit 1
          fi
          echo "VERCEL_PROJECT_ID=$PROJ_ID" >> "$GITHUB_ENV"

          # 설정 리셋 (best-effort — 실패해도 진행)
          PATCH_CODE=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" \
            -X PATCH "https://api.vercel.com/v9/projects/$PROJ_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"framework":"nextjs","rootDirectory":"apps/web","outputDirectory":".next-build","installCommand":null,"buildCommand":null}')
          echo "설정 PATCH HTTP $PATCH_CODE"

      # ── 2. 환경변수 동기화 (best-effort) ───────────────────────
      - name: Sync environment variables
        env:
          SLACK_BOT_TOKEN:      ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          GH_PAT_VAL:           ${{ secrets.GH_PAT }}
          AI_API_KEY:           ${{ secrets.AI_API_KEY }}
          JWT_SECRET:           ${{ secrets.JWT_SECRET }}
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
        run: |
          set +e
          sync_env() {
            local key=$1 val=$2
            [ -z "$val" ] && return
            CODE=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" -X POST \
              "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?upsert=true" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg k "$key" --arg v "$val" \
                '{key:$k,value:$v,type:"encrypted",target:["production","preview","development"]}')")
            echo "  $key → HTTP $CODE"
          }
          sync_env SLACK_BOT_TOKEN      "$SLACK_BOT_TOKEN"
          sync_env SLACK_SIGNING_SECRET "$SLACK_SIGNING_SECRET"
          sync_env GITHUB_PAT           "$GH_PAT_VAL"
          sync_env GITHUB_REPO          "mlender-ai/taro-stock-app"
          sync_env AI_API_URL           "https://models.github.ai/inference/chat/completions"
          sync_env AI_API_KEY           "$AI_API_KEY"
          sync_env AI_MODEL             "openai/gpt-4.1"
          sync_env JWT_SECRET           "$JWT_SECRET"
          sync_env DATABASE_URL         "$DATABASE_URL"
          exit 0

      # ── 3. 원격 빌드 배포 ──────────────────────────────────────
      - name: Deploy
        id: deploy
        run: |
          OUTPUT=$(npx --yes vercel@latest deploy --prod --yes \
            --token "$VERCEL_TOKEN" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo "https://[a-zA-Z0-9.-]+\.vercel\.app" | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          if [ -z "$URL" ]; then
            echo "::error::배포 URL 없음 — 배포 실패"
            exit 1
          fi
          echo "DEPLOYED → $URL"

      # ── 4. Slack 알림 ──────────────────────────────────────────
      - name: Notify Slack
        if: vars.SLACK_WEBHOOK_URL != '' && steps.deploy.outputs.url != ''
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg text "🚀 *Vercel 배포 완료*\n>${DEPLOY_URL}\n\nSlack Slash Command URL:\n>${DEPLOY_URL}/api/slack/commands" \
            '{"text": $text}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
