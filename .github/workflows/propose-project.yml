name: Propose Projects (CEO)

# 톱다운 1단계 — CEO 에이전트가 제품(정체성·OKR·현 상태)을 분석해 *프로젝트 후보*를 제안한다.
#   → PROJECT_ROADMAP.md 재생성 + 검토용 이슈 + Slack. 사람이 "제품 이해도"를 검토하고 1개 선택.
on:
  workflow_dispatch:

concurrency:
  group: propose-project
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  models: read

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Gather product context
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          # 제품 비전(정체성 핵심) — 마일스톤 목록(M1~M5)은 일부러 제외(순수 발굴 유도)
          VISION=$(cat docs/FOMO_CLUB.md 2>/dev/null | head -c 4000 || echo "")
          [ -z "$VISION" ] && VISION=$(sed -n '1,60p' docs/IDENTITY_AND_MILESTONES.md 2>/dev/null | head -c 3500 || echo "")

          # ★ 실제 구현 인벤토리 — 이미 만든 것 재제안(중복) 방지의 핵심 컨텍스트
          INV=$(git ls-files \
            'apps/fomo-web/app/**' 'apps/fomo-web/components/**' \
            'apps/fomo-club/app/**' 'apps/fomo-club/components/**' \
            'packages/fomo-core/src/**' \
            'apps/web/app/api/fomo/**' \
            2>/dev/null | grep -vE '__tests__|\.test\.|globals\.css|_layout' | sort | head -120)
          [ -z "$INV" ] && INV="(인벤토리 조회 실패)"

          DONE=$(gh pr list --state merged --limit 25 --json title \
            --repo "${{ github.repository }}" 2>/dev/null | jq -r '.[].title' 2>/dev/null | head -c 2500 || echo "")

          # K2 — 이미 출고/결정된 지식(중복 제안 방지). 제품 도메인 광역 쿼리로 검색.
          KN="(지식 레이어 없음)"
          if [ -f knowledge/distilled.md ]; then
            KN=$(npx -y tsx@4.19.2 scripts/knowledge-retrieve.ts retrieve knowledge/distilled.md "감정 포모 챌린지 캘린더 포인트 알림 시뮬레이터 피드 통계 고래 인덱스" 2>/dev/null || echo "(검색 실패)")
          fi
          { echo "vision<<__E__"; echo "$VISION"; echo "__E__";
            echo "inventory<<__E__"; echo "$INV"; echo "__E__";
            echo "done<<__E__"; echo "$DONE"; echo "__E__";
            echo "knowledge<<__E__"; echo "$KN"; echo "__E__"; } >> "$GITHUB_OUTPUT"

      - name: "CEO 프로젝트 제안 (LLM)"
        id: propose
        uses: actions/ai-inference@v1
        continue-on-error: true
        with:
          model: openai/gpt-4o
          max-tokens: 3072
          system-prompt: |
            당신은 FOMO Club 의 CEO(제품 총괄)다. 제품 비전과 *이미 구현된 것*을 직접 보고,
            지금 가장 임팩트 있는 **새 프로젝트**를 순수하게 발굴한다.
            절대 규칙:
            1. **기존 마일스톤(M1~M5) 목록을 따라 적지 마라.** 제품 비전 + 아래 "이미 구현된 것" 인벤토리를 보고
               네가 직접 빈틈/기회를 찾아 net-new 프로젝트를 제안하라.
            2. **이미 구현된 기능 재제안 금지.** 인벤토리에 파일이 있으면(예: EmotionCalendar=감정 캘린더, banner=롤링배너,
               emotionHeat/community/whale=4 Heat, vote/today/calendar API) 그 기능은 *이미 있다* — 중복 제안은 즉시 실패다.
               기존 위에 무엇을 *새로* 얹는지가 분명해야 한다.
            3. **추상어 금지.** "리텐션 강화", "경험 개선" 같은 말 대신 구체적 산출물·화면·데이터·동작을 적어라.
            4. 각 후보에 **직군별 첫 착수(breakdown)** 를 구체적으로: 기획/백엔드/프론트·UX/품질이 각각 무엇을 만드는지 1줄씩.
            5. 가시적·미시적 잡일(스켈레톤·여백·1px) 금지. 정직한 숫자·투자조언 금지·타로 금지 준수.
            6. 2~4개. 출력은 **오직 JSON 배열** 한 개. 설명·코드펜스 금지.
            형식: [{"title":"구체적 프로젝트명","why":"왜 지금 임팩트 있나(구체)","success":"완료=성공 기준(검증 가능)","scope":"무엇을 새로 만드나(구체)","breakdown":"기획: … / 백엔드: … / 프론트·UX: … / 품질: …","milestone":"느슨한 연결 1개(선택)","okr":"느슨한 연결(선택)"}, ...]
          prompt: |
            ## 제품 비전 (FOMO Club — 무엇을 위한 제품인가)
            ${{ steps.ctx.outputs.vision }}

            ## ★ 이미 구현된 것 (실제 파일 인벤토리 — 이것들은 *이미 있다*. 재제안 금지, 이 위에 새로 얹어라)
            ${{ steps.ctx.outputs.inventory }}

            ## 최근 머지 PR (추가 참고 — 중복 금지)
            ${{ steps.ctx.outputs.done }}

            ${{ steps.ctx.outputs.knowledge }}

            마일스톤 목록은 무시하고, 위 비전과 "이미 구현된 것"을 근거로 *아직 없는* 가장 임팩트 있는
            새 프로젝트 2~4개를 발굴해 JSON 배열로만 제안하라. 각 후보는 직군별 첫 착수까지 구체적으로.

      - name: Apply proposal (roadmap 재생성 + 검토 이슈)
        if: steps.propose.outputs.response != ''
        id: apply
        env:
          GH_TOKEN: ${{ github.token }}
          RESP: ${{ steps.propose.outputs.response }}
        run: |
          set -uo pipefail
          printf '%s' "$RESP" > /tmp/candidates_raw.txt
          npx -y tsx@4.19.2 scripts/project-proposal.ts roadmap /tmp/candidates_raw.txt > /tmp/new_roadmap.md 2>/dev/null || true
          # 후보 파싱 0건이면 중단(기존 로드맵 보존)
          if [ ! -s /tmp/new_roadmap.md ] || ! grep -q "^## P1 ·" /tmp/new_roadmap.md; then
            echo "ok=false" >> "$GITHUB_OUTPUT"; echo "후보 파싱 실패 — 로드맵 미변경"; exit 0
          fi
          mv /tmp/new_roadmap.md PROJECT_ROADMAP.md
          npx -y tsx@4.19.2 scripts/project-proposal.ts issue /tmp/candidates_raw.txt > /tmp/proposal_issue.md
          npx -y tsx@4.19.2 scripts/project-proposal.ts slack /tmp/candidates_raw.txt > /tmp/proposal_slack.txt

          # 로드맵 커밋
          if ! git diff --quiet PROJECT_ROADMAP.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add PROJECT_ROADMAP.md
            git commit -m "chore(roadmap): CEO 프로젝트 제안 반영 (검토 대기)"
            git push origin HEAD:main
          fi

          # 검토용 이슈 (label: project-proposal)
          gh label create "project-proposal" --force --color 5319e7 --description "CEO 프로젝트 제안" >/dev/null 2>&1 || true
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          gh issue create --title "🧭 [CEO 프로젝트 제안] $TODAY" \
            --body-file /tmp/proposal_issue.md \
            --label "project-proposal,agent-council" --repo "${{ github.repository }}" || true
          echo "ok=true" >> "$GITHUB_OUTPUT"
          { echo "### 🧭 CEO 프로젝트 제안"; cat /tmp/proposal_issue.md; } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack
        if: always() && vars.SLACK_WEBHOOK_URL != ''
        run: |
          URL=$(printf '%s' "${{ vars.SLACK_WEBHOOK_URL }}" | tr -d '[:space:]')
          if [ -s /tmp/proposal_slack.txt ]; then
            TEXT=$(cat /tmp/proposal_slack.txt)
          else
            TEXT="⚠️ CEO 프로젝트 제안 생성 실패 — 수동 확인 요망."
          fi
          BODY=$(jq -n --arg t "$TEXT" '{text: $t}')
          curl -sS -X POST -H 'Content-type: application/json' --data "$BODY" "$URL" || true
