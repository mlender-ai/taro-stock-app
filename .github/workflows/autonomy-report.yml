name: Autonomy Report

# Phase 3 — 주간 자율 운영 리포트
# 매주 월요일 오전 9시 KST (UTC 일요일 00:00)에 Slack에 리포트 전송

on:
  schedule:
    - cron: "0 0 * * 1"  # 매주 월요일 09:00 KST
  workflow_dispatch:

permissions:
  contents: write  # B1a: OKR 스냅샷 시계열 커밋
  issues: read
  pull-requests: read

jobs:
  report:
    runs-on: ubuntu-latest
    if: vars.SLACK_WEBHOOK_URL != ''

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 0. B1a: OKR 지표 스냅샷 시계열 적재 ────────────────────
      - name: Capture OKR snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          npx -y tsx@4.19.2 scripts/outcome-snapshot.ts \
            generated/outcomes/metric-registry.json generated/outcomes "$TODAY" || echo "스냅샷 실패 — 계속 진행"
          if [ -f "generated/outcomes/okr-snapshot-${TODAY}.json" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "generated/outcomes/okr-snapshot-${TODAY}.json"
            git diff --cached --quiet || {
              git commit -m "chore(outcomes): OKR 스냅샷 ${TODAY} [skip ci]"
              git push origin HEAD:main || { git pull --rebase origin main && git push origin HEAD:main || echo "push 실패 — 다음 주기"; }
            }
          fi

      # ── 1. 지난 7일 자율 활동 집계 ─────────────────────────────
      - name: Collect metrics
        id: metrics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SINCE=$(TZ=Asia/Seoul date -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || \
                  TZ=Asia/Seoul date -v-7d '+%Y-%m-%dT%H:%M:%SZ')

          # CEO Brief 생성 수
          CEO_BRIEFS=$(gh issue list \
            --label "ceo-brief" \
            --state all \
            --limit 50 \
            --json createdAt \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.createdAt > \"$SINCE\")] | length")

          # Auto PR 생성 수
          AUTO_PRS_CREATED=$(gh pr list \
            --state all \
            --limit 50 \
            --json title,createdAt \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | startswith(\"[Auto]\")) | select(.createdAt > \"$SINCE\")] | length")

          # Auto PR 머지 수
          AUTO_PRS_MERGED=$(gh pr list \
            --state merged \
            --limit 50 \
            --json title,mergedAt \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | startswith(\"[Auto]\")) | select(.mergedAt != null) | select(.mergedAt > \"$SINCE\")] | length")

          # Auto-implement 워크플로우 실행 수
          IMPL_RUNS=$(gh run list \
            --workflow auto-implement.yml \
            --limit 20 \
            --json conclusion,createdAt \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.createdAt > \"$SINCE\")] | length")

          IMPL_SUCCESS=$(gh run list \
            --workflow auto-implement.yml \
            --limit 20 \
            --json conclusion,createdAt \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.createdAt > \"$SINCE\") | select(.conclusion == \"success\")] | length")

          # 성공률 계산
          if [ "$IMPL_RUNS" -gt 0 ]; then
            SUCCESS_RATE=$(( IMPL_SUCCESS * 100 / IMPL_RUNS ))
          else
            SUCCESS_RATE=0
          fi

          echo "ceo_briefs=$CEO_BRIEFS" >> "$GITHUB_OUTPUT"
          echo "prs_created=$AUTO_PRS_CREATED" >> "$GITHUB_OUTPUT"
          echo "prs_merged=$AUTO_PRS_MERGED" >> "$GITHUB_OUTPUT"
          echo "impl_runs=$IMPL_RUNS" >> "$GITHUB_OUTPUT"
          echo "success_rate=$SUCCESS_RATE" >> "$GITHUB_OUTPUT"

      # ── 2. 머지된 기능 목록 ─────────────────────────────────────
      - name: Collect merged features
        id: features
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SINCE=$(TZ=Asia/Seoul date -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || \
                  TZ=Asia/Seoul date -v-7d '+%Y-%m-%dT%H:%M:%SZ')

          FEATURES=$(gh pr list \
            --state merged \
            --limit 20 \
            --json title,mergedAt,number \
            --repo "${{ github.repository }}" | \
            jq -r "[.[] | select(.title | startswith(\"[Auto]\")) | select(.mergedAt != null) | select(.mergedAt > \"$SINCE\")] | .[] | \"• #\(.number): \(.title | ltrimstr(\"[Auto] \"))\"" | \
            head -10)

          if [ -z "$FEATURES" ]; then
            FEATURES="• (이번 주 머지된 Auto 피처 없음)"
          fi

          echo "features<<__FEAT_EOF__" >> "$GITHUB_OUTPUT"
          echo "$FEATURES" >> "$GITHUB_OUTPUT"
          echo "__FEAT_EOF__" >> "$GITHUB_OUTPUT"

      # ── 2.5 Standing Constraint 효과 지표 (Phase 2.5 — "규칙이 일한다"를 숫자로) ──
      - name: Collect constraint metrics
        id: constraints
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          ACTIVE=0
          if [ -f constraints/active.json ]; then ACTIVE=$(jq '.constraints | length' constraints/active.json 2>/dev/null || echo 0); fi
          SINCE_DATE=$(TZ=Asia/Seoul date -d '7 days ago' '+%Y-%m-%d' 2>/dev/null || TZ=Asia/Seoul date -v-7d '+%Y-%m-%d')

          # 이번 주 막은 제안 수 + 상위 규칙 (generated/constraint-hits/<date>.json 이벤트 로그 합산)
          HITS_WEEK=0; TOP="(없음)"
          WEEK_FILES=""
          if ls generated/constraint-hits/*.json >/dev/null 2>&1; then
            for f in generated/constraint-hits/*.json; do
              b=$(basename "$f" .json)
              if [ "$b" \> "$SINCE_DATE" ] || [ "$b" = "$SINCE_DATE" ]; then WEEK_FILES="$WEEK_FILES $f"; fi
            done
            if [ -n "$WEEK_FILES" ]; then
              HITS_WEEK=$(jq -s 'reduce .[] as $m (0; . + ([$m[]] | add // 0))' $WEEK_FILES 2>/dev/null || echo 0)
            fi
            TOP=$(jq -s 'reduce .[] as $m ({}; reduce ($m|to_entries[]) as $e (.; .[$e.key] += $e.value)) | to_entries | sort_by(-.value) | .[0:3] | map("\(.key)(\(.value))") | join(", ")' generated/constraint-hits/*.json 2>/dev/null || echo "(없음)")
            [ -z "$TOP" ] && TOP="(없음)"
          fi

          # 이번 주 신규 constraint 후보 PR (distill) + 리뷰 대기
          NEW_PRS=$(gh pr list --label "constraints" --state all --limit 30 --json createdAt --repo "${{ github.repository }}" 2>/dev/null \
            | jq --arg s "${SINCE_DATE}T00:00:00Z" '[.[] | select(.createdAt >= $s)] | length' || echo 0)
          REVIEW_PENDING=$(gh pr list --label "needs-ceo-review" --state open --limit 30 --json number --repo "${{ github.repository }}" 2>/dev/null | jq 'length' || echo 0)

          echo "active=$ACTIVE" >> "$GITHUB_OUTPUT"
          echo "hits_week=${HITS_WEEK:-0}" >> "$GITHUB_OUTPUT"
          echo "new_prs=${NEW_PRS:-0}" >> "$GITHUB_OUTPUT"
          echo "review_pending=${REVIEW_PENDING:-0}" >> "$GITHUB_OUTPUT"
          echo "top<<__TOP_EOF__" >> "$GITHUB_OUTPUT"
          echo "$TOP" >> "$GITHUB_OUTPUT"
          echo "__TOP_EOF__" >> "$GITHUB_OUTPUT"

      # ── 2.7 B1c: 결과-접지 나침반 (베팅이 지표를 실제로 움직였나) ──
      - name: Collect outcome metrics
        id: outcomes
        run: |
          set -uo pipefail
          SINCE_DATE=$(TZ=Asia/Seoul date -d '7 days ago' '+%Y-%m-%d' 2>/dev/null || TZ=Asia/Seoul date -v-7d '+%Y-%m-%d')
          MOVED=0; FLAT=0; WORSENED=0; UNKNOWN=0
          LEDGER="generated/outcomes/ledger.jsonl"
          if [ -f "$LEDGER" ]; then
            # 이번 주(checkedAt >= since) 판정만 집계
            AGG=$(jq -s --arg s "$SINCE_DATE" '
              [.[] | select(.checkedAt >= $s)]
              | { moved: ([.[]|select(.verdict=="moved")]|length),
                  flat: ([.[]|select(.verdict=="flat")]|length),
                  worsened: ([.[]|select(.verdict=="worsened")]|length),
                  unknown: ([.[]|select(.verdict=="unknown")]|length) }
            ' "$LEDGER" 2>/dev/null || echo '{}')
            MOVED=$(echo "$AGG" | jq -r '.moved // 0')
            FLAT=$(echo "$AGG" | jq -r '.flat // 0')
            WORSENED=$(echo "$AGG" | jq -r '.worsened // 0')
            UNKNOWN=$(echo "$AGG" | jq -r '.unknown // 0')
          fi
          MOVED=${MOVED:-0}; FLAT=${FLAT:-0}; WORSENED=${WORSENED:-0}; UNKNOWN=${UNKNOWN:-0}
          DECIDED=$((MOVED + FLAT + WORSENED))
          # STUCK 조기신호: 판정 3건 이상인데 moved 가 (flat+worsened) 보다 적으면 정체
          STUCK=""
          if [ "$DECIDED" -ge 3 ] && [ "$MOVED" -lt $((FLAT + WORSENED)) ]; then
            STUCK="⚠️ *진척 정체 신호*: 활동은 했지만 목표 지표가 움직인 베팅(${MOVED})보다 정체·역효과(${FLAT}+${WORSENED})가 많습니다. 접근 각도나 목표 자체를 재검토할 시점."
          fi
          echo "moved=$MOVED" >> "$GITHUB_OUTPUT"
          echo "flat=$FLAT" >> "$GITHUB_OUTPUT"
          echo "worsened=$WORSENED" >> "$GITHUB_OUTPUT"
          echo "unknown=$UNKNOWN" >> "$GITHUB_OUTPUT"
          echo "stuck<<__STUCK_EOF__" >> "$GITHUB_OUTPUT"
          echo "$STUCK" >> "$GITHUB_OUTPUT"
          echo "__STUCK_EOF__" >> "$GITHUB_OUTPUT"

      - name: Collect knowledge metrics (Brain K1/K2 — O1 하네스 가시화)
        id: knowledge
        run: |
          set -uo pipefail
          TOTAL=0; SHIPPED=0; DECISIONS=0; DAILY=0
          if [ -f knowledge/distilled.md ]; then
            TOTAL=$(grep -c '^- \[' knowledge/distilled.md 2>/dev/null || echo 0)
            SHIPPED=$(grep -c '(shipped)' knowledge/distilled.md 2>/dev/null || echo 0)
            DECISIONS=$(grep -c '(decision)' knowledge/distilled.md 2>/dev/null || echo 0)
          fi
          [ -d knowledge/daily ] && DAILY=$(ls -1 knowledge/daily/*.md 2>/dev/null | wc -l | tr -d ' ')
          echo "total=${TOTAL:-0}" >> "$GITHUB_OUTPUT"
          echo "shipped=${SHIPPED:-0}" >> "$GITHUB_OUTPUT"
          echo "decisions=${DECISIONS:-0}" >> "$GITHUB_OUTPUT"
          echo "daily=${DAILY:-0}" >> "$GITHUB_OUTPUT"

      # ── 3. Slack 리포트 전송 ────────────────────────────────────
      - name: Send weekly report
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          CEO_BRIEFS: ${{ steps.metrics.outputs.ceo_briefs }}
          PRS_CREATED: ${{ steps.metrics.outputs.prs_created }}
          PRS_MERGED: ${{ steps.metrics.outputs.prs_merged }}
          IMPL_RUNS: ${{ steps.metrics.outputs.impl_runs }}
          SUCCESS_RATE: ${{ steps.metrics.outputs.success_rate }}
          FEATURES: ${{ steps.features.outputs.features }}
          C_ACTIVE: ${{ steps.constraints.outputs.active }}
          C_HITS_WEEK: ${{ steps.constraints.outputs.hits_week }}
          C_NEW_PRS: ${{ steps.constraints.outputs.new_prs }}
          C_REVIEW_PENDING: ${{ steps.constraints.outputs.review_pending }}
          C_TOP: ${{ steps.constraints.outputs.top }}
          O_MOVED: ${{ steps.outcomes.outputs.moved }}
          O_FLAT: ${{ steps.outcomes.outputs.flat }}
          O_WORSENED: ${{ steps.outcomes.outputs.worsened }}
          O_UNKNOWN: ${{ steps.outcomes.outputs.unknown }}
          O_STUCK: ${{ steps.outcomes.outputs.stuck }}
          K_TOTAL: ${{ steps.knowledge.outputs.total }}
          K_SHIPPED: ${{ steps.knowledge.outputs.shipped }}
          K_DECISIONS: ${{ steps.knowledge.outputs.decisions }}
          K_DAILY: ${{ steps.knowledge.outputs.daily }}
        run: |
          WEEK_START=$(TZ=Asia/Seoul date -d '7 days ago' '+%m/%d' 2>/dev/null || \
                      TZ=Asia/Seoul date -v-7d '+%m/%d')
          WEEK_END=$(TZ=Asia/Seoul date '+%m/%d')

          # 이모지 선택
          if [ "$SUCCESS_RATE" -ge 80 ]; then
            RATE_EMOJI="🟢"
          elif [ "$SUCCESS_RATE" -ge 50 ]; then
            RATE_EMOJI="🟡"
          else
            RATE_EMOJI="🔴"
          fi

          # 메시지를 printf 로 조립(YAML 블록 안 들여쓰기 정상화 — 멀티라인 리터럴 회피)
          MESSAGE=$(printf '%s\n' \
            "📊 *주간 자율 운영 리포트* (${WEEK_START} ~ ${WEEK_END})" \
            "" \
            "*이번 주 자율 파이프라인 요약:*" \
            "• 📋 CEO Brief 생성: ${CEO_BRIEFS}건" \
            "• 🤖 Auto PR 생성: ${PRS_CREATED}건" \
            "• ✅ Auto PR 머지: ${PRS_MERGED}건" \
            "• ⚙️ 파이프라인 실행: ${IMPL_RUNS}회" \
            "• ${RATE_EMOJI} 성공률: ${SUCCESS_RATE}%" \
            "" \
            "*머지된 기능:*" \
            "${FEATURES}" \
            "" \
            "*🔒 Standing Constraints (CEO와의 싱크):*" \
            "• 활성 규칙: ${C_ACTIVE}개" \
            "• 이번 주 사전 차단한 제안: *${C_HITS_WEEK}건* — 그만큼 CEO가 같은 피드백을 반복하지 않아도 됐습니다" \
            "• 자주 작동한 규칙: ${C_TOP}" \
            "• 이번 주 새로 학습한 규칙 후보(PR): ${C_NEW_PRS}건 / 리뷰 대기: ${C_REVIEW_PENDING}건" \
            "" \
            "*🧭 결과 나침반 (베팅이 지표를 움직였나):*" \
            "• ✅ 움직임(moved): ${O_MOVED} · ➖ 정체(flat): ${O_FLAT} · 🔻 역효과(worsened): ${O_WORSENED} · ❔ 측정불가(unknown): ${O_UNKNOWN}" \
            "• 이번 주 머지된 베팅 중 ${O_MOVED}건이 목표 지표를 실제로 움직였습니다 (상관 기록 — 인과 단정 아님)" \
            "${O_STUCK}" \
            "" \
            "*🧠 지식 레이어 (제2의 뇌 — 복리로 쌓이는 기억):*" \
            "• 정제 지식 ${K_TOTAL}건 (출고 ${K_SHIPPED} · 결정 ${K_DECISIONS}) · daily 노트 ${K_DAILY}개" \
            "• 에이전트가 propose/decompose/implement 때 이 지식을 출처와 함께 검색·재주입 → 재제안·중복 차단" \
            "" \
            "_Hermes 자율 루프 — CEO 개입 없이 자동 운영 중_")

          jq -n --arg text "$MESSAGE" '{"text": $text}' > /tmp/report_payload.json
          curl -s -X POST "$(printf '%s' "$SLACK_WEBHOOK_URL" | tr -d '[:space:]')" \
            -H "Content-Type: application/json" \
            -d @/tmp/report_payload.json
