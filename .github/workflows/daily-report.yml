name: Daily Morning Report

on:
  schedule:
    - cron: "30 22 * * *"  # 매일 07:30 KST — 에이전트 카운슬(07:00) 완료 후 30분
  workflow_dispatch:       # 수동 테스트용

permissions:
  issues: read
  models: read

jobs:
  send_report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. 최신 CEO Brief 이슈 가져오기 ─────────────────
      - name: Fetch CEO Brief
        id: brief
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')

          # 최신 CEO Brief 이슈 (날짜 무관 - 테스트용)
          ISSUE_JSON=$(gh issue list \
            --label "ceo-brief" \
            --state open \
            --limit 1 \
            --json number,title,body,createdAt \
            --repo "${{ github.repository }}" | \
            jq ".[0]")

          if [ "$ISSUE_JSON" = "null" ] || [ -z "$ISSUE_JSON" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$ISSUE_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$ISSUE_JSON" | jq -r '.title')" >> "$GITHUB_OUTPUT"

          echo "body<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_JSON" | jq -r '.body' >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

      # ── 2. 셸에서 HTML 변환 (AI 레이트리밋 우회) ──────────
      - name: Convert Markdown to HTML
        if: steps.brief.outputs.found == 'true'
        id: html
        env:
          BODY: ${{ steps.brief.outputs.body }}
          ISSUE_NUM: ${{ steps.brief.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          # 마크다운 → HTML 변환 (sed 기반)
          HTML_BODY=$(echo "$BODY" \
            | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' \
            | sed 's/\*\*\([^*]*\)\*\*/<strong>\1<\/strong>/g' \
            | sed 's/^#### \(.*\)/<h3 style="color:#3ecf8e;margin:16px 0 8px;">\1<\/h3>/g' \
            | sed 's/^### \(.*\)/<h2 style="color:#e0e0e0;margin:20px 0 12px;">\1<\/h2>/g' \
            | sed 's/^## \(.*\)/<h2 style="color:#e0e0e0;margin:20px 0 12px;">\1<\/h2>/g' \
            | sed 's/^---$/<hr style="border:none;border-top:1px solid #333;margin:16px 0;">/g' \
            | sed 's/^- \(.*\)/<li style="margin:4px 0;color:#e0e0e0;">\1<\/li>/g' \
            | sed 's/^[0-9]\+\. \(.*\)/<li style="margin:8px 0;color:#e0e0e0;">\1<\/li>/g' \
            | sed '/^$/d')

          ISSUE_URL="https://github.com/${REPO}/issues/${ISSUE_NUM}"

          cat > /tmp/email.html <<HTMLEOF
          <div style="max-width:600px;margin:0 auto;padding:24px;background:#0f0f0f;font-family:-apple-system,sans-serif;font-size:15px;line-height:1.7;color:#e0e0e0;">
            <div style="text-align:center;padding:20px 0;border-bottom:1px solid #333;">
              <span style="font-size:32px;">🔮</span>
              <h1 style="color:#3ecf8e;font-size:20px;margin:8px 0 0;">Trading Taro CEO Brief</h1>
            </div>
            <div style="border-radius:12px;padding:20px;margin:16px 0;background:#1e1e1e;border-left:3px solid #3ecf8e;">
              ${HTML_BODY}
            </div>
            <div style="text-align:center;padding:16px 0;border-top:1px solid #333;margin-top:24px;">
              <a href="${ISSUE_URL}" style="color:#3ecf8e;text-decoration:none;font-size:13px;">GitHub Issue #${ISSUE_NUM} 에서 전체 보기 →</a>
            </div>
          </div>
          HTMLEOF

          # output으로 전달
          echo "html_file=/tmp/email.html" >> "$GITHUB_OUTPUT"

      # ── 3. 이메일 발송 ────────────────────────────────────────
      - name: Send Morning Report Email
        if: steps.brief.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "☀️ [${{ steps.brief.outputs.title }}]"
          to: choihenry0010@gmail.com
          from: "Trading Taro 에이전트 카운슬 <${{ secrets.SMTP_USERNAME }}>"
          html_body: file:///tmp/email.html

      # ── 4. 이슈 없을 때 알림 ─────────────────────────────────
      - name: Send Fallback Email (no brief found)
        if: steps.brief.outputs.found == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "⚠️ [Trading Taro] 오늘 CEO Brief 이슈가 생성되지 않았습니다"
          to: choihenry0010@gmail.com
          from: "Trading Taro 에이전트 카운슬 <${{ secrets.SMTP_USERNAME }}>"
          body: |
            오늘 CEO Brief 이슈를 찾을 수 없습니다.

            에이전트 카운슬 워크플로우가 정상 실행됐는지 확인하세요:
            https://github.com/${{ github.repository }}/actions/workflows/idea-proposal.yml
