name: Slack Notify

on:
  # Auto-implement PR 생성 알림
  pull_request:
    types: [opened, closed]
    branches: [main]

  # CI + Daily Agent Council + Auto Implement 완료 알림
  workflow_run:
    workflows: ["CI", "Daily Agent Council", "Auto Implement CEO Brief"]
    types: [completed]

  workflow_dispatch:
    inputs:
      message:
        description: "Slack에 보낼 메시지"
        required: true

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  notify:
    runs-on: ubuntu-latest
    if: vars.SLACK_WEBHOOK_URL != ''

    steps:
      # ── workflow_dispatch: 수동 알림 ──────────────────────────
      - name: Manual message
        if: github.event_name == 'workflow_dispatch'
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          MSG: ${{ github.event.inputs.message }}
        run: |
          PAYLOAD=$(jq -n --arg text "📢 $MSG" '{"text": $text}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ── PR 오픈: Auto PR 생성 알림 ──────────────────────────
      - name: PR opened (Auto)
        if: |
          github.event_name == 'pull_request' &&
          github.event.action == 'opened' &&
          startsWith(github.event.pull_request.title, '[Auto]')
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PAYLOAD=$(jq -n \
            --arg text "🤖 *Auto PR 생성됨*\n>#${PR_NUMBER}: ${PR_TITLE}\n>${PR_URL}\n\n✅ CI가 자동 실행 중입니다." \
            '{"text": $text}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ── PR 머지 완료 ────────────────────────────────────────
      - name: PR merged
        if: |
          github.event_name == 'pull_request' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.title, '[Auto]')
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PAYLOAD=$(jq -n \
            --arg text "✅ *Auto PR 머지됨*\n>#${PR_NUMBER}: ${PR_TITLE}\n>${PR_URL}" \
            '{"text": $text}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ── CI 완료: agent 브랜치 결과 ──────────────────────────
      - name: CI result
        if: |
          github.event_name == 'workflow_run' &&
          github.event.workflow.name == 'CI' &&
          (startsWith(github.event.workflow_run.head_branch, 'agent/') ||
           github.event.workflow_run.head_branch == 'main')
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          if [ "$CONCLUSION" = "success" ]; then
            EMOJI="✅"; STATUS="통과"
          elif [ "$CONCLUSION" = "failure" ]; then
            EMOJI="❌"; STATUS="실패"
          else
            EMOJI="⚠️"; STATUS="$CONCLUSION"
          fi
          PAYLOAD=$(jq -n \
            --arg text "${EMOJI} *CI ${STATUS}* — \`${BRANCH}\`\n>${RUN_URL}" \
            '{"text": $text}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ── Daily Agent Council 완료: CEO Brief 본문 요약 푸시 (Step 4) ──
      - name: Council completed
        if: |
          github.event_name == 'workflow_run' &&
          github.event.workflow.name == 'Daily Agent Council'
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          if [ "$CONCLUSION" != "success" ]; then
            jq -n --arg t "⚠️ *Daily Agent Council 실패*\n>${RUN_URL}" '{"text": $t}' > /tmp/payload.json
            curl -sf -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d @/tmp/payload.json
            exit 0
          fi
          # 최신 CEO Brief 본문을 단일 jq 패스로 Slack 페이로드화 (재파싱·개행 이슈 회피)
          gh issue list --label "ceo-brief" --state all --limit 1 \
            --json number,title,body,url --repo "${{ github.repository }}" 2>/dev/null \
            | jq --arg run "$RUN_URL" '
                (.[0] // null) as $b
                | if $b == null
                  then {text: ("📋 *Daily Agent Council 완료* — CEO Brief 생성됨.\n>" + $run)}
                  else {text: (
                    "📋 *CEO Daily Brief #\($b.number)*\n" + $b.title + "\n" + $b.url + "\n\n"
                    + (($b.body // "") | gsub("\\|"; "") | .[0:1800])
                    + "\n\n_… 전체는 GitHub 이슈에서. 피드백은 이 스레드에 @봇 멘션으로._"
                  )}
                  end' > /tmp/payload.json
          curl -sf -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d @/tmp/payload.json

      # ── Auto Implement 완료 ─────────────────────────────────
      - name: Auto implement completed
        if: |
          github.event_name == 'workflow_run' &&
          github.event.workflow.name == 'Auto Implement CEO Brief'
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          if [ "$CONCLUSION" = "success" ]; then
            PAYLOAD=$(jq -n \
              --arg text "🚀 *Auto Implement 완료*\nPR이 생성되었습니다. CI 결과를 기다리세요.\n>${RUN_URL}" \
              '{"text": $text}')
          else
            PAYLOAD=$(jq -n \
              --arg text "❌ *Auto Implement 실패*\n>${RUN_URL}" \
              '{"text": $text}')
          fi
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
