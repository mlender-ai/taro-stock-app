name: DB Push (manual)

# 수동 트리거 전용 — Prisma 스키마를 DATABASE_URL DB에 동기화한다 (ADR-003: migrate 대신 db push).
# 안전장치: 적용 전 SQL diff를 로그에 출력, --accept-data-loss 미사용(파괴적 변경 시 자동 중단).
# 시크릿 DATABASE_URL 필요. FOMO 테이블(EmotionVote/FomoIndexSnapshot) 추가용.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "체크=미리보기만(SQL 출력, DB 변경 안 함) · 해제=실제 적용(db push)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Diagnose DATABASE_URL shape (no secret leak)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node -e '
            const raw = process.env.DATABASE_URL || "";
            console.log("length:", raw.length);
            console.log("startsWith postgresql:", raw.startsWith("postgresql://") || raw.startsWith("postgres://"));
            console.log("has brackets [ ]:", /[\[\]]/.test(raw));
            console.log("has whitespace/newline:", /\s/.test(raw));
            try {
              const u = new URL(raw);
              console.log("scheme:", u.protocol);
              console.log("username:", u.username);
              console.log("password.length:", (u.password||"").length);
              console.log("password has special (@:/?#&=):", /[@:/?#&=]/.test(decodeURIComponent(u.password||"")));
              console.log("host:", u.hostname);
              console.log("port:", u.port);
              console.log("db:", u.pathname);
            } catch (e) { console.log("URL parse error:", e.message); }
          '

      - name: Preview pending SQL (read-only diff)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "=== DB → schema 적용 예정 SQL ==="
          npx prisma migrate diff \
            --from-schema-datasource prisma/schema.prisma \
            --to-schema-datamodel prisma/schema.prisma \
            --script || true

      - name: Dry-run notice (skipped 실제 적용)
        if: ${{ inputs.dry_run }}
        run: echo "🔍 미리보기 모드 — 위 'Preview pending SQL' 의 변경만 확인하고 DB 는 건드리지 않았습니다. 실제 적용하려면 dry_run 체크를 해제하고 다시 실행하세요."

      - name: Prisma db push (additive; aborts on data loss)
        if: ${{ !inputs.dry_run }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma db push
