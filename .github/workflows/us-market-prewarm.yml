name: US Market Prewarm

# Twelve Data free tier is tight, so split the US quote/sparkline prewarm into two
# alternating slots. Vercel native cron is not available on the current backend
# project plan; this workflow calls the production prewarm endpoint instead.

on:
  schedule:
    - cron: "0,10,20,30,40,50 * * * *"
    - cron: "5,15,25,35,45,55 * * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Prewarm slot to run (0 or 1). Defaults to current schedule slot."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: us-market-prewarm
  cancel-in-progress: false

jobs:
  prewarm:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve slot
        id: slot
        env:
          INPUT_SLOT: ${{ github.event.inputs.slot }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_SLOT:-}" ]; then
            SLOT="$INPUT_SLOT"
          else
            MINUTE="$(date -u +%M)"
            if [ $((10#$MINUTE % 10)) -eq 0 ]; then
              SLOT="0"
            else
              SLOT="1"
            fi
          fi
          if [ "$SLOT" != "0" ] && [ "$SLOT" != "1" ]; then
            echo "invalid slot: $SLOT" >&2
            exit 1
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"

      - name: Call production prewarm endpoint
        env:
          SLOT: ${{ steps.slot.outputs.slot }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          URL="https://fomo-club-backend.vercel.app/api/fomo/cron/us-market-prewarm/${SLOT}"
          if [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS "$URL" -H "Authorization: Bearer ${CRON_SECRET}"
          else
            curl -fsS "$URL"
          fi

      - name: Warm US discovery after both slots
        if: steps.slot.outputs.slot == '1'
        run: |
          set -euo pipefail
          curl -fsS "https://fomo-club-backend.vercel.app/api/fomo/discovery?country=US" > /tmp/us-discovery.json
          node -e '
            const fs = require("fs");
            const json = JSON.parse(fs.readFileSync("/tmp/us-discovery.json", "utf8"));
            const fronts = Object.values(json.fronts || {});
            const priced = fronts.filter((front) => front && front.priceText && front.priceText !== "$0.00").length;
            const spark = fronts.filter((front) => Array.isArray(front && front.sparkline) && front.sparkline.length >= 2).length;
            console.log(JSON.stringify({ stocks: json.stocks?.length || 0, cards: json.cards?.length || 0, fronts: fronts.length, priced, spark }));
          '
