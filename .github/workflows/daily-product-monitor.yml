name: Daily Product Monitor

# Bottom-up 운영 감시.
# 매일 가볍게 제품/운영 상태를 확인하고, 크리티컬한 깨짐이 있을 때만 task 이슈와 자동 수정 시도를 만든다.
# 평소 Claude/LLM 비용 없음. critical 발견 후 implement-task 를 호출할 때만 Claude Code 비용 발생.

on:
  schedule:
    - cron: "0 0 * * *" # 09:00 KST
  workflow_dispatch:
    inputs:
      auto_fix:
        description: "critical 발견 시 implement-task 자동 실행 여부"
        required: false
        default: "true"
      lookback_hours:
        description: "검사 기간(시간). 기본 24"
        required: false
        default: "24"

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: daily-product-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Inspect product health
        id: inspect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '24' }}
        run: |
          set -euo pipefail

          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          if ! [[ "${LOOKBACK_HOURS:-24}" =~ ^[0-9]+$ ]]; then LOOKBACK_HOURS=24; fi
          if [ "$LOOKBACK_HOURS" -lt 1 ] || [ "$LOOKBACK_HOURS" -gt 168 ]; then LOOKBACK_HOURS=24; fi
          SINCE=$(date -u -d "${LOOKBACK_HOURS} hours ago" '+%Y-%m-%dT%H:%M:%SZ')
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          echo "lookback_hours=$LOOKBACK_HOURS" >> "$GITHUB_OUTPUT"

          gh label create "daily-product-monitor" --repo "$REPO" --force --color "0052cc" --description "Daily bottom-up product health monitor" >/dev/null 2>&1 || true
          gh label create "pipeline-monitor" --repo "$REPO" --force --color "1d76db" --description "Agent pipeline monitoring request" >/dev/null 2>&1 || true
          gh label create "data-quality" --repo "$REPO" --force --color "c2e0c6" --description "Data quality, confidence, fallback, grounding" >/dev/null 2>&1 || true
          gh label create "task" --repo "$REPO" --force --color "bfd4f2" --description "Implementable task issue" >/dev/null 2>&1 || true

          gh run list --repo "$REPO" --branch main --limit 50 \
            --json databaseId,workflowName,displayTitle,conclusion,status,createdAt,url \
            > /tmp/runs.json

          jq --arg since "$SINCE" '
            [
              .[]
              | select(.createdAt >= $since)
              | select(.status == "completed")
              | select(.conclusion == "failure" or .conclusion == "timed_out")
              | select(
                  .workflowName == "CI" or
                  .workflowName == "Auto QA — Web Smoke" or
                  .workflowName == "FOMO Index Pipeline" or
                  .workflowName == "Keyword Cards Pipeline" or
                  .workflowName == "Supply Demand Pipeline" or
                  .workflowName == "Warm Insights"
                )
            ]
          ' /tmp/runs.json > /tmp/critical-runs.json

          jq --arg since "$SINCE" '
            [
              .[]
              | select(.workflowName == "FOMO Index Pipeline" or .workflowName == "Keyword Cards Pipeline" or .workflowName == "Supply Demand Pipeline")
              | select(.status == "completed")
              | select(.conclusion == "success")
            ]
            | group_by(.workflowName)
            | map(max_by(.createdAt))
            | sort_by(.workflowName)
          ' /tmp/runs.json > /tmp/latest-product-success.json

          STALE_NOTES=()
          for workflow in "FOMO Index Pipeline" "Keyword Cards Pipeline" "Supply Demand Pipeline"; do
            LAST=$(jq -r --arg w "$workflow" '.[] | select(.workflowName == $w) | .createdAt' /tmp/latest-product-success.json | head -1)
            if [ -z "$LAST" ]; then
              STALE_NOTES+=("$workflow: 최근 성공 실행 없음")
              continue
            fi
            if [[ "$LAST" < "$SINCE" ]]; then
              STALE_NOTES+=("$workflow: 최근 성공 $LAST (기준 $SINCE 이전)")
            fi
          done
          printf '%s\n' "${STALE_NOTES[@]}" | sed '/^$/d' > /tmp/stale-product.txt

          CRITICAL_RUN_COUNT=$(jq 'length' /tmp/critical-runs.json)
          STALE_COUNT=$(wc -l < /tmp/stale-product.txt | tr -d ' ')
          CRITICAL_COUNT=$((CRITICAL_RUN_COUNT + STALE_COUNT))
          echo "critical_count=$CRITICAL_COUNT" >> "$GITHUB_OUTPUT"
          echo "critical_run_count=$CRITICAL_RUN_COUNT" >> "$GITHUB_OUTPUT"
          echo "stale_count=$STALE_COUNT" >> "$GITHUB_OUTPUT"

          {
            echo "# Daily Product Monitor — $TODAY"
            echo
            echo "기간: 최근 ${LOOKBACK_HOURS}시간 ($SINCE 이후)"
            echo
            if [ "$CRITICAL_COUNT" = "0" ]; then
              echo "상태: 정상"
              echo
              echo "크리티컬한 CI/제품 파이프라인 실패나 stale 신호를 발견하지 못했습니다. 오늘은 개발 작업을 만들지 않습니다."
              echo
              echo "## 최근 제품 파이프라인 성공"
              jq -r '.[] | "- \(.workflowName): \(.createdAt) / \(.url)"' /tmp/latest-product-success.json
            else
              echo "상태: 위험"
              echo
              echo "아래 critical 신호를 확인하고, 제품/운영 안정성을 회복하는 최소 수정 PR을 만드세요."
              echo
              if [ "$CRITICAL_RUN_COUNT" != "0" ]; then
                echo "## 실패/타임아웃 run"
                jq -r '.[] | "- \(.workflowName): \(.displayTitle) / \(.conclusion) / \(.url)"' /tmp/critical-runs.json
                echo
              fi
              if [ "$STALE_COUNT" != "0" ]; then
                echo "## stale 제품 파이프라인"
                sed 's/^/- /' /tmp/stale-product.txt
                echo
              fi
              echo
              echo "## 작업 원칙"
              echo "- 새 제품 방향/기능 제안 금지"
              echo "- 실패 원인 확인 후 최소 수정"
              echo "- 화면/카피/프롬프트 임의 변경 금지"
              echo "- 비용/외부 서비스/prod DDL 필요 시 구현하지 말고 이슈에 사유 기록"
            fi
          } > /tmp/monitor-body.md

          if [ "$CRITICAL_COUNT" = "0" ]; then
            SUMMARY="🟢 정상 — 실패 0건, stale 0건. 개발 스킵."
          else
            SUMMARY="🚨 위험 — 실패 ${CRITICAL_RUN_COUNT}건, stale ${STALE_COUNT}건."
          fi
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Inspect FOMO quality
        id: quality
        env:
          FOMO_API_BASE: "https://fomo-club-backend.vercel.app"
          FOMO_WEB_URL: "https://fomo-web-mlender-ais-projects.vercel.app"
          FOMO_QUALITY_STOCK_LIMIT: "8"
          FOMO_QUALITY_DEPTH_LIMIT: "3"
          FOMO_QUALITY_TIMEOUT_MS: "8000"
          FOMO_QUALITY_JSON_OUT: "/tmp/fomo-quality-report.json"
          FOMO_QUALITY_MD_OUT: "/tmp/fomo-quality-report.md"
        run: |
          set -euo pipefail
          set +e
          npm run quality:fomo > /tmp/product-quality.stdout 2> /tmp/product-quality.stderr
          STATUS=$?
          set -e

          if [ "$STATUS" != "0" ] || [ ! -f /tmp/fomo-quality-report.json ]; then
            {
              echo "# FOMO Quality Report"
              echo
              echo "상태: critical"
              echo
              echo "품질 리포트 스크립트가 실패했습니다."
              echo
              echo "## stderr"
              sed 's/^/    /' /tmp/product-quality.stderr || true
            } > /tmp/fomo-quality-report.md
            echo "critical_count=1" >> "$GITHUB_OUTPUT"
            echo "warn_count=0" >> "$GITHUB_OUTPUT"
            echo "summary=quality report failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("fs");
          const report = JSON.parse(fs.readFileSync("/tmp/fomo-quality-report.json", "utf8"));
          const critical = report.findings.filter((f) => f.severity === "critical").length;
          const warn = report.findings.filter((f) => f.severity === "warn").length;
          const lite = report.latency.find((row) => row.endpoint === "stock_front_lite");
          const fallback = report.hookDistribution.liteTier.find((row) => row.key === "fallback");
          const material = report.hookDistribution.liteTier.find((row) => row.key === "material");
          const pct = (row) => row ? `${Math.round(row.rate * 100)}%` : "0%";
          const summary = `critical ${critical}, warn ${warn}, lite p95 ${lite?.p95Ms ?? "N/A"}ms, material ${pct(material)}, fallback ${pct(fallback)}`;
          console.log(`critical_count=${critical}`);
          console.log(`warn_count=${warn}`);
          console.log(`summary=${summary}`);
          NODE

      - name: Combine monitor report
        id: combine
        env:
          INSPECT_CRITICAL: ${{ steps.inspect.outputs.critical_count }}
          QUALITY_CRITICAL: ${{ steps.quality.outputs.critical_count }}
        run: |
          set -euo pipefail
          TOTAL=$(( ${INSPECT_CRITICAL:-0} + ${QUALITY_CRITICAL:-0} ))
          echo "critical_count=$TOTAL" >> "$GITHUB_OUTPUT"
          cp /tmp/monitor-body.md /tmp/monitor-combined-body.md
          if [ -f /tmp/fomo-quality-report.md ]; then
            {
              echo
              echo "---"
              echo
              cat /tmp/fomo-quality-report.md
            } >> /tmp/monitor-combined-body.md
          fi

      - name: Create critical task issue
        id: issue
        if: steps.combine.outputs.critical_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TODAY: ${{ steps.inspect.outputs.today }}
        run: |
          set -euo pipefail

          EXISTING=$(gh issue list --repo "$REPO" \
            --label "daily-product-monitor" \
            --state open \
            --limit 20 \
            --json number,title \
            --jq ".[] | select(.title | contains(\"$TODAY\")) | .number" | head -1)

          if [ -n "$EXISTING" ]; then
            echo "number=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "이미 오늘자 monitor 이슈가 있어 재사용: #$EXISTING"
            exit 0
          fi

          URL=$(gh issue create --repo "$REPO" \
            --title "🚨 [daily-product-monitor] critical $TODAY" \
            --body-file /tmp/monitor-combined-body.md \
            --label "daily-product-monitor,pipeline-monitor,data-quality,task")
          NUM="${URL##*/}"
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "created issue #$NUM"

      - name: Auto-fix critical issue
        id: autofix
        if: |
          steps.issue.outputs.number != '' &&
          (github.event_name == 'schedule' || github.event.inputs.auto_fix != 'false')
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUM: ${{ steps.issue.outputs.number }}
        run: |
          set -euo pipefail
          gh workflow run implement-task.yml --repo "$REPO" \
            -f issue="$NUM" \
            -f max_turns="30" \
            -f timeout_minutes="25" \
            -f max_changed_files="12" \
            -f max_added_lines="900" \
            -f allowed_paths=".github,apps/web,scripts,packages/fomo-core,packages/shared"
          gh issue comment "$NUM" --repo "$REPO" \
            --body "🤖 Daily Product Monitor가 critical 상태를 감지해 implement-task 자동 수정을 시작했습니다.\\n\\n자동 수정 가드: max_turns=30, timeout=25m, changed_files<=12, added_lines<=900, allowed_paths=.github/apps/web/scripts/packages."
          echo "started=true" >> "$GITHUB_OUTPUT"

      - name: Record auto-fix dispatch result
        if: always() && steps.issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUM: ${{ steps.issue.outputs.number }}
          AUTO_FIX_STARTED: ${{ steps.autofix.outputs.started }}
          AUTO_FIX_OUTCOME: ${{ steps.autofix.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "${AUTO_FIX_STARTED:-false}" = "true" ]; then
            BODY="✅ auto-fix dispatch 성공. implement-task 실행 상태는 \`/fomo status\` 또는 Actions에서 확인하세요.\\n\\nMonitor run: ${RUN_URL}"
          elif [ "${AUTO_FIX_OUTCOME:-skipped}" = "skipped" ]; then
            BODY="ℹ️ auto-fix는 이번 실행에서 스킵됐습니다(auto_fix=false 또는 조건 불일치).\\n\\nMonitor run: ${RUN_URL}"
          else
            BODY="⚠️ auto-fix dispatch 실패. 자동 개발은 시작되지 않았습니다. Actions 로그를 보고 수동으로 이어받아 주세요.\\n\\nMonitor run: ${RUN_URL}"
          fi
          gh issue comment "$NUM" --repo "$REPO" --body "$BODY" || true

      - name: Report to Slack
        if: always() && vars.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          CRITICAL_COUNT: ${{ steps.combine.outputs.critical_count }}
          CRITICAL_RUN_COUNT: ${{ steps.inspect.outputs.critical_run_count }}
          STALE_COUNT: ${{ steps.inspect.outputs.stale_count }}
          SUMMARY: ${{ steps.inspect.outputs.summary }}
          QUALITY_SUMMARY: ${{ steps.quality.outputs.summary }}
          QUALITY_CRITICAL_COUNT: ${{ steps.quality.outputs.critical_count }}
          QUALITY_WARN_COUNT: ${{ steps.quality.outputs.warn_count }}
          TODAY: ${{ steps.inspect.outputs.today }}
          LOOKBACK_HOURS: ${{ steps.inspect.outputs.lookback_hours }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          AUTO_FIX_STARTED: ${{ steps.autofix.outputs.started }}
          AUTO_FIX_OUTCOME: ${{ steps.autofix.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          URL=$(printf '%s' "$SLACK_WEBHOOK_URL" | tr -d '[:space:]')
          if [ "${CRITICAL_COUNT:-0}" = "0" ]; then
            TEXT="🟢 *Daily Product Monitor* — ${TODAY}\n${SUMMARY}\n품질: ${QUALITY_SUMMARY:-N/A}\n범위: 최근 ${LOOKBACK_HOURS}시간\n다음 액션: 없음 — 오늘은 개발 스킵.\n${RUN_URL}"
          else
            if [ "${AUTO_FIX_STARTED:-false}" = "true" ]; then
              NEXT="이슈 #${ISSUE_NUMBER} 생성/재사용 → implement-task 자동 수정 시작"
            elif [ "${AUTO_FIX_OUTCOME:-skipped}" = "skipped" ]; then
              NEXT="이슈 #${ISSUE_NUMBER} 생성/재사용 → auto-fix 스킵"
            else
              NEXT="이슈 #${ISSUE_NUMBER} 생성/재사용 → auto-fix dispatch 실패, 수동 확인 필요"
            fi
            TEXT="🚨 *Daily Product Monitor* — ${TODAY}\n${SUMMARY}\n품질: ${QUALITY_SUMMARY:-N/A}\n범위: 최근 ${LOOKBACK_HOURS}시간\n분해: 실패 ${CRITICAL_RUN_COUNT:-0}건 · stale ${STALE_COUNT:-0}건 · 품질 critical ${QUALITY_CRITICAL_COUNT:-0}건 · 품질 warn ${QUALITY_WARN_COUNT:-0}건\n다음 액션: ${NEXT}\n${RUN_URL}"
          fi
          jq -n --arg text "$TEXT" '{text: $text}' > /tmp/slack.json
          curl -sS -X POST -H 'Content-type: application/json' --data @/tmp/slack.json "$URL" || true
