name: Agent Ops Request

# Slack 자연어 라우터가 실행하는 저비용 운영 접수 워크플로.
# 실제 외부 소스 연동, prod DDL, 유료 서비스 호출은 하지 않는다.
# 목적: source-discovery / integrity-checker / pipeline-monitor 작업을 이슈로 안정적으로 남긴다.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "source-discovery | integrity-checker | pipeline-monitor"
        required: true
      query:
        description: "Slack 원문 요청"
        required: false

permissions:
  issues: write
  contents: read

jobs:
  create-request:
    runs-on: ubuntu-latest
    steps:
      - name: Create agent ops issue
        env:
          GH_TOKEN: ${{ github.token }}
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          gh label create "source-discovery" --repo "$REPO" --force --color "0e8a16" --description "Agent source discovery report" >/dev/null 2>&1 || true
          gh label create "integrity-check" --repo "$REPO" --force --color "fbca04" --description "Agent data/source integrity check" >/dev/null 2>&1 || true
          gh label create "pipeline-monitor" --repo "$REPO" --force --color "1d76db" --description "Agent pipeline monitoring request" >/dev/null 2>&1 || true
          gh label create "ssot-sync" --repo "$REPO" --force --color "5319e7" --description "SSOT/document synchronization" >/dev/null 2>&1 || true
          gh label create "needs-ceo-review" --repo "$REPO" --force --color "d93f0b" --description "Requires Gwanghyuk review/approval" >/dev/null 2>&1 || true
          gh label create "data-quality" --repo "$REPO" --force --color "c2e0c6" --description "Data quality, confidence, fallback, grounding" >/dev/null 2>&1 || true

          case "$MODE" in
            source-discovery)
              TITLE="🔎 [source-discovery] 소스 후보 발굴 요청"
              LABELS="source-discovery,needs-ceo-review"
              BODY=$(cat <<'EOF'
          ## 목적
          새로운 투자 정보 소스 후보를 찾는다.

          ## 출력 형식
          - 이름:
          - URL:
          - 유형:
          - 접근 방식:
          - 예상 가치:
          - 리스크:
          - 약관/로그인벽 여부:
          - 추천 tier:
          - 연동 우선순위:

          ## 절대 규칙
          - 제안만 한다.
          - 실제 연동은 광혁 승인 후 별도 PR.
          - 로그인벽/약관 리스크가 있으면 보류 또는 금지.
          EOF
          )
              ;;
            integrity-checker)
              TITLE="🧪 [integrity-checker] 정합성 검수 요청"
              LABELS="integrity-check,data-quality,needs-ceo-review"
              BODY=$(cat <<'EOF'
          ## 목적
          수집된 정보가 진짜 판단 재료인지 검증한다.

          ## 검수 항목
          - 출처 신뢰도
          - 발행 시점
          - 원문과 요약의 일치
          - 강세/약세 균형
          - 커뮤니티 워딩 왜곡 여부
          - 찌라시 가능성
          - 투자조언/예측 표현 여부
          - 💎 신호가 사실 관찰에 머무는지 여부

          ## 출력
          - 상태: 통과 / 수정 필요 / 폐기
          - 문제 발견:
          - 투자조언 리스크:
          - 최종 판단:
          EOF
          )
              ;;
            pipeline-monitor)
              TITLE="🛠 [pipeline-monitor] 파이프라인 점검 요청"
              LABELS="pipeline-monitor,data-quality"
              BODY=$(cat <<'EOF'
          ## 목적
          FOMO Club 데이터 파이프라인이 조용히 망가지는 것을 감시한다.

          ## 감시 항목
          - 수집량 급감
          - 특정 소스 실패
          - 빈 배열 증가
          - fallback 비율 증가
          - confidence 저하
          - LLM 응축 실패
          - API 응답 지연
          - snapshot 생성 실패
          - 카드 데이터가 mock/fallback으로만 채워지는 상황

          ## 보고 형식
          상태: 정상 / 주의 / 위험

          수집:
          - 뉴스:
          - 커뮤니티:
          - 수급:

          품질:
          - fallback 비율:
          - confidence:
          - 빈 카드:

          다음 액션:
          - 자동 복구 가능:
          - PR 필요:
          - 광혁 확인 필요:
          EOF
          )
              ;;
            *)
              echo "Unsupported mode: $MODE" >&2
              exit 1
              ;;
          esac

          BODY="$BODY

          ## Slack 요청 원문
          ${QUERY:-"(원문 없음)"}

          ## 실행 링크
          ${RUN_URL}
          "

          # 라벨이 아직 없는 저장소에서도 실패하지 않게, 라벨 실패 시 무라벨 이슈로 폴백한다.
          if ! gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY" --label "$LABELS"; then
            gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY"
          fi
